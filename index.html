        `👤 Cliente: ${cliente.nome}\n` +
        `🏙 Cidade: ${cliente.cidade}\n` +

      visitaData: '',

      valor: '',
    };

    // Buscar tags do TicketFlow pra encontrar o ID da tag Recontato
    try {
      const allData = await callTicketFlowAPI({action:'getAll'});
      if (allData.ok && allData.tags) {
        const recontatoTag = allData.tags.find(t => t.name === 'Recontato');

  // Sincronizar comentários do TicketFlow → anotações do CRM
  const syncRecontatosFromTicketFlow = async (silent = false) => {
    if (!silent) setTicketflowSyncing(true);
    setSyncStatus("syncing");
    try {
      const allData = await callTicketFlowAPI({action:'getAll'});
      if (!allData.ok) { if (!silent) setTicketflowSyncing(false); setSyncStatus("error"); return 0; }
      
      const recontatoTag = (allData.tags||[]).find(t => t.name === 'Recontato');
      if (!recontatoTag) { if (!silent) setTicketflowSyncing(false); setSyncStatus("ok"); setLastSyncAt(Date.now()); return 0; }
      
      // Filtrar tickets com tag Recontato que vieram do CRM
      const tickets = (allData.tickets||[]).filter(t => {
        if (typeof t.tags === 'string') try { t.tags = JSON.parse(t.tags); } catch { t.tags = []; }
        return (t.tags||[]).includes(recontatoTag.id) && (t.ascont||'').startsWith('CRM_');
      });
      
      let novosComentarios = 0;
      const novasAnot = {...anotacoes};
      
      for (const ticket of tickets) {
        const clienteKey = ticket.ascont; // ex: "CRM_ide_IDE_ANDRADINA_03" ou "CRM_cli_1234"
        const crmKey = clienteKey.replace('CRM_','');
        
        // Buscar comentários deste ticket
        const cmtResult = await callTicketFlowAPI({action:'getComments', ticketId: ticket.id});
        if (!cmtResult.ok) continue;
        
        const comentarios = cmtResult.comments || [];
        if (!novasAnot[crmKey]) novasAnot[crmKey] = [];

        // v3: Registrar a DESCRIÇÃO INICIAL do ticket (abertura) — só 1x por ticket
        const descTicket = ticket.description || ticket.desc || ticket.descricao || ticket.body || ticket.text || "";
        const tituloTicket = ticket.title || ticket.titulo || ticket.name || ticket.subject || "";
        if (descTicket || tituloTicket) {
          const jaTemAbertura = novasAnot[crmKey].some(a => a.ticketflowAbertura === ticket.id);
          if (!jaTemAbertura) {
            const dataAbertura = ticket.created || ticket.createdAt || ticket.date || new Date().toISOString();
            novasAnot[crmKey].push({
              tipo: "ticketflow",
              vendedor: ticket.author || ticket.owner || ticket.vendedor || "TicketFlow",
              data: dataAbertura,
              dataDisplay: (() => {
                try { const d = new Date(dataAbertura); return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
                catch(e) { return new Date().toLocaleDateString('pt-BR'); }
              })(),
              obs: `📋 ABERTURA DO TICKET #${String(ticket.id).slice(-6).toUpperCase()}${tituloTicket ? `\n${tituloTicket}` : ''}${descTicket ? `\n\n${descTicket}` : ''}`,
              ticketflowAbertura: ticket.id,
              ticketId: ticket.id
            });
            novosComentarios++;
          }
        }
        
        comentarios.forEach(cmt => {
          // Verificar se já existe (por data + texto)
          const jaExiste = novasAnot[crmKey].some(a => 
            a.ticketflowId === cmt.id || (a.data === cmt.date && a.obs === cmt.text)
          );
          
          if (!jaExiste) {
            novasAnot[crmKey].push({
              tipo: "ticketflow",
              vendedor: cmt.author || "TicketFlow",
              data: cmt.date || new Date().toISOString(),
              dataDisplay: cmt.date ? new Date(cmt.date).toLocaleDateString('pt-BR') + ' ' + new Date(cmt.date).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : new Date().toLocaleDateString('pt-BR'),
              obs: cmt.text || "",
              ticketflowId: cmt.id,
              ticketId: ticket.id
            });
            novosComentarios++;
          }
        });
        
        // Se ticket finalizado, adicionar nota de encerramento
        if (ticket.archived === 'sim' || ticket.status === 'finalizado') {
          const jaFinalizado = novasAnot[crmKey].some(a => a.ticketflowFinalizado === ticket.id);
          if (!jaFinalizado) {
            novasAnot[crmKey].push({
              tipo: "ticketflow",
              vendedor: "Sistema",
              data: new Date().toISOString(),
              dataDisplay: new Date().toLocaleDateString('pt-BR'),
              obs: `🏁 Ticket Recontato FINALIZADO (#${String(ticket.id).slice(-6).toUpperCase()})`,
              ticketflowFinalizado: ticket.id,
              ticketId: ticket.id
            });
            novosComentarios++;
          }
        }
      }
      
      if (novosComentarios > 0) {
        setAnotacoes(novasAnot);
        try { await window.storage.set(ANOTACOES_STORAGE, JSON.stringify(novasAnot)); } catch(e) {}

      setSyncStatus("ok");
      setLastSyncAt(Date.now());

  // ============================================================
  // PARSER CSV PETECA (roda 100% no navegador)
  // ============================================================
  const parseSintetico = (text) => {
    const lines = text.split('\n').map(l => l.replace('\r',''));
    const vendas = [];
    let periodo = "";
    
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const parts = line.split(';');
      if (parts.length < 2) continue;
      const content = parts[1] || "";
      
      // Extrair período
      if (content.includes("Período:")) {
        const m = content.match(/Período:\s*(\d{2}\/\d{2}\/\d{4})\s*a\s*(\d{2}\/\d{2}\/\d{4})/);
        if (m) periodo = m[1] + " a " + m[2];
      }
      
      // Linha de venda: começa com Nº Saída + data (com ou sem hora) + ID cliente
      const vendaMatch = content.match(/^(\d{1,6})\s+(\d{2}\/\d{2}\/\d{2,4})(?:\s+(\d{2}:\d{2}))?\s+(\d+)\s+/);
      if (vendaMatch) {
        const numSaida = vendaMatch[1];
        let data = vendaMatch[2];
        const hora = vendaMatch[3] || "";
        const clienteId = parseInt(vendaMatch[4]);
        
        // Normalizar data para yy (2 dígitos)
        let dataForSort;
        if (data.length === 10) {
          // dd/mm/yyyy -> yyyy-mm-dd
          dataForSort = data.slice(6) + "-" + data.slice(3,5) + "-" + data.slice(0,2);
          data = data.slice(0,6) + data.slice(8); // converter para dd/mm/yy para display
        } else {
          // dd/mm/yy -> 20yy-mm-dd
          dataForSort = "20" + data.slice(6) + "-" + data.slice(3,5) + "-" + data.slice(0,2);
        }
        
        // Extrair valor (último número com vírgula na linha)
        const valorMatch = content.match(/(\d[\d.]*,\d{2})\s*$/);
        const valor = valorMatch ? parseFloat(valorMatch[1].replace(/\./g,'').replace(',','.')) : 0;
        
        // Extrair condição de pagamento
        let condPagto = "À VISTA";
        if (content.includes("ACORDO")) condPagto = content.match(/(ACORDO\s*\/\s*\d+\s*DIAS)/)?.[1] || "ACORDO";
        else if (content.includes("15/30")) condPagto = "15/30 DIAS / BOL";
        else if (content.includes("C. DEBITO")) condPagto = "C. DEBITO";
        else if (content.includes("C. CREDITO")) condPagto = "C. CREDITO";
        else if (content.includes("7 DIAS")) condPagto = "7 DIAS";
        else if (content.includes("14 DIAS")) condPagto = "14 DIAS";
        else if (content.includes("30 DIAS")) condPagto = "30 DIAS";
        else if (content.includes("À VISTA")) condPagto = "À VISTA";
        
        // Vendedor pode estar nesta linha ou na próxima
        let vendedor = "";
        let nomeCliente = "";
        const vendedorMatchInline = content.match(/(ANDERSON|REGINALDO|LEX|NATAN|MARCOS|CARLOS|RAFAEL|RICARDO|FELIPE|WAGNER|LUCAS|DIEGO|FABIO|PEDRO|JOÃO|JOSE|MARIA|ANA|PAULO|ROBERTO|FERNANDO|GABRIEL|MATHEUS|BRUNO|DANIEL|GUSTAVO|THIAGO|VINICIUS|HENRIQUE|LEONARDO|EMPRESA|VENDAS\s*\d*|CARLA\/?\w*)\s*[\d.,]*\s*$/i);
        if (vendedorMatchInline) vendedor = vendedorMatchInline[1].toUpperCase();
        
        // Próxima linha: nome do cliente e/ou vendedor
        if (i + 1 < lines.length) {
          const nextLine = (lines[i+1].split(';')[1] || "").trim();
          if (nextLine && !nextLine.match(/^\d{1,6}\s+\d{2}\/\d{2}\/\d{2,4}/)) {
            // Extrair vendedor do final da próxima linha
            const nextVendedorMatch = nextLine.match(/\s+(ANDERSON|REGINALDO|LEX|NATAN|MARCOS|CARLOS|RAFAEL|RICARDO|FELIPE|WAGNER|LUCAS|DIEGO|FABIO|PEDRO|EMPRESA|VENDAS\s*\d*|CARLA\/?\w*)\s*$/i);
            if (nextVendedorMatch) {
              vendedor = vendedor || nextVendedorMatch[1].toUpperCase();
              nomeCliente = nextLine.replace(nextVendedorMatch[0], '').trim();
            } else {
              nomeCliente = nextLine.trim();
            }
          }
        }
        
        // Extrair nome do cliente que pode estar na mesma linha (formato: ID - NOME ... COND_PAGTO)
        if (!nomeCliente) {
          const nomeInline = content.match(/\d+\s+-\s+(.+?)\s+(?:À VISTA|7 DIAS|14 DIAS|30 DIAS|ACORDO|15\/30)/);
          if (nomeInline) nomeCliente = nomeInline[1].trim();
        }
        
        vendas.push({
          numSaida,
          data: dataForSort,
          dataDisplay: data,
          hora,
          clienteId,
          nomeCliente,
          vendedor,
          condPagto,
          valorLiquido: valor,
          produtos: []
        });
      }
    }
    return { vendas, periodo };
  };

  const parseAnalitico = (text) => {
    const lines = text.split('\n').map(l => l.replace('\r',''));
    const vendasMap = {};
    let currentVenda = null;
    let inProdutos = false;
    let currentProdDesc = "";
    let periodo = "";
    
    for (let i = 0; i < lines.length; i++) {
      const parts = lines[i].split(';');
      if (parts.length < 2) continue;
      const content = (parts[1] || "").trim();
      if (!content) continue;
      
      if (content.includes("Período:")) {
        const m = content.match(/Período:\s*(\d{2}\/\d{2}\/\d{4})\s*a\s*(\d{2}\/\d{2}\/\d{4})/);
        if (m) periodo = m[1] + " a " + m[2];
      }
      
      // Nova venda: começa com 1-6 dígitos + data (dd/mm/yyyy ou dd/mm/yy)
      const vendaMatch = content.match(/^(\d{1,6})\s+(\d{2}\/\d{2}\/\d{2,4})\s+/);
      if (vendaMatch) {
        if (currentVenda) vendasMap[currentVenda.numSaida] = currentVenda;
        
        const numSaida = vendaMatch[1];
        let dataStr = vendaMatch[2];
        // Normalizar data para dd/mm/yyyy
        if (dataStr.length === 8) dataStr = dataStr.slice(0,6) + "20" + dataStr.slice(6);
        
        // Extrair nome do cliente (entre data e status P/C)
        let nomeCliente = "";
        const clienteMatch = content.match(/\d{2}\/\d{2}\/\d{4}\s+(.+?)\s+P\s+/);
        if (clienteMatch) nomeCliente = clienteMatch[1].trim();
        
        // Condição de pagamento
        let condPagto = "À VISTA";
        if (content.includes("ACORDO")) condPagto = content.match(/(ACORDO\s*\/\s*\d+\s*DIAS)/)?.[1] || "ACORDO";
        else if (content.includes("15/30")) condPagto = "15/30 DIAS / BOL";
        else if (content.includes("7 DIAS")) condPagto = "7 DIAS";
        else if (content.includes("14 DIAS")) condPagto = "14 DIAS";
        else if (content.includes("30 DIAS")) condPagto = "30 DIAS";
        
        currentVenda = {
          numSaida,
          data: dataStr.slice(6) + "-" + dataStr.slice(3,5) + "-" + dataStr.slice(0,2),
          nomeCliente,
          condPagto,
          produtos: [],
          valorTotal: 0,
          desconto: 0,
          frete: 0,
          valorLiquido: 0,
          vendedor: ""
        };
        inProdutos = false;
        currentProdDesc = "";
        continue;
      }
      
      if (!currentVenda) continue;
      
      // Linha do vendedor: VENDA DD/CN VENDEDOR
      const vendedorMatch = content.match(/^VENDA\s+\w+\s+(.+)$/);
      if (vendedorMatch) {
        currentVenda.vendedor = vendedorMatch[1].trim();
        continue;
      }
      
      // Início de produtos
      if (content === "Produtos") {
        inProdutos = true;
        continue;
      }
      
      // Linha de totais da venda
      if (content.startsWith("Qtde de Produtos:")) {
        inProdutos = false;
        const vlrMatch = content.match(/Vlr\. Total:\s*([\d.,]+)/);
        if (vlrMatch) currentVenda.valorTotal = parseFloat(vlrMatch[1].replace(/\./g,'').replace(',','.'));
        continue;
      }
      
      if (content.startsWith("Total de Itens:")) {
        const descMatch = content.match(/Desc:\s*([\d.,]+)/);
        if (descMatch) currentVenda.desconto = parseFloat(descMatch[1].replace(/\./g,'').replace(',','.'));
        continue;
      }
      
      if (content.includes("Vlr Líquido:")) {
        const liqMatch = content.match(/Vlr Líquido:\s*([\d.,]+)/);
        if (liqMatch) currentVenda.valorLiquido = parseFloat(liqMatch[1].replace(/\./g,'').replace(',','.'));
        continue;
      }
      
      if (content.includes("Frete:")) {
        const freteMatch = content.match(/Frete:\s*([\d.,]+)/);
        if (freteMatch) currentVenda.frete = parseFloat(freteMatch[1].replace(/\./g,'').replace(',','.'));
        continue;
      }
      
      // Dentro do bloco de produtos
      if (inProdutos && currentVenda) {
        if (content === "-") continue;
        if (content.startsWith("(+)") || content.startsWith("Total")) continue;
        // Ignorar cabeçalhos de página que aparecem no meio do bloco
        if (content.startsWith("Emissão:") || content === "PETECA" || content.startsWith("Relatório") || 
            content.startsWith("Tipo Cliente") || content.startsWith("Cidade:") || content.startsWith("Nº Saída") ||
            content.startsWith("Nat. Opera") || content.startsWith("Cód. Item") || content.startsWith("Valor Total")) continue;
        
        // PRIMEIRO: dados do produto (código + valores, com ou sem traço)
        // Ex: "20   1,0000   270,0000 270,00   0,00"
        // Ex: "7   -   1,0000   181,0000 181,00   0,00"
        const prodMatch = content.match(/^(\d+)\s+(?:-\s+)?([\d.,]+)\s+([\d.,]+)\s+([\d.,]+)/);
        if (prodMatch) {
          currentVenda.produtos.push({
            codigo: parseInt(prodMatch[1]),
            descricao: currentProdDesc || "PRODUTO",
            qtde: parseFloat(prodMatch[2].replace(/\./g,'').replace(',','.')),
            vlrUnitario: parseFloat(prodMatch[3].replace(/\./g,'').replace(',','.')),
            vlrTotal: parseFloat(prodMatch[4].replace(/\./g,'').replace(',','.'))
          });
          currentProdDesc = "";
          continue;
        }
        
        // SEGUNDO: código + descrição + valores na mesma linha
        // Ex: "3   ADESIVO 3M D1000 ROLAND   1,0000   88,0000 88,00   0,00 0,00"
        // Ex: "9   BANNER BRILHANTE MONTADO   2,0000   28,0000 56,00   0,00 0,00"
        const prodInlineMatch = content.match(/^(\d+)\s+([A-Z].+?)\s+([\d.,]+)\s+([\d.,]+)\s+([\d.,]+)/);
        if (prodInlineMatch) {
          currentVenda.produtos.push({
            codigo: parseInt(prodInlineMatch[1]),
            descricao: prodInlineMatch[2].trim(),
            qtde: parseFloat(prodInlineMatch[3].replace(/\./g,'').replace(',','.')),
            vlrUnitario: parseFloat(prodInlineMatch[4].replace(/\./g,'').replace(',','.')),
            vlrTotal: parseFloat(prodInlineMatch[5].replace(/\./g,'').replace(',','.'))
          });
          currentProdDesc = "";
          continue;
        }
        
        // TERCEIRO: Linha de descrição (NÃO começa com dígito, termina com 0,00)
        // Ex: "LONA TITANIUM 1000X1000 JETI ILHOS   0,00"
        const descMatch = content.match(/^([A-Z].+?)\s+0,00\s*$/);
        if (descMatch) {
          currentProdDesc = descMatch[1].trim();
          continue;
        }
      }
    }
    if (currentVenda) vendasMap[currentVenda.numSaida] = currentVenda;
    return { vendasMap, periodo };
  };

  const processImport = () => {
    if (!csvSintetico || !csvAnalitico) {
      showToast("Envie os 2 arquivos CSV (sintético + analítico)", "error");
      return;
    }
    setImporting(true);
    const logs = [];
    
    try {
      // Parse sintético (tem o ID do cliente)
      const sint = parseSintetico(csvSintetico);
      logs.push(`Sintético: ${sint.vendas.length} vendas encontradas — ${sint.periodo}`);
      
      // Parse analítico (tem os produtos)
      const anal = parseAnalitico(csvAnalitico);
      const analCount = Object.keys(anal.vendasMap).length;
      logs.push(`Analítico: ${analCount} vendas com produtos — ${anal.periodo}`);
      
      // Cruzar pelo Nº Saída
      const merged = [];
      let novos = 0, duplicados = 0, semProduto = 0;
      
      // Verificar vendas já existentes
      const existingKeys = new Set();
      Object.values(vendas).forEach(monthData => {
        if (Array.isArray(monthData)) {
          monthData.forEach(v => existingKeys.add(v.numSaida));
        }
      });
      
      for (const vSint of sint.vendas) {
        if (existingKeys.has(vSint.numSaida)) {
          duplicados++;
          continue;
        }
        
        const vAnal = anal.vendasMap[vSint.numSaida];
        const merged_venda = {
          numSaida: vSint.numSaida,
          data: vSint.data,
          dataDisplay: vSint.dataDisplay,
          clienteId: vSint.clienteId,
          nomeCliente: vSint.nomeCliente || (vAnal ? vAnal.nomeCliente : ""),
          vendedor: vSint.vendedor || (vAnal ? vAnal.vendedor : ""),
          condPagto: vSint.condPagto,
          valorLiquido: vSint.valorLiquido,
          produtos: vAnal ? vAnal.produtos : [],
          desconto: vAnal ? vAnal.desconto : 0,
          frete: vAnal ? vAnal.frete : 0
        };
        
        if (!vAnal) semProduto++;
        merged.push(merged_venda);
        novos++;
      }
      
      logs.push(`Cruzamento: ${novos} novas vendas, ${duplicados} duplicadas ignoradas, ${semProduto} sem detalhamento de produtos`);
      
      // Verificar clientes novos
      const clienteIds = new Set(clientes.map(c => c.i));
      const novosClientes = [];
      merged.forEach(v => {
        if (v.clienteId && !clienteIds.has(v.clienteId) && !novosClientes.find(c => c.id === v.clienteId)) {
          novosClientes.push({id: v.clienteId, nome: v.nomeCliente});
        }
      });
      if (novosClientes.length > 0) {
        logs.push(`⚠️ ${novosClientes.length} NOVOS CLIENTES detectados (não existem na base):`);
        novosClientes.forEach(c => logs.push(`   • ID ${c.id}: ${c.nome}`));
      }
      
      // Detectar vendedores
      const vendedoresSet = new Set(merged.map(v => v.vendedor).filter(Boolean));
      logs.push(`Vendedores: ${Array.from(vendedoresSet).join(', ') || 'nenhum detectado'}`);
      
      // Determinar meses distintos
      if (merged.length > 0) {
        const mesesMap = {};
        merged.forEach(v => {
          const mes = v.data.slice(0,7);
          if (!mesesMap[mes]) mesesMap[mes] = {count:0, valor:0};
          mesesMap[mes].count++;
          mesesMap[mes].valor += v.valorLiquido;
        });
        const mesesList = Object.keys(mesesMap).sort();
        logs.push(`Meses detectados: ${mesesList.length} (${mesesList.join(', ')})`);
        mesesList.forEach(m => {
          logs.push(`   📅 ${m}: ${mesesMap[m].count} vendas — R$ ${mesesMap[m].valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}`);
        });
        
        const totalValor = merged.reduce((s,v) => s + v.valorLiquido, 0);
        logs.push(`Valor total: R$ ${totalValor.toLocaleString('pt-BR', {minimumFractionDigits:2})}`);
      }
      
      setParsedPreview({vendas: merged, logs, novosClientes});
      setImportLog(logs);
      setImportStep(2);
    } catch(err) {
      logs.push(`❌ ERRO: ${err.message}`);
      setImportLog(logs);
      showToast("Erro no processamento. Verifique os arquivos.", "error");
    }
    setImporting(false);
  };

  const confirmarImportacao = async () => {
    if (!parsedPreview || parsedPreview.vendas.length === 0) return;
    
    // v6: ANTES de importar, detectar clientes novos e abrir tela de análise
    const clienteIds = new Set(clientes.map(c => c.i));
    const novos = {};
    parsedPreview.vendas.forEach(v => {
      if (v.clienteId && !clienteIds.has(v.clienteId) && !novos[v.clienteId]) {
        // Calcular stats das vendas desse cliente novo
        const vendasDoCliente = parsedPreview.vendas.filter(x => x.clienteId === v.clienteId);
        const totalVendas = vendasDoCliente.length;
        const totalValor = vendasDoCliente.reduce((s, x) => s + (x.valorLiquido || 0), 0);
        novos[v.clienteId] = {
          id: v.clienteId,
          nome: v.nomeCliente || `CLIENTE ${v.clienteId}`,
          totalVendas,
          totalValor
        };
      }
    });
    
    const novosArr = Object.values(novos);
    if (novosArr.length > 0) {
      // Abrir tela de pré-análise (importação será feita após decisões)
      setNovosClientesAnalise({
        vendas: parsedPreview.vendas,
        novosClientes: novosArr,
        decisoes: {} // será preenchida pelo usuário
      });
      return; // pausa até decisão
    }
    
    // Sem novos clientes — importa direto
    await executarImportacao(parsedPreview.vendas, []);
  };
  
  // v6: Executa a importação efetiva (chamada após análise dos novos clientes)
  const executarImportacao = async (merged, decisoesArr) => {
    // Aplicar decisões nas vendas
    let mergedFinal = merged;
    let novosCadastros = []; // clientes a criar de fato
    let modsParaAplicar = {}; // mods de IDE/cidade pra aplicar
    
    decisoesArr.forEach(dec => {
      if (dec.type === 'ignorar') {
        // Remove vendas desse cliente
        mergedFinal = mergedFinal.filter(v => String(v.clienteId) !== String(dec.id));
      } else if (dec.type === 'vincular') {
        // Redireciona vendas pro id alvo
        mergedFinal = mergedFinal.map(v => 
          String(v.clienteId) === String(dec.id) 
            ? {...v, clienteId: dec.alvoId} 
            : v
        );
      } else if (dec.type === 'criar') {
        // Cria cadastro completo (não fantasma)
        novosCadastros.push({
          i: dec.id,
          n: dec.nome || `CLIENTE ${dec.id}`,
          r: dec.rua || "",
          nu: dec.numero || "",
          b: dec.bairro || "",
          c: dec.cidade || "CADASTRO PENDENTE",
          d: dec.ide || null,
          a: 1
        });
      }
    });
    
    // Distribuir vendas por mês (para estatísticas visuais)
    const porMes = {};
    mergedFinal.forEach(v => {
      const mesAno = v.data.slice(0,7);
      if (!porMes[mesAno]) porMes[mesAno] = [];
      porMes[mesAno].push(v);
    });
    
    // Mesclar no state do React (por mês, para manter UI)
    const newVendas = {...vendas};
    for (const [mesAno, vendasMes] of Object.entries(porMes)) {
      if (!newVendas[mesAno]) newVendas[mesAno] = [];
      newVendas[mesAno] = [...newVendas[mesAno], ...vendasMes];
    }
    
    // AGRUPAR POR ANO para salvar no storage (menos chaves)
    const porAno = {};
    Object.entries(newVendas).forEach(([mes, arr]) => {
      const ano = mes.slice(0,4);
      if (!porAno[ano]) porAno[ano] = [];
      porAno[ano].push(...arr);
    });
    
    // Helper: salvar com retry + verificação real
    const saveWithRetry = async (key, data, maxRetries = 6) => {
      let lastError = '';
      for (let attempt = 0; attempt < maxRetries; attempt++) {
        try {
          const result = await window.storage.set(key, data);
          if (result) return { success: true };
          lastError = 'null result';
        } catch(e) {
          lastError = e.message || 'erro';
          try {
            const check = await window.storage.get(key);
            if (check && check.value === data) {
              return { success: true, note: 'salvou após erro aparente' };
            }
          } catch(ee) {}
        }
        if (attempt < maxRetries - 1) {
          await new Promise(r => setTimeout(r, 800 * Math.pow(1.8, attempt)));
        }
      }
      try {
        const check = await window.storage.get(key);
        if (check && check.value === data) return { success: true };
      } catch(e) {}
      return { success: false, error: lastError };
    };
    
    const anosAfetados = new Set(Object.keys(porMes).map(m => m.slice(0,4)));
    const anosSalvos = [];
    const anosComErro = [];
    
    // Salvar cada ano afetado
    for (const ano of anosAfetados) {
      const vendasAno = porAno[ano] || [];
      
      const compact = vendasAno.map(v => ({
        n: v.numSaida, d: v.data, dd: v.dataDisplay,
        ci: v.clienteId, nc: v.nomeCliente, ve: v.vendedor,
        cp: v.condPagto, vl: v.valorLiquido,
        ds: v.desconto || 0, fr: v.frete || 0,
        p: (v.produtos || []).map(p => ({
          c: p.codigo, d: p.descricao, q: p.qtde, u: p.vlrUnitario, t: p.vlrTotal
        }))
      }));
      
      const dataStr = JSON.stringify(compact);
      const sizeKB = (dataStr.length / 1024).toFixed(1);
      
      setImportLog(prev => [...prev, `💾 Salvando ano ${ano} (${sizeKB}KB, ${vendasAno.length} vendas)...`]);
      
      const result = await saveWithRetry(`peteca_vendas_ano_${ano}`, dataStr);
      if (result.success) {
        anosSalvos.push(ano);
      } else {
        anosComErro.push(`${ano} (${sizeKB}KB)`);
        console.error("Storage error em ano", ano, result.error);
      }
      
      await new Promise(r => setTimeout(r, 300));
    }
    
    // Atualizar índice de anos
    try {
      const anos = [...new Set(Object.keys(newVendas).map(m => m.slice(0,4)))].sort();
      await saveWithRetry(VENDAS_STORAGE, JSON.stringify({version: 2, anos}));
    } catch(e) {}
    
    setVendas(newVendas);
    
    // v3: Auto-finalizar Kanbans de clientes que voltaram a comprar
    try {
      const clienteIdsNasVendas = [...new Set(mergedFinal.map(v => v.clienteId).filter(Boolean))];
      if (clienteIdsNasVendas.length > 0) {
        const resAuto = await callKanbanAPI('autoFinalize', { cliente_ids: clienteIdsNasVendas });
        if (resAuto.ok && resAuto.finalizados > 0) {
          setImportLog(prev => [...prev, `🎱 ${resAuto.finalizados} Kanban(s) finalizados automaticamente (clientes voltaram a comprar)`]);
        }
      }
    } catch(e) { console.error("Erro auto-finalizar Kanbans:", e); }
    
    // v6: Salvar os novos cadastros criados pelo usuário na pré-análise
    if (novosCadastros.length > 0) {
      const novosClientes = [...clientes, ...novosCadastros];
      await saveClientes(novosClientes);
      showToast(`📋 ${novosCadastros.length} cliente(s) cadastrado(s)`, "info");
    }
    
    if (anosComErro.length > 0) {
      showToast(`⚠️ ${anosSalvos.length} anos salvos, ${anosComErro.length} com erro: ${anosComErro.join(', ')}. Tente reimportar.`, "error");
    } else {
      showToast(`✅ ${mergedFinal.length} vendas importadas em ${Object.keys(porMes).length} mês(es). Anos atualizados: ${anosSalvos.join(', ')}`);
    }
    
    setCsvSintetico(null);
    setCsvAnalitico(null);
    setParsedPreview(null);
    setNovosClientesAnalise(null);
    setImportStep(0);
    setImportLog([]);
  };

  // Carregar vendas do storage (suporta formato antigo por mês E novo por ano)
  const loadVendas = async () => {
    try {
      const indexResult = await window.storage.get(VENDAS_STORAGE);
      if (!indexResult || !indexResult.value) return;
      
      let indexData;
      try { indexData = JSON.parse(indexResult.value); } catch(e) { return; }
      
      const loaded = {};
      
      // FORMATO NOVO: { version: 2, anos: [...] }
      if (indexData && indexData.version === 2 && Array.isArray(indexData.anos)) {
        for (const ano of indexData.anos) {
          try {
            const result = await window.storage.get(`peteca_vendas_ano_${ano}`);
            if (result && result.value) {
              const data = JSON.parse(result.value);
              if (Array.isArray(data) && data.length > 0) {
                // Descompactar e redistribuir por mês
                data.forEach(v => {
                  const full = {
                    numSaida: v.n, data: v.d, dataDisplay: v.dd,
                    clienteId: v.ci, nomeCliente: v.nc, vendedor: v.ve,
                    condPagto: v.cp, valorLiquido: v.vl,
                    desconto: v.ds || 0, frete: v.fr || 0,
                    produtos: (v.p || []).map(p => ({
                      codigo: p.c, descricao: p.d, qtde: p.q,
                      vlrUnitario: p.u, vlrTotal: p.t
                    }))
                  };
                  const mes = full.data?.slice(0,7);
                  if (!mes) return;
                  if (!loaded[mes]) loaded[mes] = [];
                  loaded[mes].push(full);
                });
              }
            }
          } catch(e) { console.error("Erro ao carregar ano", ano, e); }
        }
      } 
      // FORMATO ANTIGO: array de meses YYYY-MM
      else if (Array.isArray(indexData)) {
        for (const mes of indexData) {
          try {
            const result = await window.storage.get(`peteca_vendas_${mes}`);
            if (result && result.value) {
              const data = JSON.parse(result.value);
              if (Array.isArray(data) && data.length > 0) {
                const primeiro = data[0];
                if (primeiro.n !== undefined && primeiro.numSaida === undefined) {
                  loaded[mes] = data.map(v => ({
                    numSaida: v.n, data: v.d, dataDisplay: v.dd,
                    clienteId: v.ci, nomeCliente: v.nc, vendedor: v.ve,
                    condPagto: v.cp, valorLiquido: v.vl,
                    desconto: v.ds || 0, frete: v.fr || 0,
                    produtos: (v.p || []).map(p => ({
                      codigo: p.c, descricao: p.d, qtde: p.q,
                      vlrUnitario: p.u, vlrTotal: p.t
                    }))
                  }));
                } else {
                  loaded[mes] = data;
                }
              }
            }
          } catch(e) {}
        }
      }
      
      setVendas(loaded);
    } catch(e) { console.error("loadVendas error:", e); }
  };

  // Stats de vendas
  const vendasStats = useMemo(() => {
    const meses = Object.keys(vendas).sort();
    let totalVendas = 0, totalValor = 0;
    meses.forEach(m => {
      totalVendas += vendas[m].length;
      totalValor += vendas[m].reduce((s,v) => s + v.valorLiquido, 0);
    });
    return { meses, totalVendas, totalValor };
  }, [vendas]);

  // Carregar dados
  useEffect(() => {
    loadData();
    loadVendas();
    loadAnotacoes();
    loadMetas();
    loadAlias();
  }, []);

  // v2: Keyboard shortcuts globais (Cmd+K, 1-9 tabs, ESC)
  useEffect(() => {
    const tabKeys = ["dashboard","clientes","importar","cidade","produtos","vendedores","fluxo","abandono","metas"];
    const handler = (e) => {
      // Cmd+K / Ctrl+K -> abrir command palette
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        setCmdkOpen(v => !v);
        setCmdkQuery("");
        setCmdkIndex(0);
        return;
      }
      // ESC fecha palette
      if (e.key === 'Escape' && cmdkOpen) {
        setCmdkOpen(false);
        return;
      }
      // Alt+1..9 troca de aba (Alt para não conflitar com campos de input)
      if (e.altKey && !e.ctrlKey && !e.metaKey && /^[1-9]$/.test(e.key)) {
        const idx = parseInt(e.key) - 1;
        if (tabKeys[idx]) {
          e.preventDefault();
          setTab(tabKeys[idx]);
        }
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [cmdkOpen]);
  
  const loadAnotacoes = async () => {
    try {
      const result = await window.storage.get(ANOTACOES_STORAGE);
      if (result && result.value) {
        const data = JSON.parse(result.value);
        if (data && typeof data === 'object') setAnotacoes(data);
      }
    } catch(e) {}
  };
  
  // v6: Carregar/salvar alias de clientes (mesclagens)
  const loadAlias = async () => {
    try {
      const result = await window.storage.get(ALIAS_STORAGE);
      if (result && result.value) {
        const data = JSON.parse(result.value);
        if (data && typeof data === 'object') setAliasClientes(data);
      }
    } catch(e) {}
  };
  const salvarAlias = async (novoMapa) => {
    setAliasClientes(novoMapa);
    try { await window.storage.set(ALIAS_STORAGE, JSON.stringify(novoMapa)); } catch(e) {}
  };
  
  const loadMetas = async () => {
    try {
      const result = await window.storage.get(METAS_STORAGE);
      if (result && result.value) {
        const data = JSON.parse(result.value);
        if (data && typeof data === 'object') setMetasConfig(data);
      }
    } catch(e) {}

  const salvarMetas = async (novasMetas) => {
    setMetasConfig(novasMetas);
    try { await window.storage.set(METAS_STORAGE, JSON.stringify(novasMetas)); } catch(e) {}
  };
  
  const salvarAnotacao = async (clienteId, novaAnotacao) => {
    const novasAnotacoes = {...anotacoes};
    if (!novasAnotacoes[clienteId]) novasAnotacoes[clienteId] = [];
    novasAnotacoes[clienteId] = [novaAnotacao, ...novasAnotacoes[clienteId]];
    setAnotacoes(novasAnotacoes);
    try {
      await window.storage.set(ANOTACOES_STORAGE, JSON.stringify(novasAnotacoes));
    } catch(e) { console.error("Erro salvar anotação:", e); }
  };

  const loadData = async () => {
    try {
      let stored = null;
      try {
        const result = await window.storage.get(STORAGE_KEY);
        if (result && result.value) stored = JSON.parse(result.value);
      } catch(e) {}
      
      let storedMods = {};
      try {
        const modResult = await window.storage.get(STORAGE_MODS);
        if (modResult && modResult.value) storedMods = JSON.parse(modResult.value);
      } catch(e) {}

      let backupDate = null;
      try {
        const bd = await window.storage.get(BACKUP_DATE_KEY);
        if (bd && bd.value) backupDate = bd.value;
      } catch(e) {}

      if (stored && stored.length > 100) {
        setClientes(stored);
      } else {
        setClientes(CLIENTES_RAW);
      }
      setMods(storedMods);
      setLastBackup(backupDate);
    } catch(e) {
      setClientes(CLIENTES_RAW);

    setLoading(false);
  };

  const saveMods = async (newMods) => {
    setMods(newMods);
    try {
      await window.storage.set(STORAGE_MODS, JSON.stringify(newMods));
    } catch(e) {}
  };

  const saveClientes = async (newClientes) => {
    setClientes(newClientes);
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(newClientes));
    } catch(e) {}
  };

  const showToast = (msg, type="success", options = {}) => {
    const duration = options.duration || 3000;
    setToast({msg, type, action: options.action || null, actionLabel: options.actionLabel || null});
    setTimeout(() => setToast(t => {
      // só fecha se for o mesmo toast (não sobrescreveu com outro)
      return null;
    }), duration);
  };

  // ============================================================
  // UTILITÁRIOS: IMPRIMIR E EXPORTAR CSV
  // ============================================================
  const printContent = (titulo, htmlContent) => {
    const w = window.open('','_blank');
    if (!w) { showToast("Popup bloqueado pelo navegador. Permita popups para imprimir.", "error"); return; }
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>${titulo} — CRM PETECA</title>
    <style>
      *{box-sizing:border-box;margin:0;padding:0;}

      .sub{color:#666;font-size:10px;margin-bottom:16px;}
      table{width:100%;border-collapse:collapse;margin-bottom:16px;}
      th{background:#f0f0f0;padding:6px 8px;text-align:left;font-size:10px;font-weight:700;border:1px solid #ddd;text-transform:uppercase;}

      .section{margin:16px 0 8px;font-size:12px;font-weight:700;color:#444;border-bottom:1px solid #eee;padding-bottom:4px;}
      @media print{body{padding:10px;}img{page-break-inside:avoid;}}
    </style></head><body>
    <h1>${titulo}</h1>
    <div class="sub">CRM PETECA — Impresso em ${new Date().toLocaleString('pt-BR')}</div>
    ${htmlContent}
    <` + `script>window.onload=function(){window.print();}<` + `/script>
    </body></html>`);
    w.document.close();
  };

  const exportCSV = (filename, headers, rows) => {
    const BOM = '\uFEFF';
    const csvContent = BOM + [headers.join(';'), ...rows.map(r => r.map(c => {
      const s = String(c ?? '').replace(/"/g, '""');
      return s.includes(';') || s.includes('"') || s.includes('\n') ? `"${s}"` : s;
    }).join(';'))].join('\n');
    const blob = new Blob([csvContent], {type: 'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
    showToast(`✅ ${filename} exportado!`);
  };

  // Botões reutilizáveis
  const PrintExportButtons = ({onPrint, onExport}) => (
    <div style={{display:"flex",gap:8}}>
      <button onClick={onPrint} style={{padding:"8px 14px",background:"#1a2744",border:"1px solid #2a3f66",borderRadius:8,color:"#8899bb",fontSize:11,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>🖨 Imprimir</button>
      <button onClick={onExport} style={{padding:"8px 14px",background:"#1a2744",border:"1px solid #2a3f66",borderRadius:8,color:"#8899bb",fontSize:11,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>📊 Exportar CSV</button>
    </div>
  );

  // Aplicar modificações
  const getClientData = useCallback((client) => {
    const mod = mods[client.i] || {};
    return {
      ...client,
      a: mod.a !== undefined ? mod.a : client.a,
      d: mod.d !== undefined ? mod.d : client.d,
      // v6: aplicar edições de cadastro (cidade, bairro, rua, número, nome)
      c: mod.c !== undefined && mod.c !== '' ? mod.c : client.c,
      b: mod.b !== undefined ? mod.b : client.b,
      r: mod.r !== undefined ? mod.r : client.r,
      nu: mod.nu !== undefined ? mod.nu : client.nu,
      n: mod.n !== undefined && mod.n !== '' ? mod.n : client.n,
      notes: mod.notes || ""
    };
  }, [mods]);

  // v6: Helper — resolve ID de cliente via alias (se foi mesclado, retorna o alvo)
  const resolveAlias = useCallback((clienteId) => {
    if (!clienteId) return clienteId;
    const idStr = String(clienteId);
    // Resolve em cadeia (alias->alias->final), com proteção contra loop
    let current = idStr;
    for (let i = 0; i < 5; i++) {
      const next = aliasClientes[current];
      if (!next || String(next) === current) break;
      current = String(next);
    }
    return current;
  }, [aliasClientes]);
  
  // v6: Set de IDs que são "alias source" (foram mesclados em outro) — pra filtrar da listagem
  const aliasSourceIds = useMemo(() => {
    return new Set(Object.keys(aliasClientes).map(String));
  }, [aliasClientes]);

  // v3 FIX: set global de IDs inativos (aplicar mods) — usado em todas as abas para filtrar vendas
  const inativosIds = useMemo(() => {
    const s = new Set();
    clientes.forEach(c => {
      const mod = mods[c.i];
      const ativo = mod?.a !== undefined ? mod.a : c.a;
      if (ativo !== 1) s.add(c.i);
    });
    return s;
  }, [clientes, mods]);

  // Cidades e IDEs únicos
  const cidades = useMemo(() => {
    // v6: aplica mods pra mostrar cidade real (não a original do CLIENTES_RAW)
    const set = new Set(clientes.map(c => {
      const mod = mods[c.i];
      return (mod?.c !== undefined && mod.c !== '') ? mod.c : c.c;
    }));
    return ["TODAS", ...Array.from(set).sort()];
  }, [clientes, mods]);

  const ides = useMemo(() => {
    const set = new Set(clientes.map(c => {
      const mod = mods[c.i];
      return mod?.d !== undefined ? mod.d : c.d;
    }).filter(Boolean));
    return ["TODOS", ...Array.from(set).sort()];
  }, [clientes, mods]);

  // Filtrar clientes
  const filtered = useMemo(() => {
    let list = clientes.map(c => getClientData(c));
    
    // v6: ocultar clientes que foram mesclados (aliasSource)
    list = list.filter(c => !aliasSourceIds.has(String(c.i)));
    
    if (statusFiltro === "ATIVOS") list = list.filter(c => c.a === 1 && c.c !== "CADASTRO PENDENTE");
    else if (statusFiltro === "INATIVOS") list = list.filter(c => c.a === 0);
    else if (statusFiltro === "PENDENTES") list = list.filter(c => c.c === "CADASTRO PENDENTE");
    
    if (cidadeFiltro !== "TODAS") list = list.filter(c => c.c === cidadeFiltro);
    if (ideFiltro !== "TODOS") {
      if (ideFiltro === "COM_IDE") list = list.filter(c => c.d);
      else if (ideFiltro === "SEM_IDE") list = list.filter(c => !c.d);
      else list = list.filter(c => c.d === ideFiltro);
    }
    
    if (search.trim()) {
      const s = search.toLowerCase().trim();
      list = list.filter(c => 
        c.n.toLowerCase().includes(s) || 
        String(c.i).includes(s) ||
        (c.d && c.d.toLowerCase().includes(s))
      );
    }
    
    return list;
  }, [clientes, mods, search, cidadeFiltro, ideFiltro, statusFiltro, getClientData, aliasSourceIds]);

  const paged = useMemo(() => {
    const start = page * PAGE_SIZE;
    return filtered.slice(start, start + PAGE_SIZE);
  }, [filtered, page]);

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);

  // IDE members
  const getIdeMembers = useCallback((ide) => {
    if (!ide) return [];
    return clientes.map(c => getClientData(c)).filter(c => c.d === ide);
  }, [clientes, mods, getClientData]);

  // FUNÇÃO CENTRAL: Mapeia clienteId → ideKey (ou mantém individual se não tem IDE)
  // Retorna: { ideKey, ideName (nomes separados por /), ideCode, membros: [ids] }
  const clienteIdeMap = useMemo(() => {
    const map = {}; // clienteId → { key, nome, code, membros }
    const allClients = clientes.map(c => getClientData(c));
    
    // Agrupar por IDE
    const ideGroups = {};
    allClients.forEach(c => {
      if (c.d) {
        if (!ideGroups[c.d]) ideGroups[c.d] = [];
        ideGroups[c.d].push(c);
      }
    });
    
    // Criar mapa para cada cliente
    allClients.forEach(c => {
      if (c.d && ideGroups[c.d] && ideGroups[c.d].length > 1) {
        // Tem IDE com múltiplos membros → agrupar
        const membros = ideGroups[c.d];
        const nomes = membros.map(m => {
          // Pegar primeiro nome/razão social curto
          const partes = m.n.split(/\s+/);
          return partes.length > 2 ? partes.slice(0,2).join(' ') : m.n;
        });
        const nomeGrupo = nomes.join(' / ');
        map[c.i] = {
          key: 'ide_' + c.d,
          nome: nomeGrupo,
          code: c.d,
          membros: membros.map(m => m.i),
          cidade: membros[0].c,
          isIde: true
        };
      } else {
        // Individual (sem IDE ou IDE com 1 membro só)
        map[c.i] = {
          key: 'cli_' + c.i,
          nome: c.n,
          code: null,
          membros: [c.i],
          cidade: c.c,
          isIde: false
        };
      }
    });
    
    return map;
  }, [clientes, mods, getClientData]);

  // Função helper: agrupar array de vendas por IDE
  // Retorna Map<ideKey, {key, nome, code, cidade, isIde, membros, vendas, valor, ...}>
  const agruparVendasPorIde = useCallback((vendasArray) => {
    const grupos = {};
    
    vendasArray.forEach(v => {
      const ideInfo = clienteIdeMap[v.clienteId];
      const key = ideInfo ? ideInfo.key : 'cli_' + v.clienteId;
      
      if (!grupos[key]) {
        grupos[key] = {
          key,
          nome: ideInfo?.nome || v.nomeCliente || `Cliente ${v.clienteId}`,
          code: ideInfo?.code || null,
          cidade: ideInfo?.cidade || "—",
          isIde: ideInfo?.isIde || false,
          membros: ideInfo?.membros || [v.clienteId],
          vendas: 0, valor: 0, ultimaCompra: "", primeiraCompra: "9999-99",
          clienteIds: new Set()
        };
      }
      
      grupos[key].vendas++;
      grupos[key].valor += v.valorLiquido || 0;
      if (v.clienteId) grupos[key].clienteIds.add(v.clienteId);
      if (v.data > grupos[key].ultimaCompra) grupos[key].ultimaCompra = v.data;
      if (v.data < grupos[key].primeiraCompra) grupos[key].primeiraCompra = v.data;
    });
    
    return grupos;
  }, [clienteIdeMap]);

  // Toggle ativo/inativo (com confirmação dupla)
  const toggleAtivo = (clientId, currentStatus) => {
    setShowConfirmModal({
      id: clientId,
      action: currentStatus === 1 ? "inativar" : "ativar",
      step: 1
    });
  };

  const confirmToggle = () => {
    if (showConfirmModal.step === 1) {
      setShowConfirmModal({...showConfirmModal, step: 2});
      return;
    }
    const {id, action} = showConfirmModal;
    const newMods = {...mods};
    if (!newMods[id]) newMods[id] = {};
    newMods[id].a = action === "inativar" ? 0 : 1;
    saveMods(newMods);
    setShowConfirmModal(null);
    showToast(`Cliente ${action === "inativar" ? "inativado" : "ativado"} com sucesso!`);
  };

  // IDE management
  const addToIde = (clientId, ideName) => {
    const newMods = {...mods};
    if (!newMods[clientId]) newMods[clientId] = {};
    newMods[clientId].d = ideName;
    
    // v6: Se o cliente está com cadastro PENDENTE, herda endereço do primeiro membro do IDE com dados completos
    const cliente = clientes.find(c => c.i === clientId);
    if (cliente) {
      const dadosAtuais = getClientData(cliente);
      const ehPendente = dadosAtuais.c === "CADASTRO PENDENTE";
      
      if (ehPendente) {
        // Procura outros membros do IDE com endereço completo
        const membroFonte = clientes
          .map(c => getClientData(c))
          .find(c => 
            c.i !== clientId && 
            c.d === ideName && 
            c.c && c.c !== "CADASTRO PENDENTE"
          );
        
        if (membroFonte) {
          // Herda cidade, bairro, rua, número
          if (membroFonte.c) newMods[clientId].c = membroFonte.c;
          if (membroFonte.b) newMods[clientId].b = membroFonte.b;
          if (membroFonte.r) newMods[clientId].r = membroFonte.r;
          if (membroFonte.nu) newMods[clientId].nu = membroFonte.nu;
          saveMods(newMods);
          showToast(`✓ Adicionado ao IDE ${ideName} • Endereço herdado de ${membroFonte.n}`);
          return;
        }
      }
    }
    
    saveMods(newMods);
    showToast(`Cliente adicionado ao grupo ${ideName}`);
  };

  const removeFromIde = (clientId) => {
    const newMods = {...mods};
    if (!newMods[clientId]) newMods[clientId] = {};
    newMods[clientId].d = null;
    saveMods(newMods);
    showToast("Cliente removido do grupo econômico");
  };

  // v6: Excluir definitivamente — apaga cliente + vendas + anotações + mods + finaliza Kanban
  const excluirDefinitivamente = async (clientId) => {
    try {
      // 1. Remover do array de clientes (e salvar)
      const novosClientes = clientes.filter(c => String(c.i) !== String(clientId));
      await saveClientes(novosClientes);
      
      // 2. Remover vendas dele de todos os anos
      const novasVendas = {};
      let vendasRemovidas = 0;
      Object.entries(vendas).forEach(([mes, arr]) => {
        if (Array.isArray(arr)) {
          const filtradas = arr.filter(v => String(v.clienteId) !== String(clientId));
          vendasRemovidas += arr.length - filtradas.length;
          if (filtradas.length > 0) novasVendas[mes] = filtradas;
        }
      });
      setVendas(novasVendas);
      // Salvar por ano no storage
      const porAno = {};
      Object.entries(novasVendas).forEach(([mes, arr]) => {
        const ano = mes.slice(0,4);
        if (!porAno[ano]) porAno[ano] = [];
        porAno[ano].push(...arr);
      });
      const todosAnos = [...new Set(Object.keys(vendas).map(m => m.slice(0,4)))];
      for (const ano of todosAnos) {
        try {
          if (porAno[ano] && porAno[ano].length > 0) {
            // v6 FIX: salvar no formato COMPACTO correto (igual o saveVendas original)
            const compactas = porAno[ano].map(v => ({
              n: v.numSaida, d: v.data, dd: v.dataDisplay,
              ci: v.clienteId, nc: v.nomeCliente, ve: v.vendedor,
              cp: v.condPagto, vl: v.valorLiquido,
              ds: v.desconto || 0, fr: v.frete || 0,
              p: (v.produtos || []).map(p => ({
                c: p.codigo, d: p.descricao, q: p.qtde,
                u: p.vlrUnitario, t: p.vlrTotal
              }))
            }));
            await window.storage.set(`peteca_vendas_ano_${ano}`, JSON.stringify(compactas));
          } else {
            await window.storage.delete(`peteca_vendas_ano_${ano}`);
          }
        } catch(e) {}
      }
      try {
        const anosRestantes = Object.keys(porAno).filter(a => porAno[a].length > 0).sort();
        await window.storage.set(VENDAS_STORAGE, JSON.stringify({version: 2, anos: anosRestantes}));
      } catch(e) {}
      
      // 3. Remover anotações
      const novasAnotacoes = {...anotacoes};
      let anotacoesRemovidas = 0;
      if (novasAnotacoes[clientId]) {
        anotacoesRemovidas = novasAnotacoes[clientId].length || 0;
        delete novasAnotacoes[clientId];
        setAnotacoes(novasAnotacoes);
        try { await window.storage.set(ANOTACOES_STORAGE, JSON.stringify(novasAnotacoes)); } catch(e) {}
      }
      
      // 4. Remover mods
      const novosMods = {...mods};
      if (novosMods[clientId]) {
        delete novosMods[clientId];
        await saveMods(novosMods);
      }
      
      // 5. Remover de aliasClientes (caso seja origem ou destino de mesclagem)
      const novoAlias = {...aliasClientes};
      let mudouAlias = false;
      if (novoAlias[String(clientId)]) {
        delete novoAlias[String(clientId)];
        mudouAlias = true;
      }
      Object.keys(novoAlias).forEach(k => {
        if (String(novoAlias[k]) === String(clientId)) {
          delete novoAlias[k];
          mudouAlias = true;
        }
      });
      if (mudouAlias) await salvarAlias(novoAlias);
      
      // 6. v6: Finalizar Kanban(s) ativo(s) deste cliente no Google Sheets
      let kanbansFinalizados = 0;
      try {
        const kanbansAtivosCliente = kanbans.filter(k => 
          String(k.cliente_id) === String(clientId) && 
          String(k.finalizado).toLowerCase() !== 'sim'
        );
        for (const k of kanbansAtivosCliente) {
          const res = await callKanbanAPI('finalize', { 
            id: k.id, 
            motivo: 'Cliente excluído definitivamente do CRM',
            por: adminName || 'Admin'
          });
          if (res.ok) kanbansFinalizados++;
        }
        if (kanbansFinalizados > 0) {
          // Atualiza o state local removendo os finalizados
          setKanbans(prev => prev.filter(k => String(k.cliente_id) !== String(clientId)));
        }
      } catch(e) { console.warn('Erro ao finalizar Kanban(s):', e); }
      
      const partes = [`${vendasRemovidas} vendas removidas`];
      if (anotacoesRemovidas > 0) partes.push(`${anotacoesRemovidas} anotações`);
      if (kanbansFinalizados > 0) partes.push(`${kanbansFinalizados} Kanban${kanbansFinalizados===1?'':'s'} finalizado${kanbansFinalizados===1?'':'s'}`);
      showToast(`🗑 Cliente excluído definitivamente • ${partes.join(' • ')}`);
    } catch(e) {
      console.error("Erro ao excluir:", e);
      showToast("Erro ao excluir: " + e.message, "error");
    }
  };

  // Backup export/import
  const exportBackup = async () => {
    try {
      // Coletar vendas do state
      const vendasExport = {};
      Object.entries(vendas).forEach(([mes, arr]) => {
        if (Array.isArray(arr) && arr.length > 0) vendasExport[mes] = arr;
      });
      
      const backup = {
        version: 2,
        date: new Date().toISOString(),
        clientes: clientes,
        mods: mods,
        vendas: vendasExport,
        anotacoes: anotacoes
      };
      
      const jsonStr = JSON.stringify(backup);
      const blob = new Blob([jsonStr], {type: "application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `crm_peteca_backup_${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 500);
      
      const sizeMB = (jsonStr.length / 1024 / 1024).toFixed(1);
      const totalVendas = Object.values(vendasExport).reduce((s, arr) => s + arr.length, 0);
      const now = new Date().toISOString();
      setLastBackup(now);
      try { await window.storage.set(BACKUP_DATE_KEY, now); } catch(e) {}
      // v4: Limpar adiamento quando faz backup
      setBackupAdiadoAte(0);
      try { localStorage.removeItem('peteca_backup_adiado_ate'); } catch(e) {}
      showToast(`✅ Backup exportado! (${sizeMB}MB, ${totalVendas} vendas, ${clientes.length} clientes)`);
    } catch(e) {

        if (data.vendas && typeof data.vendas === 'object') {
          setVendas(data.vendas);
          
          // Salvar no storage agrupado por ano
          const porAno = {};
          Object.entries(data.vendas).forEach(([mes, arr]) => {
            const ano = mes.slice(0,4);
            if (!porAno[ano]) porAno[ano] = [];
            porAno[ano].push(...arr);
          });
          
          const anos = Object.keys(porAno).sort();
          for (const ano of anos) {

              n: v.numSaida || v.n, d: v.data || v.d, dd: v.dataDisplay || v.dd,
              ci: v.clienteId || v.ci, nc: v.nomeCliente || v.nc, ve: v.vendedor || v.ve,
              cp: v.condPagto || v.cp, vl: v.valorLiquido || v.vl,
              ds: v.desconto || v.ds || 0, fr: v.frete || v.fr || 0,
              p: (v.produtos || v.p || []).map(p => ({

                u: p.vlrUnitario || p.u, t: p.vlrTotal || p.t

            }));
            try { await window.storage.set(`peteca_vendas_ano_${ano}`, JSON.stringify(compact)); } catch(err) {}
          }
          try { await window.storage.set(VENDAS_STORAGE, JSON.stringify({version: 2, anos})); } catch(err) {}
          
          const totalV = Object.values(data.vendas).reduce((s, arr) => s + arr.length, 0);
          msgs.push(`${totalV} vendas em ${anos.length} anos`);
        }
        
        // Restaurar anotações
        if (data.anotacoes && typeof data.anotacoes === 'object') {
