                          <div key={mes} title={`${mes.slice(5)}/${anoNum}: R$ ${d.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})} (${d.qtde.toFixed(0)} un)`}
                            style={{flex:"0 0 18px",height:altura,background:`linear-gradient(180deg,${cor[0]},${cor[1]})`,borderRadius:"2px 2px 0 0",cursor:"pointer"}}/>
                        );
                      })}
                    </div>
                    <div style={{fontSize:10,color:"#5a7a9a",textAlign:"center",marginTop:8}}>{mesesP.length} meses</div>
                  </div>
                  <div style={{background:"linear-gradient(135deg,#111c30,#152240)",border:"1px solid #1e3050",borderRadius:12,padding:20}}>
                    <div style={{fontSize:14,fontWeight:700,color:"#e2e8f0",marginBottom:16}}>📊 Por Ano</div>
                    {anosP.map(([ano,d]) => {
                      const cor = (yearColors[ano] || ["#22c55e","#16a34a"]);
                      return (
                        <div key={ano} style={{marginBottom:10}}>
                          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                            <span style={{color:"#c8d6e5",fontWeight:600}}>{ano}</span>
                            <span style={{color:cor[0],fontWeight:600}}>R$ {d.valor.toLocaleString('pt-BR',{maximumFractionDigits:0})}</span>
                          </div>
                          <div style={{height:10,background:"#0d1526",borderRadius:4,overflow:"hidden"}}>
                            <div style={{height:"100%",width:`${(d.valor/maxAnoP)*100}%`,background:`linear-gradient(90deg,${cor[0]},${cor[1]})`}}/>
                          </div>
                          <div style={{fontSize:10,color:"#5a7a9a",marginTop:2}}>{d.qtde.toFixed(0)} unidades</div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* Clientes + Cidades que mais consomem */}
                <div style={{display:"grid",gridTemplateColumns:"1.3fr 1fr",gap:16,marginBottom:24}}>
                  <div style={{background:"linear-gradient(135deg,#111c30,#152240)",border:"1px solid #1e3050",borderRadius:12,padding:20}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
                      <div style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>👥 Clientes que Compram este Produto</div>
                      <div style={{fontSize:11,color:"#5a7a9a"}}>{topClientesProd.length} clientes</div>
                    </div>
                    <div style={{maxHeight:500,overflowY:"auto"}}>
                      {topClientesProd.map((c,i) => {
                        const dias = diasSemCompra(c.ultimaCompra);
                        let semaforo = "#22c55e";
                        if (dias > 90) semaforo = "#1e293b";
                        else if (dias > 60) semaforo = "#ef4444";
                        else if (dias > 30) semaforo = "#f97316";
                        else if (dias > 15) semaforo = "#eab308";
                        const maxVal = topClientesProd[0].valor;
                        return (
                          <div key={c.key} style={{padding:"10px 0",borderBottom:"1px solid #152240"}}>
                            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                              <div style={{width:24,height:24,borderRadius:6,background:i<3?"linear-gradient(135deg,#f59e0b,#d97706)":"#1a2744",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:i<3?"#fff":"#8899bb",flexShrink:0}}>{i+1}</div>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{display:"flex",alignItems:"center",gap:6}}>
                                  <div style={{fontSize:12,fontWeight:600,color:"#e2e8f0",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.nome}</div>
                                  {c.isIde && <span style={{padding:"1px 5px",background:"rgba(124,58,237,0.2)",border:"1px solid #7c3aed",borderRadius:3,fontSize:8,color:"#a78bfa",fontWeight:700}}>🔗</span>}
                                </div>
                                <div style={{fontSize:10,color:"#5a7a9a"}}>{c.cidade} • {c.compras}x • {c.qtde.toFixed(0)}un{c.isIde ? ` • ${c.code}` : ""}</div>
                              </div>
                              <div style={{fontSize:12,fontWeight:700,color:"#22c55e"}}>R$ {c.valor.toLocaleString('pt-BR',{maximumFractionDigits:0})}</div>
                              <div title={`${dias} dias`} style={{width:10,height:10,borderRadius:"50%",background:semaforo,boxShadow:`0 0 6px ${semaforo}80`}}/>
                            </div>
                            <div style={{height:3,background:"#0d1526",borderRadius:2,overflow:"hidden"}}>
                              <div style={{height:"100%",width:`${(c.valor/maxVal)*100}%`,background: c.isIde ? "linear-gradient(90deg,#7c3aed,#6d28d9)" : "linear-gradient(90deg,#22c55e,#16a34a)"}}/>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  <div style={{background:"linear-gradient(135deg,#111c30,#152240)",border:"1px solid #1e3050",borderRadius:12,padding:20}}>
                    <div style={{fontSize:14,fontWeight:700,color:"#e2e8f0",marginBottom:16}}>🏙 Cidades</div>
                    <div style={{maxHeight:500,overflowY:"auto"}}>
                      {topCidadesProd.map((c,i) => {
                        const maxVal = topCidadesProd[0].valor;
                        return (
                          <div key={c.cidade} style={{padding:"8px 0",borderBottom:"1px solid #152240"}}>
                            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                              <div style={{width:20,height:20,borderRadius:5,background:i<3?"#f59e0b":"#1a2744",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:i<3?"#fff":"#8899bb",flexShrink:0}}>{i+1}</div>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{fontSize:11,fontWeight:600,color:"#e2e8f0",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.cidade}</div>
                                <div style={{fontSize:9,color:"#5a7a9a"}}>{c.clientes.size} clientes • {c.qtde.toFixed(0)}un</div>
                              </div>
                              <div style={{fontSize:11,fontWeight:700,color:"#f59e0b"}}>R$ {c.valor.toLocaleString('pt-BR',{maximumFractionDigits:0})}</div>
                            </div>
                            <div style={{height:2,background:"#0d1526",borderRadius:2,overflow:"hidden"}}>
                              <div style={{height:"100%",width:`${(c.valor/maxVal)*100}%`,background:"linear-gradient(90deg,#f59e0b,#d97706)"}}/>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
              </div>
            );
          }

          // LISTAGEM GERAL DE PRODUTOS
          return (
            <div style={{animation:"fadeIn .4s ease"}}>
              {/* Filtros */}
              <div style={{background:"linear-gradient(135deg,#111c30,#152240)",border:"1px solid #1e3050",borderRadius:12,padding:16,marginBottom:20,display:"flex",flexWrap:"wrap",gap:12,alignItems:"flex-end"}}>
                <div style={{flex:"1 1 300px"}}>
                  <label style={{fontSize:11,color:"#5a7a9a",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Buscar produto</label>
                  <input type="text" value={produtoSearch} onChange={e => setProdutoSearch(e.target.value)}
                    placeholder="Nome ou código..."
                    style={{width:"100%",padding:"10px 14px",background:"#0a1220",border:"1px solid #1e3050",borderRadius:8,color:"#e2e8f0",fontSize:14}}/>
                </div>
                {anosDisp.length > 1 && (
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                    <div style={{fontSize:11,color:"#5a7a9a",textTransform:"uppercase",letterSpacing:1,fontWeight:600,marginRight:4}}>Anos:</div>
                    <button onClick={() => setProdutoAnoFiltro([])} style={{padding:"8px 12px",borderRadius:8,border:"1px solid "+(produtoAnoFiltro.length===0 ? "#3b82f6" : "#2a3f66"),background: produtoAnoFiltro.length===0 ? "rgba(59,130,246,0.15)" : "#0a1220",color: produtoAnoFiltro.length===0 ? "#60a5fa" : "#8899bb",fontSize:11,fontWeight:600,cursor:"pointer"}}>Todos</button>
                    {anosDisp.map(a => {
                      const sel = produtoAnoFiltro.includes(a);
                      return (
                        <button key={a} onClick={() => setProdutoAnoFiltro(prev => sel ? prev.filter(x=>x!==a) : [...prev, a])} style={{padding:"8px 12px",borderRadius:8,border:"1px solid "+(sel ? "#3b82f6" : "#2a3f66"),background: sel ? "rgba(59,130,246,0.15)" : "#0a1220",color: sel ? "#60a5fa" : "#8899bb",fontSize:11,fontWeight:600,cursor:"pointer"}}>{a}</button>
                      );
                    })}
                  </div>
                )}
                <PrintExportButtons 
                  onPrint={() => {
                    const rows = prodsABC.map((p,i) => `<tr><td>${i+1}</td><td>${p.codigo}</td><td>${p.descricao}</td><td>${p.classe}</td><td>${p.vendas}</td><td>${p.qtde.toFixed(0)}</td><td>R$ ${p.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td></tr>`).join('');
                    printContent(`Produtos — Curva ABC (${prodsABC.length})`, `<table><thead><tr><th>#</th><th>Código</th><th>Produto</th><th>ABC</th><th>Vendas</th><th>Qtde</th><th>Faturamento</th></tr></thead><tbody>${rows}</tbody></table>`);
                  }}
                  onExport={() => {
                    exportCSV('produtos_abc.csv',['#','Código','Produto','Curva','Vendas','Qtde','Faturamento'],
                      prodsABC.map((p,i) => [i+1, p.codigo, p.descricao, p.classe, p.vendas, p.qtde.toFixed(0), p.valor.toFixed(2)]));
                  }}
                />
              </div>

              {/* KPIs */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:16,marginBottom:24}}>
                {[
                  {label:"Produtos Distintos",value:prodsArr.length,icon:"📦",color:"#3b82f6"},
                  {label:"Faturamento Total",value:"R$ "+totalFatProd.toLocaleString('pt-BR',{minimumFractionDigits:2}),icon:"💰",color:"#22c55e"},
                  {label:"Produto #1",value:prodsArr[0]?.descricao || "—",icon:"🏆",color:"#f59e0b"},
                  {label:"Curva A (até 80%)",value: prodsABC.filter(p=>p.classe==="A").length,icon:"⭐",color:"#ec4899"},
                ].map((s,i) => (
                  <div key={i} style={{background:"linear-gradient(135deg,#111c30,#152240)",border:"1px solid #1e3050",borderRadius:12,padding:"18px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <div style={{fontSize:11,color:"#5a7a9a",textTransform:"uppercase",letterSpacing:1}}>{s.label}</div>
                      <div style={{fontSize:20,opacity:.6}}>{s.icon}</div>
                    </div>
                    <div style={{fontSize:s.label.includes("Faturamento")||s.label.includes("#1") ? 13 : 22,fontWeight:700,color:s.color,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.value}</div>
                  </div>
                ))}
              </div>

              {/* DONUT DUPLO - CATEGORIA → SUBCATEGORIA */}
              {(() => {
                // Mapa de agrupamento: palavra detectada -> categoria pai
                const catGroupMap = {
                  'FAIXA': 'LONA',
                  'BANNER': 'LONA',
                  'LONA': 'LONA',
                };
                // Extrair categoria (primeira palavra significativa) e subcategoria (2 primeiras palavras)
                const stopWords = new Set(['DE','DO','DA','DOS','DAS','EM','PARA','COM','E','OU','A','O','NO','NA','PP','LTDA','KG','G','ML','L','CM','MM','MT','M','UND','UN','PC','PCS','CX','PCT']);
                const extractParts = (desc) => {
                  const clean = String(desc||'').toUpperCase().replace(/[^A-Z0-9ÇÃÕÉÁÍÚÓÂÊÔ ]/g,' ').replace(/\s+/g,' ').trim();
                  const words = clean.split(' ').filter(w => w.length >= 2 && !stopWords.has(w) && !/^\d+$/.test(w));
                  const firstWord = words[0] || 'OUTROS';
                  // Se a primeira palavra está no mapa de agrupamento, categoria é o pai e subcategoria começa com a palavra original
                  const cat = catGroupMap[firstWord] || firstWord;
                  const sub = cat !== firstWord
                    ? [firstWord, ...words.slice(1,2)].filter(Boolean).join(' ')
                    : words.slice(0,2).join(' ') || cat;
                  return { cat, sub };
                };
                const catMap = {};
                prodsArr.forEach(p => {
                  const { cat, sub } = extractParts(p.descricao);
                  if (!catMap[cat]) catMap[cat] = { nome: cat, valor: 0, subs: {} };
                  catMap[cat].valor += p.valor;
                  if (!catMap[cat].subs[sub]) catMap[cat].subs[sub] = { nome: sub, valor: 0, count: 0 };
                  catMap[cat].subs[sub].valor += p.valor;
                  catMap[cat].subs[sub].count++;
                });
                const cats = Object.values(catMap).sort((a,b) => b.valor - a.valor).slice(0,8);
                const catTotal = cats.reduce((s,c) => s+c.valor, 0);
                if (cats.length === 0 || catTotal === 0) return null;

                // Paleta base vibrante
                const palette = [
                  {base:'#6366f1', light:'#a5b4fc'}, // indigo
                  {base:'#ec4899', light:'#f9a8d4'}, // pink
                  {base:'#10b981', light:'#6ee7b7'}, // emerald
                  {base:'#f59e0b', light:'#fcd34d'}, // amber
                  {base:'#8b5cf6', light:'#c4b5fd'}, // violet
                  {base:'#06b6d4', light:'#67e8f9'}, // cyan
                  {base:'#ef4444', light:'#fca5a5'}, // red
                  {base:'#84cc16', light:'#bef264'}, // lime
                ];
                const hexMix = (c1, c2, t) => {
                  const h2r = h => [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
                  const [r1,g1,b1]=h2r(c1),[r2,g2,b2]=h2r(c2);
                  const r=Math.round(r1+(r2-r1)*t),g=Math.round(g1+(g2-g1)*t),b=Math.round(b1+(b2-b1)*t);
                  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
                };

                const size = 480, cx = size/2, cy = size/2;
                const rInner = 60, rMid1 = 110, rMid2 = 125, rOuter = 195;
                const arcPath = (cx,cy,r1,r2,a1,a2) => {
                  const p1 = [cx + r2*Math.cos(a1), cy + r2*Math.sin(a1)];
                  const p2 = [cx + r2*Math.cos(a2), cy + r2*Math.sin(a2)];
                  const p3 = [cx + r1*Math.cos(a2), cy + r1*Math.sin(a2)];
                  const p4 = [cx + r1*Math.cos(a1), cy + r1*Math.sin(a1)];
                  const large = (a2-a1) > Math.PI ? 1 : 0;
                  return `M ${p1[0]} ${p1[1]} A ${r2} ${r2} 0 ${large} 1 ${p2[0]} ${p2[1]} L ${p3[0]} ${p3[1]} A ${r1} ${r1} 0 ${large} 0 ${p4[0]} ${p4[1]} Z`;
                };

                // Construir segmentos
                let curAng = -Math.PI/2;
                const outerSegs = [], innerSegs = [];
                cats.forEach((cat, ci) => {
                  const catAng = (cat.valor / catTotal) * Math.PI * 2;
                  const catStart = curAng, catEnd = curAng + catAng;
                  const color = palette[ci % palette.length];
                  outerSegs.push({cat, start:catStart, end:catEnd, color:color.base, colorLight:color.light, ci});
                  // Subs
                  const subs = Object.values(cat.subs).sort((a,b) => b.valor - a.valor).slice(0,6);
                  const subsTotal = subs.reduce((s,x) => s+x.valor, 0);
                  let subAng = catStart;
                  subs.forEach((sub, si) => {
                    const span = (sub.valor / subsTotal) * catAng;
                    // Tint escalado: do escuro (base) ao claro (light). Mais contraste quando há mais subs.
                    const t = subs.length > 1 ? si / (subs.length - 1) : 0.5;
                    // Dois tons por segmento para criar gradient radial
                    const colorStart = hexMix(color.base, '#000000', 0.15 - t*0.1); // mais escuro para primeiro
                    const colorEnd = hexMix(color.base, '#ffffff', 0.15 + t*0.55);  // mais claro para último
                    innerSegs.push({
                      sub, cat, start:subAng, end:subAng+span,
                      colorStart, colorEnd,
                      color: colorEnd,
                      ci, si
                    });
                    subAng += span;
                  });
                  curAng = catEnd;
                });

                return (
                  <div className="card-hover" style={{
                    background:"rgba(20,28,48,0.6)",
                    backdropFilter:"blur(20px)",
                    border:"1px solid rgba(255,255,255,0.08)",
                    borderRadius:16,padding:24,marginBottom:24,
                    animation:"scaleIn .4s cubic-bezier(.4,0,.2,1)"
                  }}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:12}}>
                      <div>
                        <div style={{fontSize:15,fontWeight:700,color:"#e2e8f0",marginBottom:4}}>🍩 Mapa de Categorias de Produtos</div>
                        <div style={{fontSize:11,color:"#64748b"}}>Anel externo: categoria principal • Anel interno: subcategorias • Passe o mouse para destacar</div>
                      </div>
                      <div style={{fontSize:11,color:"#a78bfa",background:"rgba(167,139,250,0.1)",padding:"6px 12px",borderRadius:8,border:"1px solid rgba(167,139,250,0.2)"}}>
                        {cats.length} categorias • {innerSegs.length} subcategorias
                      </div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:32,alignItems:"center"}}>
                      <div style={{position:"relative"}}>
                        <svg width={size} height={size} style={{overflow:"visible"}}>
                          <defs>
                            {palette.map((p,i) => (
                              <radialGradient key={i} id={`donut-grad-${i}`} cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stopColor={p.light} stopOpacity="0.9"/>
                                <stop offset="100%" stopColor={p.base} stopOpacity="1"/>
                              </radialGradient>
                            ))}
                            {/* Gradient por segmento do anel interno: do centro do arco para fora */}
                            {innerSegs.map((seg,i) => {
                              const mid = (seg.start + seg.end) / 2;
                              const x1 = 50 + 40 * Math.cos(seg.start);
                              const y1 = 50 + 40 * Math.sin(seg.start);
                              const x2 = 50 + 40 * Math.cos(seg.end);
                              const y2 = 50 + 40 * Math.sin(seg.end);
                              return (
                                <linearGradient key={"ig"+i} id={`donut-inner-${i}`} x1={x1+"%"} y1={y1+"%"} x2={x2+"%"} y2={y2+"%"}>
                                  <stop offset="0%" stopColor={seg.colorStart}/>
                                  <stop offset="100%" stopColor={seg.colorEnd}/>
                                </linearGradient>
                              );
                            })}
                            <filter id="donut-glow" x="-50%" y="-50%" width="200%" height="200%">
                              <feGaussianBlur stdDeviation="4" result="blur"/>
                              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                            </filter>
                          </defs>
                          {/* Anel externo - categorias */}
                          {outerSegs.map((seg,i) => {
                            const isHover = donutHover && donutHover.type === 'cat' && donutHover.ci === seg.ci;
                            const isDimmed = donutHover && !(donutHover.ci === seg.ci);
                            const midAng = (seg.start + seg.end) / 2;
                            const lblR = rOuter + 28;
                            const lblX = cx + lblR * Math.cos(midAng);
                            const lblY = cy + lblR * Math.sin(midAng);
                            const lineX1 = cx + (rOuter+3) * Math.cos(midAng);
                            const lineY1 = cy + (rOuter+3) * Math.sin(midAng);
                            const anchor = Math.cos(midAng) > 0.2 ? "start" : Math.cos(midAng) < -0.2 ? "end" : "middle";
                            const pct = (seg.cat.valor / catTotal * 100).toFixed(1);
                            return (
                              <g key={"cat"+i} style={{transition:"opacity .25s",opacity:isDimmed?0.3:1,cursor:"pointer"}}
                                onMouseEnter={() => setDonutHover({type:'cat',ci:seg.ci})}
                                onMouseLeave={() => setDonutHover(null)}>
                                <path d={arcPath(cx,cy,rMid2,rOuter,seg.start,seg.end)}
                                  fill={`url(#donut-grad-${seg.ci % palette.length})`}
                                  stroke="rgba(0,0,0,0.3)" strokeWidth="1"
                                  style={{
                                    filter: isHover ? "url(#donut-glow) brightness(1.2)" : "none",
                                    transformOrigin: `${cx}px ${cy}px`,
                                    transform: isHover ? "scale(1.04)" : "scale(1)",
                                    transition:"all .25s cubic-bezier(.4,0,.2,1)"
                                  }}/>
                                {(seg.end - seg.start) > 0.12 && (
                                  <>
                                    <line x1={lineX1} y1={lineY1} x2={lblX - (anchor==="start"?-3:anchor==="end"?3:0)} y2={lblY}
                                      stroke={seg.color} strokeWidth="1" opacity="0.5"/>
                                    <text x={lblX} y={lblY-4} fill="#e2e8f0" fontSize="11" fontWeight="700" textAnchor={anchor}>
                                      {seg.cat.nome.length > 14 ? seg.cat.nome.slice(0,14)+'…' : seg.cat.nome}
                                    </text>
                                    <text x={lblX} y={lblY+10} fill={seg.colorLight} fontSize="10" fontWeight="600" textAnchor={anchor}>
                                      {pct}%
                                    </text>
                                  </>
                                )}
                              </g>
                            );
                          })}
                          {/* Anel interno - subcategorias */}
                          {innerSegs.map((seg,i) => {
                            const isHover = donutHover && donutHover.type === 'sub' && donutHover.ci === seg.ci && donutHover.si === seg.si;
                            const isDimmed = donutHover && !(donutHover.ci === seg.ci);
                            return (
                              <g key={"sub"+i} style={{transition:"opacity .25s",opacity:isDimmed?0.25:1,cursor:"pointer"}}
                                onMouseEnter={() => setDonutHover({type:'sub',ci:seg.ci,si:seg.si})}
                                onMouseLeave={() => setDonutHover(null)}>
                                <path d={arcPath(cx,cy,rInner,rMid1,seg.start,seg.end)}
                                  fill={`url(#donut-inner-${i})`}
                                  stroke="rgba(13,21,38,0.6)" strokeWidth="1.5"
                                  style={{
                                    filter: isHover ? "brightness(1.25)" : "none",
                                    transformOrigin: `${cx}px ${cy}px`,
                                    transform: isHover ? "scale(1.05)" : "scale(1)",
                                    transition:"all .25s cubic-bezier(.4,0,.2,1)"
                                  }}/>
                              </g>
                            );
                          })}
                          {/* Centro */}
                          <circle cx={cx} cy={cy} r={rInner-3} fill="rgba(13,21,38,0.95)" stroke="rgba(99,102,241,0.2)" strokeWidth="1"/>
                          {donutHover ? (() => {
                            const seg = donutHover.type === 'cat'
                              ? outerSegs.find(s => s.ci === donutHover.ci)
                              : innerSegs.find(s => s.ci === donutHover.ci && s.si === donutHover.si);

        {/* FLUXO DE VENDAS TAB */}
        {tab === "fluxo" && (() => {
          const allSalesRaw = [];
          Object.entries(vendas).forEach(([mes, arr]) => {
            if (Array.isArray(arr)) arr.forEach(v => allSalesRaw.push(v));
          });
          // v3 FIX: filtrar vendas de clientes inativados
          // v6: aplica alias e filtra inativos
          const allSales = allSalesRaw
            .map(v => v.clienteId && aliasClientes[String(v.clienteId)] ? {...v, clienteId: resolveAlias(v.clienteId)} : v)
            .filter(v => !inativosIds.has(v.clienteId));

          const clienteToCidade = {};
          const clienteToNome = {};
          clientes.forEach(c => { 
            clienteToCidade[c.i] = c.c; 
            clienteToNome[c.i] = c.n;
          });

          const anosDisp = [...new Set(allSales.map(v => v.data?.slice(0,4)).filter(Boolean))].sort();
          const anosFilt = fluxoAnoFiltro.length > 0 ? fluxoAnoFiltro : anosDisp;
          
          // Aplicar todos os filtros nas vendas
          let salesFilt = allSales.filter(v => anosFilt.includes(v.data?.slice(0,4)));
          if (fluxoVendedorFiltro) {
            salesFilt = salesFilt.filter(v => (v.vendedor || "SEM VENDEDOR") === fluxoVendedorFiltro);
          }
          if (fluxoCidadeFiltro) {
            salesFilt = salesFilt.filter(v => (clienteToCidade[v.clienteId] || "SEM CIDADE") === fluxoCidadeFiltro);
          }

          const mesesUnicos = [...new Set(salesFilt.map(v => v.data?.slice(0,7)).filter(Boolean))].sort();
          const cidadesDisp = [...new Set(allSales.map(v => clienteToCidade[v.clienteId]).filter(Boolean))].sort();
          const vendedoresDisp = filtrarVendedoresAtivos([...new Set(allSales.map(v => v.vendedor || "SEM VENDEDOR"))]).sort();

          // Mapa cliente AGRUPADO POR IDE
          const clienteMap = {};
          salesFilt.forEach(v => {
            const id = v.clienteId;
            if (!id) return;
            const ideInfo = clienteIdeMap[id];
            const key = ideInfo ? ideInfo.key : 'cli_' + id;
            
            if (!clienteMap[key]) clienteMap[key] = {
              id: key,
              nome: ideInfo?.nome || v.nomeCliente || clienteToNome[id] || `Cliente ${id}`,
              code: ideInfo?.code || null,
              isIde: ideInfo?.isIde || false,
              cidade: ideInfo?.cidade || clienteToCidade[id] || "—",
              membros: ideInfo?.membros || [id],
              meses: {}, total: 0, vendas: 0,
              ultimaCompra: "", primeiraCompra: "9999-99",
              datas: []
            };
            const m = v.data?.slice(0,7);
            if (!m) return;
            if (!clienteMap[key].meses[m]) clienteMap[key].meses[m] = {valor: 0, count: 0, vendas: []};
            clienteMap[key].meses[m].valor += v.valorLiquido || 0;
            clienteMap[key].meses[m].count++;
            clienteMap[key].meses[m].vendas.push(v);
            clienteMap[key].total += v.valorLiquido || 0;
            clienteMap[key].vendas++;
            clienteMap[key].datas.push(v.data);
            if (v.data > clienteMap[key].ultimaCompra) clienteMap[key].ultimaCompra = v.data;
            if (v.data < clienteMap[key].primeiraCompra) clienteMap[key].primeiraCompra = v.data;
          });

          // Adicionar clientes/grupos sem vendas no período
          const ultimaCompraGeral = {};
          allSales.forEach(v => {
            if (!v.clienteId || !v.data) return;
            const ideInfo = clienteIdeMap[v.clienteId];
            const key = ideInfo ? ideInfo.key : 'cli_' + v.clienteId;
            if (!ultimaCompraGeral[key] || v.data > ultimaCompraGeral[key]) {
              ultimaCompraGeral[key] = v.data;
            }
          });
          
          clientes.forEach(c => {
            if (c.a !== 1) return;
            if (fluxoCidadeFiltro && c.c !== fluxoCidadeFiltro) return;
            const ideInfo = clienteIdeMap[c.i];
            const key = ideInfo ? ideInfo.key : 'cli_' + c.i;
            if (!clienteMap[key]) {
              clienteMap[key] = {
                id: key,
                nome: ideInfo?.nome || c.n || `Cliente ${c.i}`,
                code: ideInfo?.code || null,
                isIde: ideInfo?.isIde || false,
                cidade: ideInfo?.cidade || c.c || "—",
                membros: ideInfo?.membros || [c.i],
                meses: {}, total: 0, vendas: 0,
                ultimaCompra: ultimaCompraGeral[key] || "",
                primeiraCompra: "",
                datas: [],
                semVendaNoPeriodo: true
              };
            }
          });

          const ultimaDataSistema = allSales.reduce((max, v) => v.data > max ? v.data : max, "");
          const hoje = ultimaDataSistema ? new Date(ultimaDataSistema) : new Date();
          const diasSemCompra = (data) => data ? Math.floor((hoje - new Date(data)) / 86400000) : 999;

          // Calcular tendência (últimos 3 meses vs 3 anteriores) e gap médio
          const clientesArr = Object.values(clienteMap).map(c => {
            const mesesAtivos = Object.keys(c.meses).length;
            const dias = diasSemCompra(c.ultimaCompra);
            
            // Tendência: últimos 3 meses vs 3 anteriores
            const mesesOrd = Object.entries(c.meses).sort(([a],[b]) => a.localeCompare(b));
            let tendencia = 0;
            if (mesesOrd.length >= 4) {
              const ultimos3 = mesesOrd.slice(-3).reduce((s,[,d]) => s + d.valor, 0);
              const anteriores3 = mesesOrd.slice(-6, -3).reduce((s,[,d]) => s + d.valor, 0);
              if (anteriores3 > 0) tendencia = ((ultimos3 - anteriores3) / anteriores3) * 100;
              else if (ultimos3 > 0) tendencia = 100;
            }
            
            // Gap médio entre compras (em dias)
            let gapMedio = 0;
            if (c.datas.length > 1) {
              const datasOrd = [...c.datas].sort();
              let totalGap = 0;
              for (let i = 1; i < datasOrd.length; i++) {
                totalGap += (new Date(datasOrd[i]) - new Date(datasOrd[i-1])) / 86400000;
              }
              gapMedio = totalGap / (datasOrd.length - 1);
            }
            
            return {
              ...c, mesesAtivos, diasSemCompra: dias, tendencia, gapMedio,
              ticketMedio: c.vendas > 0 ? c.total / c.vendas : 0
            };
          });

          // Filtro de status (multi-seleção)
          let clientesOrdenados = [...clientesArr];
          if (fluxoStatusFiltro.length > 0) {
            clientesOrdenados = clientesOrdenados.filter(c => {
              const status = c.diasSemCompra <= 15 ? "ativo"
                : c.diasSemCompra <= 30 ? "recente"
                : c.diasSemCompra <= 60 ? "atencao"
                : c.diasSemCompra <= 90 ? "risco"
                : "abandonado";
              return fluxoStatusFiltro.includes(status);
            });
          }

          if (fluxoOrdem === "valor") clientesOrdenados.sort((a,b) => b.total - a.total);
          else if (fluxoOrdem === "vendas") clientesOrdenados.sort((a,b) => b.vendas - a.vendas);
          else if (fluxoOrdem === "recente") clientesOrdenados.sort((a,b) => b.ultimaCompra.localeCompare(a.ultimaCompra));
          else if (fluxoOrdem === "abandono") clientesOrdenados.sort((a,b) => b.diasSemCompra - a.diasSemCompra);

            ? clientesOrdenados.filter(c => c.nome.toLowerCase().includes(fluxoSearch.toLowerCase()) || String(c.id).includes(fluxoSearch))

          const sazonalidade = Array(12).fill(0).map(() => ({valor: 0, vendas: 0}));

          const ativos90 = clientesArr.filter(c => c.diasSemCompra > 60 && c.diasSemCompra <= 90).length;

          if (allSales.length === 0) {

          const getCellColor = (valor, maxValor) => {
            if (valor === 0) return "transparent";
            const intensity = Math.min(valor / maxValor, 1);
            if (intensity < 0.10) return "rgba(254,243,199,0.6)"; // amarelo claro
            if (intensity < 0.20) return "rgba(253,224,71,0.7)";  // amarelo
            if (intensity < 0.35) return "rgba(251,191,36,0.85)"; // amarelo-laranja
            if (intensity < 0.50) return "rgba(249,115,22,0.85)"; // laranja
            if (intensity < 0.70) return "rgba(239,68,68,0.9)";   // vermelho
            return "rgba(220,38,38,1)";                            // vermelho vivo
          };
          const getCellTextColor = (valor, maxValor) => {
            if (valor === 0) return "transparent";
            const intensity = Math.min(valor / maxValor, 1);
            return intensity < 0.35 ? "#7c2d12" : "#fff"; // texto escuro em fundos claros
          };
          const maxCellValue = Math.max(...clientesExibidos.flatMap(c => Object.values(c.meses).map(m => m.valor)), 1);

          // Total por mês (linha de total no rodapé)
          const totalPorMes = {};
          mesesUnicos.forEach(m => { totalPorMes[m] = 0; });
          clientesExibidos.forEach(c => {
            Object.entries(c.meses).forEach(([m,d]) => {
              if (totalPorMes[m] !== undefined) totalPorMes[m] += d.valor;
            });

          // Função: produtos vendidos no contexto filtrado

            (v.produtos || []).forEach(p => {

              produtosFiltrados[p.codigo].qtde += p.qtde || 0;
              produtosFiltrados[p.codigo].valor += p.vlrTotal || 0;
              produtosFiltrados[p.codigo].vendas++;
            });
          });
          const topProdsFiltro = Object.values(produtosFiltrados).sort((a,b) => b.valor - a.valor).slice(0,15);
          const temFiltroAtivo = fluxoCidadeFiltro || fluxoVendedorFiltro || fluxoStatusFiltro.length > 0 || fluxoSearch.trim();

          // Exportar CSV
          const exportarCSV = () => {
            const linhas = [];
            const header = ["Cliente","ID","Cidade","Total","Vendas","Ticket Médio","Dias sem comprar","Tendência %","Gap médio (dias)", ...mesesUnicos];
            linhas.push(header.join(";"));
            clientesExibidos.forEach(c => {
              const linha = [
                `"${c.nome}"`, c.id, `"${c.cidade}"`,
                c.total.toFixed(2).replace(".", ","),
                c.vendas, c.ticketMedio.toFixed(2).replace(".", ","),
                c.diasSemCompra, c.tendencia.toFixed(1).replace(".", ","),
                c.gapMedio.toFixed(0),
                ...mesesUnicos.map(m => (c.meses[m]?.valor || 0).toFixed(2).replace(".", ","))

              linhas.push(linha.join(";"));

            const csv = "\uFEFF" + linhas.join("\n");
            const blob = new Blob([csv], {type: "text/csv;charset=utf-8"});
            const url = URL.createObjectURL(blob);

                  <div style={{display:"flex",alignItems:"flex-end",gap:8,height:140}}>
                    {sazonalidade.map((s,i) => {

        {/* ABANDONO & RECUPERAÇÃO TAB */}
        {tab === "abandono" && (() => {
          const allSalesRaw = [];
          Object.entries(vendas).forEach(([mes, arr]) => {
            if (Array.isArray(arr)) arr.forEach(v => allSalesRaw.push(v));
          });
          // v3 FIX: filtrar vendas de clientes inativados
          // v6: aplica alias e filtra inativos
          const allSales = allSalesRaw
            .map(v => v.clienteId && aliasClientes[String(v.clienteId)] ? {...v, clienteId: resolveAlias(v.clienteId)} : v)
            .filter(v => !inativosIds.has(v.clienteId));

          // v3 FIX: aplicar mods (inativação) nos clientes
          const clientesComMods = clientes.map(c => getClientData(c));
          const inativosSet = new Set(clientesComMods.filter(c => c.a !== 1).map(c => c.i));

          // v4: mapa de Kanbans ativos (cliente_id -> kanban) + busca por membros IDE
          const kanbanPorCliente = {};
          kanbans.forEach(k => {
            if (String(k.finalizado).toLowerCase() === 'sim') return;
            // Associa o kanban ao cliente_id original
            kanbanPorCliente[String(k.cliente_id)] = k;
          });
          // Helper: retorna kanban se cliente (ou qualquer membro do grupo IDE) estiver no Kanban
          const findKanban = (membros) => {
            if (!Array.isArray(membros)) return null;
            for (const mid of membros) {
              if (kanbanPorCliente[String(mid)]) return kanbanPorCliente[String(mid)];
            }
            return null;
          };
          const STATUS_CORES_KANBAN = {
            aberto:  { cor: '#60a5fa', label: 'Aberto',           emoji: '🔵' },
            contato: { cor: '#4ade80', label: 'Em contato',       emoji: '🟢' },
            retorno: { cor: '#fb923c', label: 'Retorno provável', emoji: '🟠' },
            perdido: { cor: '#6b7280', label: 'Perdido',          emoji: '⚫' }
          };

          const clienteToCidade = {};
          const clienteToNome = {};
          const clienteAtivo = {};
          clientesComMods.forEach(c => { 
            clienteToCidade[c.i] = c.c; 
            clienteToNome[c.i] = c.n;
            clienteAtivo[c.i] = c.a;
          });

          const cidadesDisp = [...new Set(allSales.map(v => clienteToCidade[v.clienteId]).filter(Boolean))].sort();
          const vendedoresDisp = filtrarVendedoresAtivos([...new Set(allSales.map(v => v.vendedor || "SEM VENDEDOR"))]).sort();

          // Construir clientes AGRUPADOS POR IDE
          const clienteMap = {};
          allSales.forEach(v => {
            const id = v.clienteId;
            if (!id) return;
            if (inativosSet.has(id)) return; // v3 FIX: ignorar vendas de clientes inativados
            const ideInfo = clienteIdeMap[id];
            const key = ideInfo ? ideInfo.key : 'cli_' + id;
            
            if (!clienteMap[key]) clienteMap[key] = {
              id: key,
              nome: ideInfo?.nome || v.nomeCliente || clienteToNome[id] || `Cliente ${id}`,
              code: ideInfo?.code || null,
              isIde: ideInfo?.isIde || false,
              cidade: ideInfo?.cidade || clienteToCidade[id] || "—",
              membros: ideInfo?.membros || [id],
              vendas: 0, total: 0,
              ultimaCompra: "", primeiraCompra: "9999-99",
              vendedoresHist: {},
              produtos: {}
            };
            clienteMap[key].vendas++;
            clienteMap[key].total += v.valorLiquido || 0;
            if (v.data > clienteMap[key].ultimaCompra) clienteMap[key].ultimaCompra = v.data;
            if (v.data < clienteMap[key].primeiraCompra) clienteMap[key].primeiraCompra = v.data;
            const vd = v.vendedor || "SEM VENDEDOR";
            clienteMap[key].vendedoresHist[vd] = (clienteMap[key].vendedoresHist[vd] || 0) + (v.valorLiquido || 0);
            (v.produtos || []).forEach(p => {
              if (!clienteMap[key].produtos[p.codigo]) clienteMap[key].produtos[p.codigo] = {desc: p.descricao, qtde: 0, valor: 0};
              clienteMap[key].produtos[p.codigo].qtde += p.qtde || 0;
              clienteMap[key].produtos[p.codigo].valor += p.vlrTotal || 0;
            });
          });

          // Adicionar clientes/grupos sem vendas
          clientesComMods.forEach(c => {
            if (c.a !== 1) return;
            const ideInfo = clienteIdeMap[c.i];
            const key = ideInfo ? ideInfo.key : 'cli_' + c.i;
            if (!clienteMap[key]) {
              clienteMap[key] = {
                id: key, nome: ideInfo?.nome || c.n, code: ideInfo?.code || null,
                isIde: ideInfo?.isIde || false,
                cidade: ideInfo?.cidade || c.c || "—",
                membros: ideInfo?.membros || [c.i],
                vendas: 0, total: 0, ultimaCompra: "", primeiraCompra: "",
                vendedoresHist: {}, produtos: {},
                semHistorico: true
              };
            }
          });

          const ultimaDataSistema = allSales.reduce((max, v) => v.data > max ? v.data : max, "");
          const hoje = ultimaDataSistema ? new Date(ultimaDataSistema) : new Date();
          const diasSemCompra = (data) => data ? Math.floor((hoje - new Date(data)) / 86400000) : 9999;

          // Calcular status, vendedor principal e potencial perdido
          let clientesArr = Object.values(clienteMap)
            .filter(c => {
              // Verificar se TODOS os membros estão ativos
              return c.membros.some(mid => clienteAtivo[mid] !== 0);
            })
            .map(c => {
              const dias = diasSemCompra(c.ultimaCompra);
              const status = dias <= 15 ? "ativo"
                : dias <= 30 ? "recente"
                : dias <= 60 ? "atencao"
                : dias <= 90 ? "risco"
                : "abandonado";
              
              // Vendedor principal histórico
              const vendOrd = Object.entries(c.vendedoresHist).sort(([,a],[,b]) => b - a);
              const vendedorPrincipal = vendOrd[0]?.[0] || "—";
              
              // Potencial perdido = ticket médio × frequência esperada × meses sem comprar
              // Frequência esperada = vendas / meses ativos
              const ticketMedio = c.vendas > 0 ? c.total / c.vendas : 0;
              const mesesAtivos = c.primeiraCompra && c.ultimaCompra
                ? Math.max(1, Math.ceil((new Date(c.ultimaCompra) - new Date(c.primeiraCompra)) / (86400000 * 30)))
                : 1;
              const freqMensal = c.vendas / mesesAtivos;
              const mesesParado = Math.floor(dias / 30);
              const potencialPerdido = ticketMedio * freqMensal * mesesParado;
              
              return {
                ...c, diasSemCompra: dias, status, vendedorPrincipal,
                ticketMedio, freqMensal, potencialPerdido,
                temAnotacoes: (() => {
                  // Checar anotações pela key do grupo E pelos IDs individuais dos membros
                  if (anotacoes[c.id] && anotacoes[c.id].length > 0) return true;
                  return c.membros.some(mid => anotacoes[mid] && anotacoes[mid].length > 0);
                })()
              };
            });

          // Filtros
          if (abandonoFiltro.length > 0) {
            clientesArr = clientesArr.filter(c => abandonoFiltro.includes(c.status));
          }
          if (abandonoCidade) clientesArr = clientesArr.filter(c => c.cidade === abandonoCidade);
          if (abandonoVendedor) clientesArr = clientesArr.filter(c => c.vendedorPrincipal === abandonoVendedor);
          if (abandonoSearch.trim()) {
            const q = abandonoSearch.toLowerCase();
            clientesArr = clientesArr.filter(c => c.nome.toLowerCase().includes(q) || String(c.id).includes(q));
          }

          // Ordenar
          if (abandonoOrdem === "valor") clientesArr.sort((a,b) => b.total - a.total);
          else if (abandonoOrdem === "potencial") clientesArr.sort((a,b) => b.potencialPerdido - a.potencialPerdido);
          else if (abandonoOrdem === "dias") clientesArr.sort((a,b) => b.diasSemCompra - a.diasSemCompra);
          else if (abandonoOrdem === "vendas") clientesArr.sort((a,b) => b.vendas - a.vendas);

          // Stats geral
          const totalAtivos = Object.values(clienteMap).filter(c => clienteAtivo[c.id] !== 0).length;
          const cAtivo = clientesArr.filter(c => c.status === "ativo").length;
          const cRecente = clientesArr.filter(c => c.status === "recente").length;
          const cAtencao = clientesArr.filter(c => c.status === "atencao").length;
          const cRisco = clientesArr.filter(c => c.status === "risco").length;
          const cAbandonado = clientesArr.filter(c => c.status === "abandonado").length;
          const totalPotencialPerdido = clientesArr.filter(c => ["risco","abandonado"].includes(c.status)).reduce((s,c) => s + c.potencialPerdido, 0);
          
          // Recuperação por vendedor (clientes que estavam parados e voltaram)
          // Lógica: cliente que tinha ficado >60 dias parado e comprou nos últimos 30 dias, atribuído ao vendedor da última compra
          const recuperadosPorVendedor = {};
          Object.values(clienteMap).forEach(c => {
            if (!c.ultimaCompra) return;
            const datasOrd = []; // pega vendas do cliente
            allSales.filter(v => v.clienteId === c.id).sort((a,b) => a.data.localeCompare(b.data)).forEach(v => datasOrd.push(v));
            
            // Procurar gaps >= 60 dias seguidos por uma nova compra
            for (let i = 1; i < datasOrd.length; i++) {
              const gap = (new Date(datasOrd[i].data) - new Date(datasOrd[i-1].data)) / 86400000;
              if (gap >= 60) {
                const vd = datasOrd[i].vendedor || "SEM VENDEDOR";
                if (!recuperadosPorVendedor[vd]) recuperadosPorVendedor[vd] = {vendedor: vd, recuperacoes: 0, valor: 0, clientes: new Set()};
                recuperadosPorVendedor[vd].recuperacoes++;
                recuperadosPorVendedor[vd].valor += datasOrd[i].valorLiquido || 0;
                recuperadosPorVendedor[vd].clientes.add(c.id);
              }
            }
          });
          const rankRecuperacao = Object.values(recuperadosPorVendedor)
            .map(r => ({...r, clientesUnicos: r.clientes.size}))
            .sort((a,b) => b.valor - a.valor);

          if (allSales.length === 0) {
            return (
              <div style={{animation:"fadeIn .4s ease",textAlign:"center",padding:"60px 20px"}}>
                <div style={{fontSize:48,marginBottom:16,opacity:0.4}}>🚨</div>

              </div>
            );
          }

          return (
            <div style={{animation:"fadeIn .4s ease"}}>
              {/* Header informativo */}
              <div style={{background:"linear-gradient(135deg,#2a0a0a,#3b1111)",border:"1px solid #5c2020",borderRadius:12,padding:16,marginBottom:20}}>
                <div style={{display:"flex",alignItems:"center",gap:14}}>
                  <div style={{fontSize:32}}>🚨</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:16,fontWeight:700,color:"#fca5a5"}}>Central de Recuperação de Clientes</div>
                    <div style={{fontSize:12,color:"#8899bb",marginTop:4}}>
                      Identifique clientes em fuga • Registre contatos • Acompanhe recuperações • Bonifique vendedores que reativarem
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:11,color:"#8899bb"}}>POTENCIAL PERDIDO (Risco + Abandono)</div>
                    <div style={{fontSize:22,fontWeight:700,color:"#ef4444"}}>R$ {totalPotencialPerdido.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>

                      : "Selecione clientes (ao menos 2, sendo um já em IDE)"
                    }
                  </button>
                </div>
              );
            })()}

            {/* SUGERIR DUPLICADOS */}
            {ideAction === "sugerir" && (() => {
              // Encontrar possíveis duplicados: mesmo endereço ou nomes muito parecidos na mesma cidade
              const sugestoes = [];
              const allClients = clientes.map(c => getClientData(c)).filter(c => c.a === 1);
              
              // Agrupar por cidade
              const porCidade = {};
              allClients.forEach(c => {
                if (!porCidade[c.c]) porCidade[c.c] = [];
                porCidade[c.c].push(c);
              });
              
              Object.entries(porCidade).forEach(([cidade, lista]) => {
                if (lista.length < 2) return;
                for (let i = 0; i < lista.length; i++) {
                  for (let j = i+1; j < lista.length; j++) {
                    const a = lista[i], b = lista[j];
                    if (a.d && b.d && a.d === b.d) continue; // já no mesmo IDE
                    
                    // Mesmo endereço (rua + número)
                    const mesmoEnd = a.r && b.r && a.nu && b.nu 
                      && a.r.replace(/\s+/g,'').toLowerCase() === b.r.replace(/\s+/g,'').toLowerCase()
                      && a.nu === b.nu;
                    
                    // Nomes parecidos (primeiras 3 palavras iguais)
                    const palavrasA = a.n.toUpperCase().split(/\s+/).filter(w => w.length > 2).slice(0,3).join(' ');
                    const palavrasB = b.n.toUpperCase().split(/\s+/).filter(w => w.length > 2).slice(0,3).join(' ');
                    const nomePar = palavrasA.length > 5 && palavrasB.length > 5 && palavrasA === palavrasB;
                    
                    if (mesmoEnd || nomePar) {
                      sugestoes.push({
                        a, b, cidade, motivo: mesmoEnd ? "📍 Mesmo endereço" : "📝 Nome parecido",
                        key: [a.i,b.i].sort().join('-')
                      });
                    }
                  }
                }
              });
              
              // Remover duplicatas
              const vistos = new Set();
              const unicas = sugestoes.filter(s => {
                if (vistos.has(s.key)) return false;
                vistos.add(s.key);
                return true;
              });

              return (
                <div style={{background:"#0a1220",borderRadius:10,padding:20,marginBottom:16}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#f59e0b"}}>🔍 Possíveis Duplicados Encontrados</div>
                    <button onClick={() => setIdeAction(null)} style={{fontSize:11,color:"#5a7a9a",background:"none",border:"none",cursor:"pointer"}}>← Voltar</button>
                  </div>
                  <div style={{fontSize:11,color:"#5a7a9a",marginBottom:16}}>
                    {unicas.length} possíveis duplicados encontrados. Analise cada par e decida se deseja criar um grupo IDE.
                  </div>
                  <div style={{maxHeight:500,overflowY:"auto"}}>
                    {unicas.length === 0 && (
                      <div style={{padding:30,textAlign:"center",color:"#5a7a9a"}}>Nenhum duplicado encontrado! Base limpa.</div>
                    )}
                    {unicas.map((s,si) => (
                      <div key={s.key} style={{padding:14,background:"#111c30",borderRadius:8,marginBottom:10,border:"1px solid #1e3050"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{padding:"3px 8px",background:"rgba(245,158,11,0.15)",border:"1px solid #f59e0b",borderRadius:4,fontSize:10,color:"#fbbf24",fontWeight:600}}>{s.motivo}</span>
                            <span style={{fontSize:11,color:"#5a7a9a"}}>{s.cidade}</span>
                          </div>
                          <button onClick={() => {
                            const cidNorm = s.cidade.replace(/\s+/g,"").toUpperCase();
                            const existentes = ides.filter(i => i.includes(cidNorm)).length;
                            const nomeIde = `IDE_${cidNorm}_${String(existentes+1).padStart(2,'0')}`;
                            const newMods = {...mods};
                            [s.a.i, s.b.i].forEach(id => { if(!newMods[id]) newMods[id]={}; newMods[id].d=nomeIde; });
                            saveMods(newMods);
                            showToast(`✅ Grupo ${nomeIde} criado com 2 clientes!`);
                          }} style={{padding:"6px 14px",background:"linear-gradient(135deg,#7c3aed,#6d28d9)",border:"none",borderRadius:6,color:"#fff",fontSize:11,fontWeight:600,cursor:"pointer"}}>
                            🔗 Criar IDE
                          </button>
                        </div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                          {[s.a, s.b].map(c => (
                            <div key={c.i} style={{padding:10,background:"#0a1220",borderRadius:6,border:"1px solid #152240"}}>
                              <div style={{fontSize:12,fontWeight:600,color:"#e2e8f0"}}>{c.n}</div>
                              <div style={{fontSize:10,color:"#5a7a9a",marginTop:4}}>
                                ID {c.i} • {c.r}, {c.nu} • {c.b}
                                {c.d && <span style={{color:"#a78bfa",marginLeft:6}}>IDE: {c.d}</span>}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}

            {/* LISTA DE TODOS OS GRUPOS IDE */}
            {!ideAction && (
              <div>
                <div style={{fontSize:13,color:"#5a7a9a",marginBottom:12}}>{ides.filter(i=>i!=="TODOS"&&i!=="COM_IDE"&&i!=="SEM_IDE").length} grupos cadastrados</div>
                <div style={{maxHeight:500,overflowY:"auto"}}>

                          <div style={{display:"flex",alignItems:"center",gap:8}}>

                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

          </div>
        </div>

                    <div style={{display:"flex",gap:8}}>
                      <button onClick={() => setShowConfirmReset(null)} style={{flex:1,padding:"10px",background:"#1a2744",border:"1px solid #2a3f66",borderRadius:8,color:"#8899bb",fontSize:12,cursor:"pointer"}}>Cancelar</button>
                      <button onClick={async () => {
                        setShowConfirmReset(3);
                        setResetProgress({total: 3, done: 0, current: "Apagando índice principal..."});
                        
                        // Estratégia super simples: apagar apenas o ÍNDICE
                        // Sem o índice, o loadVendas não vai carregar NADA
                        // O resto fica "órfão" mas não causa problema
                        
                        try {
                          await window.storage.delete(VENDAS_STORAGE);
                          setResetProgress({total: 3, done: 1, current: "Índice apagado"});
                        } catch(e) {
                          try { await window.storage.set(VENDAS_STORAGE, JSON.stringify({version:2, anos:[]})); } catch(ee) {}
                          setResetProgress({total: 3, done: 1, current: "Índice zerado"});
                        }
                        
                        await new Promise(r => setTimeout(r, 300));
                        setResetProgress({total: 3, done: 2, current: "Limpando memória..."});
                        
                        setVendas({});
                        setAnosSelecionados([]);
                        setHoveredMes(null);
                        
                        await new Promise(r => setTimeout(r, 300));
                        setResetProgress({total: 3, done: 3, current: "Concluído!"});
                        
                        await new Promise(r => setTimeout(r, 500));
                        setResetProgress(null);
                        setShowConfirmReset(null);
                        setShowBackupModal(false);
                        showToast("✅ Reset concluído! Sistema pronto para novas importações.");
                      }} style={{flex:1,padding:"10px",background:"#dc2626",border:"none",borderRadius:8,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>CONFIRMAR RESET</button>
                    </div>
                  </div>
                ) : (
                  // Modo 3: progresso em andamento
                  <div style={{background:"#1a0a0a",border:"1px solid #dc2626",borderRadius:10,padding:20,textAlign:"center"}}>
                    <div style={{fontSize:24,marginBottom:12,animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</div>
                    <div style={{fontSize:14,fontWeight:700,color:"#fca5a5",marginBottom:4}}>Resetando vendas...</div>
                    <div style={{fontSize:11,color:"#8899bb",marginBottom:16,fontFamily:"monospace"}}>
                      {resetProgress?.current || "..."}
                    </div>
                    <div style={{height:14,background:"#0a1220",borderRadius:7,overflow:"hidden",marginBottom:8,border:"1px solid #3a1010"}}>
                      <div style={{
                        height:"100%",
                        width:`${resetProgress?.total > 0 ? (resetProgress.done / resetProgress.total) * 100 : 0}%`,
                        background:"linear-gradient(90deg,#dc2626,#f87171)",
                        transition:"width .3s ease",
                        boxShadow:"0 0 10px rgba(220,38,38,0.5)"
                      }}/>
                    </div>
                    <div style={{fontSize:13,fontWeight:700,color:"#fca5a5"}}>
                      {resetProgress?.done || 0} de {resetProgress?.total || 0} meses 
                      ({resetProgress?.total > 0 ? Math.round((resetProgress.done / resetProgress.total) * 100) : 0}%)
                    </div>
                  </div>
                )}
              </div>
            </div>
            <button onClick={() => setShowBackupModal(false)} style={{
              width:"100%",marginTop:16,padding:"10px",background:"none",border:"1px solid #1e3050",
              borderRadius:8,color:"#5a7a9a",fontSize:12,cursor:"pointer"
            }}>Fechar</button>
          </div>
        </div>

      {/* v2: COMMAND PALETTE (Cmd+K) */}
      {cmdkOpen && (() => {
        const q = cmdkQuery.trim().toLowerCase();
        const tabActions = [
          {type:"tab",key:"dashboard",label:"📊 Dashboard",hint:"Alt+1"},
          {type:"tab",key:"clientes",label:"👥 Clientes",hint:"Alt+2"},
          {type:"tab",key:"importar",label:"📥 Importar Vendas",hint:"Alt+3"},
          {type:"tab",key:"cidade",label:"🏙 Cidade",hint:"Alt+4"},
          {type:"tab",key:"produtos",label:"📦 Produtos",hint:"Alt+5"},
          {type:"tab",key:"vendedores",label:"🏆 Vendedores",hint:"Alt+6"},
          {type:"tab",key:"fluxo",label:"📈 Fluxo de Vendas",hint:"Alt+7"},
          {type:"tab",key:"abandono",label:"🚨 Abandono & Recuperação",hint:"Alt+8"},
          {type:"tab",key:"metas",label:"🎯 Metas",hint:"Alt+9"},
        ];
        const actionItems = [
          {type:"action",key:"backup",label:"💾 Abrir Backup",fn:()=>{setShowBackupModal(true);}},
          {type:"action",key:"ide",label:"🔗 Gerenciar IDEs",fn:()=>{setShowIdeManager(true);}},
        ];
        // Clientes filtrados (top 20)
        const clienteItems = !q ? [] : clientes
          .filter(c => (c.a!==0) && ((c.n||"").toLowerCase().includes(q) || String(c.i).includes(q) || (c.c||"").toLowerCase().includes(q)))
          .slice(0,20)
          .map(c => ({type:"cliente",key:"c_"+c.i,label:c.n,hint:`#${c.i} • ${c.c}`,cliente:c}));
        const filtered = !q
          ? [...tabActions, ...actionItems]
          : [
              ...tabActions.filter(t => t.label.toLowerCase().includes(q)),
              ...actionItems.filter(a => a.label.toLowerCase().includes(q)),
              ...clienteItems
            ];
        const idx = Math.min(cmdkIndex, Math.max(0, filtered.length-1));
        const execItem = (it) => {
          if (!it) return;
          if (it.type === "tab") setTab(it.key);
          else if (it.type === "action") it.fn();
          else if (it.type === "cliente") { setTab("clientes"); setSelectedClient(it.cliente); setSearch(it.cliente.n); }

          position:"fixed",bottom:24,right:24,
