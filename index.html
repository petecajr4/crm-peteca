  // ============================================================

  const TICKETFLOW_API = 'https://script.google.com/macros/s/AKfycby3EY-mk4FmQZxi3AYUj_pbUPjzDNonrIZPt4aeGttRJYDhpNKT57qfbziptX8Jc2Q/exec';

  const VENDEDORES_TICKETFLOW = ["Denis","Reginaldo","Anderson","Anne","Lex","Emerson","Cassia","Anna","Alisson","Pardal","Tiago"];
  
  const callTicketFlowAPI = async (params) => {
    try {
      const url = TICKETFLOW_API + '?action=' + params.action + '&payload=' + encodeURIComponent(JSON.stringify(params)) + '&t=' + Date.now();
      const res = await fetch(url, { method: 'GET', redirect: 'follow' });
      const text = await res.text();
      try { return JSON.parse(text); } catch(_) {}
      const start = text.search(/[{\[]/);
      if (start !== -1) return JSON.parse(text.slice(start));
      return { ok: false, error: 'Resposta inválida' };
    } catch(e) {
      return { ok: false, error: e.message };
    }
  };

  // Criar ticket de Recontato no TicketFlow
  const criarRecontato = async (cliente, vendedorEscolhido) => {
    const topProds = Object.entries(cliente.produtos || {})
      .sort(([,a],[,b]) => b.valor - a.valor)
      .slice(0, 5)
      .map(([,p]) => p.desc)
      .join(', ');
    
    const diasInfo = cliente.diasSemCompra >= 9999 ? "Nunca comprou" : `${cliente.diasSemCompra} dias sem comprar`;
    
    const ticketData = {
      id: null,
      assunto: `🔄 Recontato: ${cliente.nome}`,
      desc: `📋 RECONTATO GERADO PELO CRM PETECA\n\n` +
        `👤 Cliente: ${cliente.nome}\n` +
        `🏙 Cidade: ${cliente.cidade}\n` +
        `⏰ Situação: ${diasInfo}\n` +
        `💰 Total histórico: R$ ${(cliente.total||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}\n` +
        `📦 Top produtos: ${topProds || 'sem histórico'}\n\n` +
        `🎯 Objetivo: Recuperar este cliente. Entrar em contato, entender motivo do afastamento e tentar reativar.`,
      resp: vendedorEscolhido,
      urgency: 'yellow',
      tags: [],  // será preenchido com ID da tag Recontato
      participants: ['Bruno','Rodrigo','Junior', vendedorEscolhido].filter((v,i,a)=>a.indexOf(v)===i),
      images: [],
      status: 'aberto',
      createdBy: 'CRM Peteca',
      empresa: cliente.nome,
      telefone: '',
      endereco: `${cliente.cidade}`,
      ascont: `CRM_${cliente.id}`,
      visitaData: '',
      visitaHora: '',
      valor: '',
    };

    // Buscar tags do TicketFlow pra encontrar o ID da tag Recontato
    try {
      const allData = await callTicketFlowAPI({action:'getAll'});
      if (allData.ok && allData.tags) {
        const recontatoTag = allData.tags.find(t => t.name === 'Recontato');
        if (recontatoTag) ticketData.tags = [recontatoTag.id];
      }
    } catch(e) {}

    const result = await callTicketFlowAPI({action:'saveTicket', ticket: ticketData});
    return result;
  };

  // Sincronizar comentários do TicketFlow → anotações do CRM
  const syncRecontatosFromTicketFlow = async () => {
    setTicketflowSyncing(true);
    try {
      const allData = await callTicketFlowAPI({action:'getAll'});
      if (!allData.ok) { setTicketflowSyncing(false); return 0; }
      
      const recontatoTag = (allData.tags||[]).find(t => t.name === 'Recontato');
      if (!recontatoTag) { setTicketflowSyncing(false); return 0; }
      
      // Filtrar tickets com tag Recontato que vieram do CRM
      const tickets = (allData.tickets||[]).filter(t => {
        if (typeof t.tags === 'string') try { t.tags = JSON.parse(t.tags); } catch { t.tags = []; }
        return (t.tags||[]).includes(recontatoTag.id) && (t.ascont||'').startsWith('CRM_');
      });
      
      let novosComentarios = 0;
      const novasAnot = {...anotacoes};
      
      for (const ticket of tickets) {
        const clienteKey = ticket.ascont; // ex: "CRM_ide_IDE_ANDRADINA_03" ou "CRM_cli_1234"
        const crmKey = clienteKey.replace('CRM_','');
        
        // Buscar comentários deste ticket
        const cmtResult = await callTicketFlowAPI({action:'getComments', ticketId: ticket.id});
        if (!cmtResult.ok) continue;
        
        const comentarios = cmtResult.comments || [];
        if (!novasAnot[crmKey]) novasAnot[crmKey] = [];
        
        comentarios.forEach(cmt => {
          // Verificar se já existe (por data + texto)
          const jaExiste = novasAnot[crmKey].some(a => 
            a.ticketflowId === cmt.id || (a.data === cmt.date && a.obs === cmt.text)
          );
          
          if (!jaExiste) {
            novasAnot[crmKey].push({
              tipo: "ticketflow",
              vendedor: cmt.author || "TicketFlow",
              data: cmt.date || new Date().toISOString(),
              dataDisplay: cmt.date ? new Date(cmt.date).toLocaleDateString('pt-BR') + ' ' + new Date(cmt.date).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : new Date().toLocaleDateString('pt-BR'),
              obs: cmt.text || "",
              ticketflowId: cmt.id,
              ticketId: ticket.id
            });
            novosComentarios++;
          }
        });
        
        // Se ticket finalizado, adicionar nota de encerramento
        if (ticket.archived === 'sim' || ticket.status === 'finalizado') {
          const jaFinalizado = novasAnot[crmKey].some(a => a.ticketflowFinalizado === ticket.id);
          if (!jaFinalizado) {
            novasAnot[crmKey].push({
              tipo: "ticketflow",
              vendedor: "Sistema",
              data: new Date().toISOString(),
              dataDisplay: new Date().toLocaleDateString('pt-BR'),
              obs: `🏁 Ticket Recontato FINALIZADO (#${String(ticket.id).slice(-6).toUpperCase()})`,
              ticketflowFinalizado: ticket.id,
              ticketId: ticket.id
            });
            novosComentarios++;
          }
        }
      }
      
      if (novosComentarios > 0) {
        setAnotacoes(novasAnot);
        try { await window.storage.set(ANOTACOES_STORAGE, JSON.stringify(novasAnot)); } catch(e) {}
      }
      
      setTicketflowSyncing(false);
      return novosComentarios;
    } catch(e) {
      console.error("Erro sync TicketFlow:", e);
      setTicketflowSyncing(false);
      return 0;
    }
  };

  // ============================================================
  // PARSER CSV PETECA (roda 100% no navegador)
  // ============================================================
  const parseSintetico = (text) => {
    const lines = text.split('\n').map(l => l.replace('\r',''));
    const vendas = [];
    let periodo = "";
    
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const parts = line.split(';');
      if (parts.length < 2) continue;
      const content = parts[1] || "";
      
      // Extrair período
      if (content.includes("Período:")) {
        const m = content.match(/Período:\s*(\d{2}\/\d{2}\/\d{4})\s*a\s*(\d{2}\/\d{2}\/\d{4})/);
        if (m) periodo = m[1] + " a " + m[2];
      }
      
      // Linha de venda: começa com Nº Saída + data (com ou sem hora) + ID cliente
      const vendaMatch = content.match(/^(\d{1,6})\s+(\d{2}\/\d{2}\/\d{2,4})(?:\s+(\d{2}:\d{2}))?\s+(\d+)\s+/);
      if (vendaMatch) {
        const numSaida = vendaMatch[1];
        let data = vendaMatch[2];
        const hora = vendaMatch[3] || "";
        const clienteId = parseInt(vendaMatch[4]);
        
        // Normalizar data para yy (2 dígitos)
        let dataForSort;
        if (data.length === 10) {
          // dd/mm/yyyy -> yyyy-mm-dd
          dataForSort = data.slice(6) + "-" + data.slice(3,5) + "-" + data.slice(0,2);
          data = data.slice(0,6) + data.slice(8); // converter para dd/mm/yy para display
        } else {
          // dd/mm/yy -> 20yy-mm-dd
          dataForSort = "20" + data.slice(6) + "-" + data.slice(3,5) + "-" + data.slice(0,2);
        }
        
        // Extrair valor (último número com vírgula na linha)
        const valorMatch = content.match(/(\d[\d.]*,\d{2})\s*$/);
        const valor = valorMatch ? parseFloat(valorMatch[1].replace(/\./g,'').replace(',','.')) : 0;
        
        // Extrair condição de pagamento
        let condPagto = "À VISTA";
        if (content.includes("ACORDO")) condPagto = content.match(/(ACORDO\s*\/\s*\d+\s*DIAS)/)?.[1] || "ACORDO";
        else if (content.includes("15/30")) condPagto = "15/30 DIAS / BOL";
        else if (content.includes("C. DEBITO")) condPagto = "C. DEBITO";
        else if (content.includes("C. CREDITO")) condPagto = "C. CREDITO";
        else if (content.includes("7 DIAS")) condPagto = "7 DIAS";
        else if (content.includes("14 DIAS")) condPagto = "14 DIAS";
        else if (content.includes("30 DIAS")) condPagto = "30 DIAS";
        else if (content.includes("À VISTA")) condPagto = "À VISTA";
        
        // Vendedor pode estar nesta linha ou na próxima
        let vendedor = "";
        let nomeCliente = "";
        const vendedorMatchInline = content.match(/(ANDERSON|REGINALDO|LEX|NATAN|MARCOS|CARLOS|RAFAEL|RICARDO|FELIPE|WAGNER|LUCAS|DIEGO|FABIO|PEDRO|JOÃO|JOSE|MARIA|ANA|PAULO|ROBERTO|FERNANDO|GABRIEL|MATHEUS|BRUNO|DANIEL|GUSTAVO|THIAGO|VINICIUS|HENRIQUE|LEONARDO|EMPRESA|VENDAS\s*\d*|CARLA\/?\w*)\s*[\d.,]*\s*$/i);
        if (vendedorMatchInline) vendedor = vendedorMatchInline[1].toUpperCase();
        
        // Próxima linha: nome do cliente e/ou vendedor
        if (i + 1 < lines.length) {
          const nextLine = (lines[i+1].split(';')[1] || "").trim();
          if (nextLine && !nextLine.match(/^\d{1,6}\s+\d{2}\/\d{2}\/\d{2,4}/)) {
            // Extrair vendedor do final da próxima linha
            const nextVendedorMatch = nextLine.match(/\s+(ANDERSON|REGINALDO|LEX|NATAN|MARCOS|CARLOS|RAFAEL|RICARDO|FELIPE|WAGNER|LUCAS|DIEGO|FABIO|PEDRO|EMPRESA|VENDAS\s*\d*|CARLA\/?\w*)\s*$/i);
            if (nextVendedorMatch) {
              vendedor = vendedor || nextVendedorMatch[1].toUpperCase();
              nomeCliente = nextLine.replace(nextVendedorMatch[0], '').trim();
            } else {
              nomeCliente = nextLine.trim();
            }
          }
        }
        
        // Extrair nome do cliente que pode estar na mesma linha (formato: ID - NOME ... COND_PAGTO)
        if (!nomeCliente) {
          const nomeInline = content.match(/\d+\s+-\s+(.+?)\s+(?:À VISTA|7 DIAS|14 DIAS|30 DIAS|ACORDO|15\/30)/);
          if (nomeInline) nomeCliente = nomeInline[1].trim();
        }
        
        vendas.push({
          numSaida,
          data: dataForSort,
          dataDisplay: data,
          hora,
          clienteId,
          nomeCliente,
          vendedor,
          condPagto,
          valorLiquido: valor,
          produtos: []
        });
      }
    }
    return { vendas, periodo };
  };

  const parseAnalitico = (text) => {
    const lines = text.split('\n').map(l => l.replace('\r',''));
    const vendasMap = {};
    let currentVenda = null;
    let inProdutos = false;
    let currentProdDesc = "";
    let periodo = "";
    
    for (let i = 0; i < lines.length; i++) {
      const parts = lines[i].split(';');
      if (parts.length < 2) continue;
      const content = (parts[1] || "").trim();
      if (!content) continue;
      
      if (content.includes("Período:")) {
        const m = content.match(/Período:\s*(\d{2}\/\d{2}\/\d{4})\s*a\s*(\d{2}\/\d{2}\/\d{4})/);
        if (m) periodo = m[1] + " a " + m[2];
      }
      
      // Nova venda: começa com 1-6 dígitos + data (dd/mm/yyyy ou dd/mm/yy)
      const vendaMatch = content.match(/^(\d{1,6})\s+(\d{2}\/\d{2}\/\d{2,4})\s+/);
      if (vendaMatch) {
        if (currentVenda) vendasMap[currentVenda.numSaida] = currentVenda;
        
        const numSaida = vendaMatch[1];
        let dataStr = vendaMatch[2];
        // Normalizar data para dd/mm/yyyy
        if (dataStr.length === 8) dataStr = dataStr.slice(0,6) + "20" + dataStr.slice(6);
        
        // Extrair nome do cliente (entre data e status P/C)
        let nomeCliente = "";
        const clienteMatch = content.match(/\d{2}\/\d{2}\/\d{4}\s+(.+?)\s+P\s+/);
        if (clienteMatch) nomeCliente = clienteMatch[1].trim();
        
        // Condição de pagamento
        let condPagto = "À VISTA";
        if (content.includes("ACORDO")) condPagto = content.match(/(ACORDO\s*\/\s*\d+\s*DIAS)/)?.[1] || "ACORDO";
        else if (content.includes("15/30")) condPagto = "15/30 DIAS / BOL";
        else if (content.includes("7 DIAS")) condPagto = "7 DIAS";
        else if (content.includes("14 DIAS")) condPagto = "14 DIAS";
        else if (content.includes("30 DIAS")) condPagto = "30 DIAS";
        
        currentVenda = {
          numSaida,
          data: dataStr.slice(6) + "-" + dataStr.slice(3,5) + "-" + dataStr.slice(0,2),
          nomeCliente,
          condPagto,
          produtos: [],
          valorTotal: 0,
          desconto: 0,
          frete: 0,
          valorLiquido: 0,
          vendedor: ""
        };
        inProdutos = false;
        currentProdDesc = "";
        continue;
      }
      
      if (!currentVenda) continue;
      
      // Linha do vendedor: VENDA DD/CN VENDEDOR
      const vendedorMatch = content.match(/^VENDA\s+\w+\s+(.+)$/);
      if (vendedorMatch) {
        currentVenda.vendedor = vendedorMatch[1].trim();
        continue;
      }
      
      // Início de produtos
      if (content === "Produtos") {
        inProdutos = true;
        continue;
      }
      
      // Linha de totais da venda
      if (content.startsWith("Qtde de Produtos:")) {
        inProdutos = false;
        const vlrMatch = content.match(/Vlr\. Total:\s*([\d.,]+)/);
        if (vlrMatch) currentVenda.valorTotal = parseFloat(vlrMatch[1].replace(/\./g,'').replace(',','.'));
        continue;
      }
      
      if (content.startsWith("Total de Itens:")) {
        const descMatch = content.match(/Desc:\s*([\d.,]+)/);
        if (descMatch) currentVenda.desconto = parseFloat(descMatch[1].replace(/\./g,'').replace(',','.'));
        continue;
      }
      
      if (content.includes("Vlr Líquido:")) {
        const liqMatch = content.match(/Vlr Líquido:\s*([\d.,]+)/);
        if (liqMatch) currentVenda.valorLiquido = parseFloat(liqMatch[1].replace(/\./g,'').replace(',','.'));
        continue;
      }
      
      if (content.includes("Frete:")) {
        const freteMatch = content.match(/Frete:\s*([\d.,]+)/);
        if (freteMatch) currentVenda.frete = parseFloat(freteMatch[1].replace(/\./g,'').replace(',','.'));
        continue;
      }
      
      // Dentro do bloco de produtos
      if (inProdutos && currentVenda) {
        if (content === "-") continue;
        if (content.startsWith("(+)") || content.startsWith("Total")) continue;
        // Ignorar cabeçalhos de página que aparecem no meio do bloco
        if (content.startsWith("Emissão:") || content === "PETECA" || content.startsWith("Relatório") || 
            content.startsWith("Tipo Cliente") || content.startsWith("Cidade:") || content.startsWith("Nº Saída") ||
            content.startsWith("Nat. Opera") || content.startsWith("Cód. Item") || content.startsWith("Valor Total")) continue;
        
        // PRIMEIRO: dados do produto (código + valores, com ou sem traço)
        // Ex: "20   1,0000   270,0000 270,00   0,00"
        // Ex: "7   -   1,0000   181,0000 181,00   0,00"
        const prodMatch = content.match(/^(\d+)\s+(?:-\s+)?([\d.,]+)\s+([\d.,]+)\s+([\d.,]+)/);
        if (prodMatch) {
          currentVenda.produtos.push({
            codigo: parseInt(prodMatch[1]),
            descricao: currentProdDesc || "PRODUTO",
            qtde: parseFloat(prodMatch[2].replace(/\./g,'').replace(',','.')),
            vlrUnitario: parseFloat(prodMatch[3].replace(/\./g,'').replace(',','.')),
            vlrTotal: parseFloat(prodMatch[4].replace(/\./g,'').replace(',','.'))
          });
          currentProdDesc = "";
          continue;
        }
        
        // SEGUNDO: código + descrição + valores na mesma linha
        // Ex: "3   ADESIVO 3M D1000 ROLAND   1,0000   88,0000 88,00   0,00 0,00"
        // Ex: "9   BANNER BRILHANTE MONTADO   2,0000   28,0000 56,00   0,00 0,00"
        const prodInlineMatch = content.match(/^(\d+)\s+([A-Z].+?)\s+([\d.,]+)\s+([\d.,]+)\s+([\d.,]+)/);
        if (prodInlineMatch) {
          currentVenda.produtos.push({
            codigo: parseInt(prodInlineMatch[1]),
            descricao: prodInlineMatch[2].trim(),
            qtde: parseFloat(prodInlineMatch[3].replace(/\./g,'').replace(',','.')),
            vlrUnitario: parseFloat(prodInlineMatch[4].replace(/\./g,'').replace(',','.')),
            vlrTotal: parseFloat(prodInlineMatch[5].replace(/\./g,'').replace(',','.'))
          });
          currentProdDesc = "";
          continue;
        }
        
        // TERCEIRO: Linha de descrição (NÃO começa com dígito, termina com 0,00)
        // Ex: "LONA TITANIUM 1000X1000 JETI ILHOS   0,00"
        const descMatch = content.match(/^([A-Z].+?)\s+0,00\s*$/);
        if (descMatch) {
          currentProdDesc = descMatch[1].trim();
          continue;
        }
      }
    }
    if (currentVenda) vendasMap[currentVenda.numSaida] = currentVenda;
    return { vendasMap, periodo };
  };

  const processImport = () => {
    if (!csvSintetico || !csvAnalitico) {
      showToast("Envie os 2 arquivos CSV (sintético + analítico)", "error");
      return;
    }
    setImporting(true);
    const logs = [];
    
    try {
      // Parse sintético (tem o ID do cliente)
      const sint = parseSintetico(csvSintetico);
      logs.push(`Sintético: ${sint.vendas.length} vendas encontradas — ${sint.periodo}`);
      
      // Parse analítico (tem os produtos)
      const anal = parseAnalitico(csvAnalitico);
      const analCount = Object.keys(anal.vendasMap).length;
      logs.push(`Analítico: ${analCount} vendas com produtos — ${anal.periodo}`);
      
      // Cruzar pelo Nº Saída
      const merged = [];
      let novos = 0, duplicados = 0, semProduto = 0;
      
      // Verificar vendas já existentes
      const existingKeys = new Set();
      Object.values(vendas).forEach(monthData => {
        if (Array.isArray(monthData)) {
          monthData.forEach(v => existingKeys.add(v.numSaida));
        }
      });
      
      for (const vSint of sint.vendas) {
        if (existingKeys.has(vSint.numSaida)) {
          duplicados++;
          continue;
        }
        
        const vAnal = anal.vendasMap[vSint.numSaida];
        const merged_venda = {
          numSaida: vSint.numSaida,
          data: vSint.data,
          dataDisplay: vSint.dataDisplay,
          clienteId: vSint.clienteId,
          nomeCliente: vSint.nomeCliente || (vAnal ? vAnal.nomeCliente : ""),
          vendedor: vSint.vendedor || (vAnal ? vAnal.vendedor : ""),
          condPagto: vSint.condPagto,
          valorLiquido: vSint.valorLiquido,
          produtos: vAnal ? vAnal.produtos : [],
          desconto: vAnal ? vAnal.desconto : 0,
          frete: vAnal ? vAnal.frete : 0
        };
        
        if (!vAnal) semProduto++;
        merged.push(merged_venda);
        novos++;
      }
      
      logs.push(`Cruzamento: ${novos} novas vendas, ${duplicados} duplicadas ignoradas, ${semProduto} sem detalhamento de produtos`);
      
      // Verificar clientes novos
      const clienteIds = new Set(clientes.map(c => c.i));
      const novosClientes = [];
      merged.forEach(v => {
        if (v.clienteId && !clienteIds.has(v.clienteId) && !novosClientes.find(c => c.id === v.clienteId)) {
          novosClientes.push({id: v.clienteId, nome: v.nomeCliente});
        }
      });
      if (novosClientes.length > 0) {
        logs.push(`⚠️ ${novosClientes.length} NOVOS CLIENTES detectados (não existem na base):`);
        novosClientes.forEach(c => logs.push(`   • ID ${c.id}: ${c.nome}`));
      }
      
      // Detectar vendedores
      const vendedoresSet = new Set(merged.map(v => v.vendedor).filter(Boolean));
      logs.push(`Vendedores: ${Array.from(vendedoresSet).join(', ') || 'nenhum detectado'}`);
      
      // Determinar meses distintos
      if (merged.length > 0) {
        const mesesMap = {};
        merged.forEach(v => {
          const mes = v.data.slice(0,7);
          if (!mesesMap[mes]) mesesMap[mes] = {count:0, valor:0};
          mesesMap[mes].count++;
          mesesMap[mes].valor += v.valorLiquido;
        });
        const mesesList = Object.keys(mesesMap).sort();
        logs.push(`Meses detectados: ${mesesList.length} (${mesesList.join(', ')})`);
        mesesList.forEach(m => {
          logs.push(`   📅 ${m}: ${mesesMap[m].count} vendas — R$ ${mesesMap[m].valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}`);
        });
        
        const totalValor = merged.reduce((s,v) => s + v.valorLiquido, 0);
        logs.push(`Valor total: R$ ${totalValor.toLocaleString('pt-BR', {minimumFractionDigits:2})}`);
      }
      
      setParsedPreview({vendas: merged, logs, novosClientes});
      setImportLog(logs);
      setImportStep(2);
    } catch(err) {
      logs.push(`❌ ERRO: ${err.message}`);
      setImportLog(logs);
      showToast("Erro no processamento. Verifique os arquivos.", "error");
    }
    setImporting(false);
  };

  const confirmarImportacao = async () => {
    if (!parsedPreview || parsedPreview.vendas.length === 0) return;
    
    const merged = parsedPreview.vendas;
    
    // Distribuir vendas por mês (para estatísticas visuais)
    const porMes = {};
    merged.forEach(v => {
      const mesAno = v.data.slice(0,7);
      if (!porMes[mesAno]) porMes[mesAno] = [];
      porMes[mesAno].push(v);
    });
    
    // Mesclar no state do React (por mês, para manter UI)
    const newVendas = {...vendas};
    for (const [mesAno, vendasMes] of Object.entries(porMes)) {
      if (!newVendas[mesAno]) newVendas[mesAno] = [];
      newVendas[mesAno] = [...newVendas[mesAno], ...vendasMes];
    }
    
    // AGRUPAR POR ANO para salvar no storage (menos chaves)
    const porAno = {};
    Object.entries(newVendas).forEach(([mes, arr]) => {
      const ano = mes.slice(0,4);
      if (!porAno[ano]) porAno[ano] = [];
      porAno[ano].push(...arr);
    });
    
    // Helper: salvar com retry + verificação real
    const saveWithRetry = async (key, data, maxRetries = 6) => {
      let lastError = '';
      for (let attempt = 0; attempt < maxRetries; attempt++) {
        try {
          const result = await window.storage.set(key, data);
          if (result) return { success: true };
          lastError = 'null result';
        } catch(e) {
          lastError = e.message || 'erro';
          try {
            const check = await window.storage.get(key);
            if (check && check.value === data) {
              return { success: true, note: 'salvou após erro aparente' };
            }
          } catch(ee) {}
        }
        if (attempt < maxRetries - 1) {
          await new Promise(r => setTimeout(r, 800 * Math.pow(1.8, attempt)));
        }
      }
      try {
        const check = await window.storage.get(key);
        if (check && check.value === data) return { success: true };
      } catch(e) {}
      return { success: false, error: lastError };
    };
    
    const anosAfetados = new Set(Object.keys(porMes).map(m => m.slice(0,4)));
    const anosSalvos = [];
    const anosComErro = [];
    
    // Salvar cada ano afetado
    for (const ano of anosAfetados) {
      const vendasAno = porAno[ano] || [];
      
      const compact = vendasAno.map(v => ({
        n: v.numSaida, d: v.data, dd: v.dataDisplay,
        ci: v.clienteId, nc: v.nomeCliente, ve: v.vendedor,
        cp: v.condPagto, vl: v.valorLiquido,
        ds: v.desconto || 0, fr: v.frete || 0,
        p: (v.produtos || []).map(p => ({
          c: p.codigo, d: p.descricao, q: p.qtde, u: p.vlrUnitario, t: p.vlrTotal
        }))
      }));
      
      const dataStr = JSON.stringify(compact);
      const sizeKB = (dataStr.length / 1024).toFixed(1);
      
      setImportLog(prev => [...prev, `💾 Salvando ano ${ano} (${sizeKB}KB, ${vendasAno.length} vendas)...`]);
      
      const result = await saveWithRetry(`peteca_vendas_ano_${ano}`, dataStr);
      if (result.success) {
        anosSalvos.push(ano);
      } else {
        anosComErro.push(`${ano} (${sizeKB}KB)`);
        console.error("Storage error em ano", ano, result.error);
      }
      
      await new Promise(r => setTimeout(r, 300));
    }
    
    // Atualizar índice de anos
    try {
      const anos = [...new Set(Object.keys(newVendas).map(m => m.slice(0,4)))].sort();
      await saveWithRetry(VENDAS_STORAGE, JSON.stringify({version: 2, anos}));
    } catch(e) {}
    
    setVendas(newVendas);
    
    // FASE 4: Criar cadastro parcial para clientes que estão nas vendas mas não existem na base
    const clienteIds = new Set(clientes.map(c => c.i));
    const fantasmas = {};
    merged.forEach(v => {
      if (v.clienteId && !clienteIds.has(v.clienteId) && !fantasmas[v.clienteId]) {
        fantasmas[v.clienteId] = {
          i: v.clienteId,
          n: v.nomeCliente || `CLIENTE ${v.clienteId}`,
          r: "", nu: "", b: "", c: "CADASTRO PENDENTE",
          d: null, a: 1
        };
      }
    });
    
    const fantasmasList = Object.values(fantasmas);
    if (fantasmasList.length > 0) {
      const novosClientes = [...clientes, ...fantasmasList];
      await saveClientes(novosClientes);
      showToast(`📋 ${fantasmasList.length} clientes novos criados com tag "CADASTRO PENDENTE"`, "info");
    }
    
    if (anosComErro.length > 0) {
      showToast(`⚠️ ${anosSalvos.length} anos salvos, ${anosComErro.length} com erro: ${anosComErro.join(', ')}. Tente reimportar.`, "error");
    } else {
      showToast(`✅ ${merged.length} vendas importadas em ${Object.keys(porMes).length} mês(es). Anos atualizados: ${anosSalvos.join(', ')}`);
    }
    
    setCsvSintetico(null);
    setCsvAnalitico(null);
    setParsedPreview(null);
    setImportStep(0);
    setImportLog([]);
  };

  // Carregar vendas do storage (suporta formato antigo por mês E novo por ano)
  const loadVendas = async () => {
    try {
      const indexResult = await window.storage.get(VENDAS_STORAGE);
      if (!indexResult || !indexResult.value) return;
      
      let indexData;
      try { indexData = JSON.parse(indexResult.value); } catch(e) { return; }
      
      const loaded = {};
      
      // FORMATO NOVO: { version: 2, anos: [...] }
      if (indexData && indexData.version === 2 && Array.isArray(indexData.anos)) {
        for (const ano of indexData.anos) {
          try {
            const result = await window.storage.get(`peteca_vendas_ano_${ano}`);
            if (result && result.value) {
              const data = JSON.parse(result.value);
              if (Array.isArray(data) && data.length > 0) {
                // Descompactar e redistribuir por mês
                data.forEach(v => {
                  const full = {
                    numSaida: v.n, data: v.d, dataDisplay: v.dd,
                    clienteId: v.ci, nomeCliente: v.nc, vendedor: v.ve,
                    condPagto: v.cp, valorLiquido: v.vl,
                    desconto: v.ds || 0, frete: v.fr || 0,
                    produtos: (v.p || []).map(p => ({
                      codigo: p.c, descricao: p.d, qtde: p.q,
                      vlrUnitario: p.u, vlrTotal: p.t
                    }))
                  };
                  const mes = full.data?.slice(0,7);
                  if (!mes) return;
                  if (!loaded[mes]) loaded[mes] = [];
                  loaded[mes].push(full);
                });
              }
            }
          } catch(e) { console.error("Erro ao carregar ano", ano, e); }
        }
      } 
      // FORMATO ANTIGO: array de meses YYYY-MM
      else if (Array.isArray(indexData)) {
        for (const mes of indexData) {
          try {
            const result = await window.storage.get(`peteca_vendas_${mes}`);
            if (result && result.value) {
              const data = JSON.parse(result.value);
              if (Array.isArray(data) && data.length > 0) {
                const primeiro = data[0];
                if (primeiro.n !== undefined && primeiro.numSaida === undefined) {
                  loaded[mes] = data.map(v => ({
                    numSaida: v.n, data: v.d, dataDisplay: v.dd,
                    clienteId: v.ci, nomeCliente: v.nc, vendedor: v.ve,
                    condPagto: v.cp, valorLiquido: v.vl,
                    desconto: v.ds || 0, frete: v.fr || 0,
                    produtos: (v.p || []).map(p => ({
                      codigo: p.c, descricao: p.d, qtde: p.q,
                      vlrUnitario: p.u, vlrTotal: p.t
                    }))
                  }));
                } else {
                  loaded[mes] = data;
                }
              }
            }
          } catch(e) {}
        }
      }
      
      setVendas(loaded);
    } catch(e) { console.error("loadVendas error:", e); }
  };

  // Stats de vendas
  const vendasStats = useMemo(() => {

  const exportCSV = (filename, headers, rows) => {
    const BOM = '\uFEFF';
    const csvContent = BOM + [headers.join(';'), ...rows.map(r => r.map(c => {
      const s = String(c ?? '').replace(/"/g, '""');
      return s.includes(';') || s.includes('"') || s.includes('\n') ? `"${s}"` : s;
    }).join(';'))].join('\n');
    const blob = new Blob([csvContent], {type: 'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
    showToast(`✅ ${filename} exportado!`);
  };

  // Cidades e IDEs únicos

    return ["TODOS", ...Array.from(set).sort()];

  // Filtrar clientes
  const filtered = useMemo(() => {

    if (statusFiltro === "ATIVOS") list = list.filter(c => c.a === 1 && c.c !== "CADASTRO PENDENTE");
    else if (statusFiltro === "INATIVOS") list = list.filter(c => c.a === 0);
    else if (statusFiltro === "PENDENTES") list = list.filter(c => c.c === "CADASTRO PENDENTE");
    
    if (cidadeFiltro !== "TODAS") list = list.filter(c => c.c === cidadeFiltro);
    if (ideFiltro !== "TODOS") {

  const paged = useMemo(() => {

  // IDE members

  // FUNÇÃO CENTRAL: Mapeia clienteId → ideKey (ou mantém individual se não tem IDE)
  // Retorna: { ideKey, ideName (nomes separados por /), ideCode, membros: [ids] }
  const clienteIdeMap = useMemo(() => {
    const map = {}; // clienteId → { key, nome, code, membros }
    const allClients = clientes.map(c => getClientData(c));
    
    // Agrupar por IDE
    const ideGroups = {};
    allClients.forEach(c => {
      if (c.d) {
        if (!ideGroups[c.d]) ideGroups[c.d] = [];
        ideGroups[c.d].push(c);
      }
    });
    
    // Criar mapa para cada cliente
    allClients.forEach(c => {
      if (c.d && ideGroups[c.d] && ideGroups[c.d].length > 1) {
        // Tem IDE com múltiplos membros → agrupar
        const membros = ideGroups[c.d];
        const nomes = membros.map(m => {
          // Pegar primeiro nome/razão social curto
          const partes = m.n.split(/\s+/);
          return partes.length > 2 ? partes.slice(0,2).join(' ') : m.n;
        });
        const nomeGrupo = nomes.join(' / ');
        map[c.i] = {
          key: 'ide_' + c.d,
          nome: nomeGrupo,
          code: c.d,
          membros: membros.map(m => m.i),
          cidade: membros[0].c,
          isIde: true
        };
      } else {
        // Individual (sem IDE ou IDE com 1 membro só)
        map[c.i] = {
          key: 'cli_' + c.i,
          nome: c.n,
          code: null,
          membros: [c.i],
          cidade: c.c,
          isIde: false
        };
      }
    });
    
    return map;
  }, [clientes, mods, getClientData]);

  // Função helper: agrupar array de vendas por IDE
  // Retorna Map<ideKey, {key, nome, code, cidade, isIde, membros, vendas, valor, ...}>
  const agruparVendasPorIde = useCallback((vendasArray) => {
    const grupos = {};
    
    vendasArray.forEach(v => {
      const ideInfo = clienteIdeMap[v.clienteId];
      const key = ideInfo ? ideInfo.key : 'cli_' + v.clienteId;
      
      if (!grupos[key]) {
        grupos[key] = {

          Object.entries(data.vendas).forEach(([mes, arr]) => {

            const clienteProdGrupos = {};
            vendasProd.forEach(v => {
              (v.produtos || []).filter(pr => pr.codigo === produtoSelecionado).forEach(pr => {
                const ideInfo = clienteIdeMap[v.clienteId];
                const key = ideInfo ? ideInfo.key : 'cli_' + v.clienteId;
                if (!clienteProdGrupos[key]) {
                  clienteProdGrupos[key] = {
                    key, nome: ideInfo?.nome || v.nomeCliente || `Cliente ${v.clienteId}`,
                    code: ideInfo?.code || null, isIde: ideInfo?.isIde || false,
                    cidade: ideInfo?.cidade || clienteToCidade[v.clienteId] || "—",
                    membros: ideInfo?.membros || [v.clienteId],
                    qtde: 0, valor: 0, compras: 0, ultimaCompra: ""
                  };
                }
                clienteProdGrupos[key].qtde += pr.qtde || 0;
                clienteProdGrupos[key].valor += pr.vlrTotal || 0;
                clienteProdGrupos[key].compras++;
                if (v.data > clienteProdGrupos[key].ultimaCompra) clienteProdGrupos[key].ultimaCompra = v.data;
              });
            });
            const topClientesProd = Object.values(clienteProdGrupos).sort((a,b) => b.valor - a.valor);
            
            // Evolução mensal
            const porMesProd = {};
            vendasProd.forEach(v => {
              const m = v.data?.slice(0,7);
              if (!m) return;
              if (!porMesProd[m]) porMesProd[m] = {qtde:0, valor:0};
              v.produtos.filter(pr => pr.codigo === produtoSelecionado).forEach(pr => {
                porMesProd[m].qtde += pr.qtde || 0;
                porMesProd[m].valor += pr.vlrTotal || 0;
              });
            });
            const mesesP = Object.entries(porMesProd).sort(([a],[b]) => a.localeCompare(b));
            const maxMesP = Math.max(...mesesP.map(([,d]) => d.valor), 1);
            
            // Evolução anual
            const porAnoProd = {};
            vendasProd.forEach(v => {
              const a = v.data?.slice(0,4);
              if (!a) return;
              if (!porAnoProd[a]) porAnoProd[a] = {qtde:0, valor:0};
              v.produtos.filter(pr => pr.codigo === produtoSelecionado).forEach(pr => {
                porAnoProd[a].qtde += pr.qtde || 0;
                porAnoProd[a].valor += pr.vlrTotal || 0;
              });
            });
            const anosP = Object.entries(porAnoProd).sort(([a],[b]) => a.localeCompare(b));
            const maxAnoP = Math.max(...anosP.map(([,d]) => d.valor), 1);
            
            // Cidades que mais compram
            const cidadeRank = {};
            vendasProd.forEach(v => {
              const cid = clienteToCidade[v.clienteId] || "SEM CIDADE";
              if (!cidadeRank[cid]) cidadeRank[cid] = {cidade: cid, qtde: 0, valor: 0, clientes: new Set()};
              v.produtos.filter(pr => pr.codigo === produtoSelecionado).forEach(pr => {
                cidadeRank[cid].qtde += pr.qtde || 0;
                cidadeRank[cid].valor += pr.vlrTotal || 0;
              });
              if (v.clienteId) cidadeRank[cid].clientes.add(v.clienteId);
            });
            const topCidadesProd = Object.values(cidadeRank).sort((a,b) => b.valor - a.valor).slice(0,15);
            
            const ultimaDataSistema = allSales.reduce((max, v) => v.data > max ? v.data : max, "");
            const hoje = ultimaDataSistema ? new Date(ultimaDataSistema) : new Date();
            const diasSemCompra = (data) => data ? Math.floor((hoje - new Date(data)) / 86400000) : 999;
            
            return (
              <div style={{animation:"fadeIn .4s ease"}}>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
                  <button onClick={() => setProdutoSelecionado(null)} style={{
                    padding:"8px 14px",background:"#1a2744",border:"1px solid #2a3f66",
                    borderRadius:8,color:"#8899bb",fontSize:13,cursor:"pointer"
                  }}>← Voltar</button>
                  <div>
                    <div style={{fontSize:22,fontWeight:700,color:"#e2e8f0"}}>📦 {p.descricao}</div>
                    <div style={{fontSize:12,color:"#5a7a9a"}}>Código {p.codigo}</div>
                  </div>
                </div>

                {/* KPIs do produto */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:16,marginBottom:24}}>
                  {[
                    {label:"Faturamento",value:"R$ "+p.valor.toLocaleString('pt-BR',{minimumFractionDigits:2}),icon:"💰",color:"#22c55e"},
                    {label:"Quantidade",value:p.qtde.toLocaleString('pt-BR',{maximumFractionDigits:2}),icon:"📊",color:"#3b82f6"},
                    {label:"Vendas",value:p.vendas.toLocaleString(),icon:"🧾",color:"#8b5cf6"},
                    {label:"Clientes",value:p.clientesUnicos,icon:"👥",color:"#06b6d4"},
                    {label:"Cidades",value:p.cidadesUnicas,icon:"🏙",color:"#f59e0b"},
                    {label:"% do Total",value:((p.valor/totalFatProd)*100).toFixed(1)+"%",icon:"📈",color:"#ec4899"},
                  ].map((s,i) => (
                    <div key={i} style={{background:"linear-gradient(135deg,#111c30,#152240)",border:"1px solid #1e3050",borderRadius:12,padding:"16px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                        <div style={{fontSize:10,color:"#5a7a9a",textTransform:"uppercase",letterSpacing:1}}>{s.label}</div>
                        <div style={{fontSize:18,opacity:.6}}>{s.icon}</div>
                      </div>
                      <div style={{fontSize:s.label==="Faturamento" ? 14 : 22,fontWeight:700,color:s.color,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.value}</div>
                    </div>
                  ))}
                </div>

                {/* Filtro de anos */}
                {anosDisp.length > 1 && (
                  <div style={{background:"linear-gradient(135deg,#111c30,#152240)",border:"1px solid #1e3050",borderRadius:12,padding:14,marginBottom:16}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                      <div style={{fontSize:11,color:"#5a7a9a",textTransform:"uppercase",letterSpacing:1,fontWeight:600}}>Anos:</div>
                      <button onClick={() => setProdutoAnoFiltro([])} style={{padding:"5px 12px",borderRadius:20,border:"1px solid "+(produtoAnoFiltro.length===0 ? "#3b82f6" : "#2a3f66"),background: produtoAnoFiltro.length===0 ? "rgba(59,130,246,0.15)" : "#0a1220",color: produtoAnoFiltro.length===0 ? "#60a5fa" : "#8899bb",fontSize:11,fontWeight:600,cursor:"pointer"}}>Todos</button>
                      {anosDisp.map(a => {
                        const sel = produtoAnoFiltro.includes(a);
                        return (
                          <button key={a} onClick={() => setProdutoAnoFiltro(prev => sel ? prev.filter(x=>x!==a) : [...prev, a])} style={{padding:"5px 12px",borderRadius:20,border:"1px solid "+(sel ? "#3b82f6" : "#2a3f66"),background: sel ? "rgba(59,130,246,0.15)" : "#0a1220",color: sel ? "#60a5fa" : "#8899bb",fontSize:11,fontWeight:600,cursor:"pointer"}}>{a}</button>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* Gráficos: mensal + anual */}
                <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:16,marginBottom:24}}>
                  <div style={{background:"linear-gradient(135deg,#111c30,#152240)",border:"1px solid #1e3050",borderRadius:12,padding:20}}>
                    <div style={{fontSize:14,fontWeight:700,color:"#e2e8f0",marginBottom:16}}>📈 Evolução Mensal</div>
                    <div style={{display:"flex",alignItems:"flex-end",gap:2,height:200,overflowX:"auto",padding:"0 4px",borderLeft:"1px solid #1e3050",borderBottom:"1px solid #1e3050"}}>
                      {mesesP.map(([mes,d]) => {
                        const anoNum = mes.slice(0,4);
                        const cor = (yearColors[anoNum] || ["#22c55e","#16a34a"]);
                        const altura = Math.max((d.valor/maxMesP)*180, 2);
                        return (
                          <div key={mes} title={`${mes.slice(5)}/${anoNum}: R$ ${d.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})} (${d.qtde.toFixed(0)} un)`}
                            style={{flex:"0 0 18px",height:altura,background:`linear-gradient(180deg,${cor[0]},${cor[1]})`,borderRadius:"2px 2px 0 0",cursor:"pointer"}}/>
                        );
                      })}
                    </div>
                    <div style={{fontSize:10,color:"#5a7a9a",textAlign:"center",marginTop:8}}>{mesesP.length} meses</div>
                  </div>
                  <div style={{background:"linear-gradient(135deg,#111c30,#152240)",border:"1px solid #1e3050",borderRadius:12,padding:20}}>
                    <div style={{fontSize:14,fontWeight:700,color:"#e2e8f0",marginBottom:16}}>📊 Por Ano</div>
                    {anosP.map(([ano,d]) => {
                      const cor = (yearColors[ano] || ["#22c55e","#16a34a"]);
                      return (
                        <div key={ano} style={{marginBottom:10}}>
                          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                            <span style={{color:"#c8d6e5",fontWeight:600}}>{ano}</span>
                            <span style={{color:cor[0],fontWeight:600}}>R$ {d.valor.toLocaleString('pt-BR',{maximumFractionDigits:0})}</span>
                          </div>
                          <div style={{height:10,background:"#0d1526",borderRadius:4,overflow:"hidden"}}>
                            <div style={{height:"100%",width:`${(d.valor/maxAnoP)*100}%`,background:`linear-gradient(90deg,${cor[0]},${cor[1]})`}}/>
                          </div>
                          <div style={{fontSize:10,color:"#5a7a9a",marginTop:2}}>{d.qtde.toFixed(0)} unidades</div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* Clientes + Cidades que mais consomem */}
                <div style={{display:"grid",gridTemplateColumns:"1.3fr 1fr",gap:16,marginBottom:24}}>
                  <div style={{background:"linear-gradient(135deg,#111c30,#152240)",border:"1px solid #1e3050",borderRadius:12,padding:20}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
                      <div style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>👥 Clientes que Compram este Produto</div>
                      <div style={{fontSize:11,color:"#5a7a9a"}}>{topClientesProd.length} clientes</div>
                    </div>
                    <div style={{maxHeight:500,overflowY:"auto"}}>
                      {topClientesProd.map((c,i) => {
                        const dias = diasSemCompra(c.ultimaCompra);
                        let semaforo = "#22c55e";
                        if (dias > 90) semaforo = "#1e293b";
                        else if (dias > 60) semaforo = "#ef4444";
                        else if (dias > 30) semaforo = "#f97316";
                        else if (dias > 15) semaforo = "#eab308";
                        const maxVal = topClientesProd[0].valor;
                        return (
                          <div key={c.key} style={{padding:"10px 0",borderBottom:"1px solid #152240"}}>
                            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                              <div style={{width:24,height:24,borderRadius:6,background:i<3?"linear-gradient(135deg,#f59e0b,#d97706)":"#1a2744",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:i<3?"#fff":"#8899bb",flexShrink:0}}>{i+1}</div>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{display:"flex",alignItems:"center",gap:6}}>
                                  <div style={{fontSize:12,fontWeight:600,color:"#e2e8f0",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.nome}</div>
                                  {c.isIde && <span style={{padding:"1px 5px",background:"rgba(124,58,237,0.2)",border:"1px solid #7c3aed",borderRadius:3,fontSize:8,color:"#a78bfa",fontWeight:700}}>🔗</span>}
                                </div>
                                <div style={{fontSize:10,color:"#5a7a9a"}}>{c.cidade} • {c.compras}x • {c.qtde.toFixed(0)}un{c.isIde ? ` • ${c.code}` : ""}</div>
                              </div>
                              <div style={{fontSize:12,fontWeight:700,color:"#22c55e"}}>R$ {c.valor.toLocaleString('pt-BR',{maximumFractionDigits:0})}</div>
                              <div title={`${dias} dias`} style={{width:10,height:10,borderRadius:"50%",background:semaforo,boxShadow:`0 0 6px ${semaforo}80`}}/>
                            </div>
                            <div style={{height:3,background:"#0d1526",borderRadius:2,overflow:"hidden"}}>
                              <div style={{height:"100%",width:`${(c.valor/maxVal)*100}%`,background: c.isIde ? "linear-gradient(90deg,#7c3aed,#6d28d9)" : "linear-gradient(90deg,#22c55e,#16a34a)"}}/>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  <div style={{background:"linear-gradient(135deg,#111c30,#152240)",border:"1px solid #1e3050",borderRadius:12,padding:20}}>
                    <div style={{fontSize:14,fontWeight:700,color:"#e2e8f0",marginBottom:16}}>🏙 Cidades</div>
                    <div style={{maxHeight:500,overflowY:"auto"}}>
                      {topCidadesProd.map((c,i) => {
                        const maxVal = topCidadesProd[0].valor;
                        return (
                          <div key={c.cidade} style={{padding:"8px 0",borderBottom:"1px solid #152240"}}>
                            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                              <div style={{width:20,height:20,borderRadius:5,background:i<3?"#f59e0b":"#1a2744",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:i<3?"#fff":"#8899bb",flexShrink:0}}>{i+1}</div>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{fontSize:11,fontWeight:600,color:"#e2e8f0",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.cidade}</div>
                                <div style={{fontSize:9,color:"#5a7a9a"}}>{c.clientes.size} clientes • {c.qtde.toFixed(0)}un</div>
                              </div>
                              <div style={{fontSize:11,fontWeight:700,color:"#f59e0b"}}>R$ {c.valor.toLocaleString('pt-BR',{maximumFractionDigits:0})}</div>
                            </div>
                            <div style={{height:2,background:"#0d1526",borderRadius:2,overflow:"hidden"}}>
                              <div style={{height:"100%",width:`${(c.valor/maxVal)*100}%`,background:"linear-gradient(90deg,#f59e0b,#d97706)"}}/>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
              </div>
            );
          }

          // LISTAGEM GERAL DE PRODUTOS
          return (
            <div style={{animation:"fadeIn .4s ease"}}>
              {/* Filtros */}
              <div style={{background:"linear-gradient(135deg,#111c30,#152240)",border:"1px solid #1e3050",borderRadius:12,padding:16,marginBottom:20,display:"flex",flexWrap:"wrap",gap:12,alignItems:"flex-end"}}>
                <div style={{flex:"1 1 300px"}}>
                  <label style={{fontSize:11,color:"#5a7a9a",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Buscar produto</label>
                  <input type="text" value={produtoSearch} onChange={e => setProdutoSearch(e.target.value)}
                    placeholder="Nome ou código..."
                    style={{width:"100%",padding:"10px 14px",background:"#0a1220",border:"1px solid #1e3050",borderRadius:8,color:"#e2e8f0",fontSize:14}}/>
                </div>
                {anosDisp.length > 1 && (
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                    <div style={{fontSize:11,color:"#5a7a9a",textTransform:"uppercase",letterSpacing:1,fontWeight:600,marginRight:4}}>Anos:</div>
                    <button onClick={() => setProdutoAnoFiltro([])} style={{padding:"8px 12px",borderRadius:8,border:"1px solid "+(produtoAnoFiltro.length===0 ? "#3b82f6" : "#2a3f66"),background: produtoAnoFiltro.length===0 ? "rgba(59,130,246,0.15)" : "#0a1220",color: produtoAnoFiltro.length===0 ? "#60a5fa" : "#8899bb",fontSize:11,fontWeight:600,cursor:"pointer"}}>Todos</button>
                    {anosDisp.map(a => {
                      const sel = produtoAnoFiltro.includes(a);
                      return (
                        <button key={a} onClick={() => setProdutoAnoFiltro(prev => sel ? prev.filter(x=>x!==a) : [...prev, a])} style={{padding:"8px 12px",borderRadius:8,border:"1px solid "+(sel ? "#3b82f6" : "#2a3f66"),background: sel ? "rgba(59,130,246,0.15)" : "#0a1220",color: sel ? "#60a5fa" : "#8899bb",fontSize:11,fontWeight:600,cursor:"pointer"}}>{a}</button>
                      );
                    })}
                  </div>
                )}
                <PrintExportButtons 
                  onPrint={() => {
                    const rows = prodsABC.map((p,i) => `<tr><td>${i+1}</td><td>${p.codigo}</td><td>${p.descricao}</td><td>${p.classe}</td><td>${p.vendas}</td><td>${p.qtde.toFixed(0)}</td><td>R$ ${p.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td></tr>`).join('');
                    printContent(`Produtos — Curva ABC (${prodsABC.length})`, `<table><thead><tr><th>#</th><th>Código</th><th>Produto</th><th>ABC</th><th>Vendas</th><th>Qtde</th><th>Faturamento</th></tr></thead><tbody>${rows}</tbody></table>`);
                  }}
                  onExport={() => {
                    exportCSV('produtos_abc.csv',['#','Código','Produto','Curva','Vendas','Qtde','Faturamento'],
                      prodsABC.map((p,i) => [i+1, p.codigo, p.descricao, p.classe, p.vendas, p.qtde.toFixed(0), p.valor.toFixed(2)]));
                  }}
                />
              </div>

              {/* KPIs */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:16,marginBottom:24}}>
                {[
                  {label:"Produtos Distintos",value:prodsArr.length,icon:"📦",color:"#3b82f6"},
                  {label:"Faturamento Total",value:"R$ "+totalFatProd.toLocaleString('pt-BR',{minimumFractionDigits:2}),icon:"💰",color:"#22c55e"},
                  {label:"Produto #1",value:prodsArr[0]?.descricao || "—",icon:"🏆",color:"#f59e0b"},
                  {label:"Curva A (até 80%)",value: prodsABC.filter(p=>p.classe==="A").length,icon:"⭐",color:"#ec4899"},
                ].map((s,i) => (
                  <div key={i} style={{background:"linear-gradient(135deg,#111c30,#152240)",border:"1px solid #1e3050",borderRadius:12,padding:"18px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <div style={{fontSize:11,color:"#5a7a9a",textTransform:"uppercase",letterSpacing:1}}>{s.label}</div>
                      <div style={{fontSize:20,opacity:.6}}>{s.icon}</div>
                    </div>
                    <div style={{fontSize:s.label.includes("Faturamento")||s.label.includes("#1") ? 13 : 22,fontWeight:700,color:s.color,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.value}</div>
                  </div>
                ))}
              </div>

              {/* Lista produtos */}
              <div style={{background:"linear-gradient(135deg,#111c30,#152240)",border:"1px solid #1e3050",borderRadius:12,padding:20}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                  <div style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>📦 Catálogo de Produtos Vendidos</div>
                  <div style={{fontSize:11,color:"#5a7a9a"}}>{prodsFiltrados.length} de {prodsArr.length} • Clique para ver detalhes</div>
                </div>
                <div style={{maxHeight:600,overflowY:"auto"}}>
                  {prodsFiltrados.map((p,i) => {
                    const maxVal = prodsArr[0].valor;
                    const abc = prodsABC.find(x => x.codigo === p.codigo);
                    const corABC = abc?.classe === "A" ? "#22c55e" : abc?.classe === "B" ? "#f59e0b" : "#6b7280";
                    return (
                      <div key={p.codigo} onClick={() => setProdutoSelecionado(p.codigo)} style={{
                        padding:"12px 14px",borderBottom:"1px solid #152240",cursor:"pointer",borderRadius:8
                      }}
                        onMouseEnter={e => e.currentTarget.style.background = "rgba(59,130,246,0.08)"}
                        onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                      >
                        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:6}}>
                          <div style={{width:28,height:28,borderRadius:8,background:i<3?"linear-gradient(135deg,#f59e0b,#d97706)":"#1a2744",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:i<3?"#fff":"#8899bb",flexShrink:0}}>{i+1}</div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:"flex",alignItems:"center",gap:6}}>
                              <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.descricao}</div>
                              <div style={{padding:"2px 6px",borderRadius:4,background:corABC+"22",border:`1px solid ${corABC}`,color:corABC,fontSize:9,fontWeight:700}}>{abc?.classe}</div>
                            </div>
                            <div style={{fontSize:11,color:"#5a7a9a"}}>Cod {p.codigo} • {p.qtde.toLocaleString('pt-BR',{maximumFractionDigits:0})}un • {p.clientesUnicos} clientes • {p.cidadesUnicas} cidades</div>
                          </div>
                          <div style={{textAlign:"right",flexShrink:0}}>
                            <div style={{fontSize:14,fontWeight:700,color:"#22c55e"}}>R$ {p.valor.toLocaleString('pt-BR',{maximumFractionDigits:0})}</div>
                            <div style={{fontSize:10,color:"#5a7a9a"}}>{((p.valor/totalFatProd)*100).toFixed(2)}%</div>
                          </div>
                          <div style={{fontSize:16,color:"#5a7a9a"}}>→</div>
                        </div>
                        <div style={{height:4,background:"#0d1526",borderRadius:2,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${(p.valor/maxVal)*100}%`,background:`linear-gradient(90deg,${corABC},${corABC}dd)`,transition:"width .6s ease"}}/>
                        </div>
                      </div>
                    );
                  })}
                </div>
                {prodsFiltrados.length === 0 && (
                  <div style={{padding:40,textAlign:"center",color:"#4a5a6a"}}>Nenhum produto encontrado.</div>
                )}
              </div>
              
              {/* Legenda Curva ABC */}
              <div style={{marginTop:16,padding:12,background:"#0a1220",borderRadius:8,border:"1px solid #152240",fontSize:11,color:"#8899bb",display:"flex",gap:16,flexWrap:"wrap",justifyContent:"center"}}>
                <span><strong style={{color:"#22c55e"}}>Curva A</strong> = top que gera 80% do faturamento</span>
                <span><strong style={{color:"#f59e0b"}}>Curva B</strong> = próximos 15%</span>
                <span><strong style={{color:"#6b7280"}}>Curva C</strong> = últimos 5% (cauda longa)</span>
              </div>
            </div>
          );
        })()}

        {/* ABANDONO & RECUPERAÇÃO TAB */}
        {tab === "abandono" && (() => {

            clienteAtivo[c.i] = c.a;

          const cidadesDisp = [...new Set(allSales.map(v => clienteToCidade[v.clienteId]).filter(Boolean))].sort();
          const vendedoresDisp = [...new Set(allSales.map(v => v.vendedor || "SEM VENDEDOR"))].sort();

          // Construir clientes AGRUPADOS POR IDE
          const clienteMap = {};
          allSales.forEach(v => {
            const id = v.clienteId;
            if (!id) return;
            const ideInfo = clienteIdeMap[id];
            const key = ideInfo ? ideInfo.key : 'cli_' + id;
            
            if (!clienteMap[key]) clienteMap[key] = {
              id: key,
              nome: ideInfo?.nome || v.nomeCliente || clienteToNome[id] || `Cliente ${id}`,
              code: ideInfo?.code || null,
              isIde: ideInfo?.isIde || false,
              cidade: ideInfo?.cidade || clienteToCidade[id] || "—",
              membros: ideInfo?.membros || [id],
              vendas: 0, total: 0,
              ultimaCompra: "", primeiraCompra: "9999-99",
              vendedoresHist: {},
              produtos: {}
            };
            clienteMap[key].vendas++;
            clienteMap[key].total += v.valorLiquido || 0;
            if (v.data > clienteMap[key].ultimaCompra) clienteMap[key].ultimaCompra = v.data;
            if (v.data < clienteMap[key].primeiraCompra) clienteMap[key].primeiraCompra = v.data;
            const vd = v.vendedor || "SEM VENDEDOR";
            clienteMap[key].vendedoresHist[vd] = (clienteMap[key].vendedoresHist[vd] || 0) + (v.valorLiquido || 0);
            (v.produtos || []).forEach(p => {
              if (!clienteMap[key].produtos[p.codigo]) clienteMap[key].produtos[p.codigo] = {desc: p.descricao, qtde: 0, valor: 0};
              clienteMap[key].produtos[p.codigo].qtde += p.qtde || 0;
              clienteMap[key].produtos[p.codigo].valor += p.vlrTotal || 0;

            if (!clienteMap[key]) {
              clienteMap[key] = {

                cidade: ideInfo?.cidade || c.c || "—",
                membros: ideInfo?.membros || [c.i],
                vendas: 0, total: 0, ultimaCompra: "", primeiraCompra: "",
                vendedoresHist: {}, produtos: {},
                semHistorico: true
              };
            }
          });

          const ultimaDataSistema = allSales.reduce((max, v) => v.data > max ? v.data : max, "");
          const hoje = ultimaDataSistema ? new Date(ultimaDataSistema) : new Date();
          const diasSemCompra = (data) => data ? Math.floor((hoje - new Date(data)) / 86400000) : 9999;

          // Calcular status, vendedor principal e potencial perdido
          let clientesArr = Object.values(clienteMap)
            .filter(c => {
              // Verificar se TODOS os membros estão ativos
              return c.membros.some(mid => clienteAtivo[mid] !== 0);
            })
            .map(c => {
              const dias = diasSemCompra(c.ultimaCompra);
              const status = dias <= 15 ? "ativo"
                : dias <= 30 ? "recente"
                : dias <= 60 ? "atencao"
                : dias <= 90 ? "risco"
                : "abandonado";
              
              // Vendedor principal histórico
              const vendOrd = Object.entries(c.vendedoresHist).sort(([,a],[,b]) => b - a);
              const vendedorPrincipal = vendOrd[0]?.[0] || "—";
              
              // Potencial perdido = ticket médio × frequência esperada × meses sem comprar
              // Frequência esperada = vendas / meses ativos
              const ticketMedio = c.vendas > 0 ? c.total / c.vendas : 0;
              const mesesAtivos = c.primeiraCompra && c.ultimaCompra
                ? Math.max(1, Math.ceil((new Date(c.ultimaCompra) - new Date(c.primeiraCompra)) / (86400000 * 30)))
                : 1;
              const freqMensal = c.vendas / mesesAtivos;
              const mesesParado = Math.floor(dias / 30);
              const potencialPerdido = ticketMedio * freqMensal * mesesParado;
              
              return {
                ...c, diasSemCompra: dias, status, vendedorPrincipal,
                ticketMedio, freqMensal, potencialPerdido,
                temAnotacoes: (() => {
                  // Checar anotações pela key do grupo E pelos IDs individuais dos membros
                  if (anotacoes[c.id] && anotacoes[c.id].length > 0) return true;
                  return c.membros.some(mid => anotacoes[mid] && anotacoes[mid].length > 0);

          // Ordenar
          if (abandonoOrdem === "valor") clientesArr.sort((a,b) => b.total - a.total);
          else if (abandonoOrdem === "potencial") clientesArr.sort((a,b) => b.potencialPerdido - a.potencialPerdido);
          else if (abandonoOrdem === "dias") clientesArr.sort((a,b) => b.diasSemCompra - a.diasSemCompra);

              if (gap >= 60) {

                if (!recuperadosPorVendedor[vd]) recuperadosPorVendedor[vd] = {vendedor: vd, recuperacoes: 0, valor: 0, clientes: new Set()};
                recuperadosPorVendedor[vd].recuperacoes++;
                recuperadosPorVendedor[vd].valor += datasOrd[i].valorLiquido || 0;
                recuperadosPorVendedor[vd].clientes.add(c.id);
              }
            }
          });
          const rankRecuperacao = Object.values(recuperadosPorVendedor)

              </div>
            );
          }

          return (
            <div style={{animation:"fadeIn .4s ease"}}>

                    </div>

                    <div style={{fontSize:22,fontWeight:700,color:"#ef4444"}}>R$ {totalPotencialPerdido.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
                    <button onClick={async () => {

              </div>
            );
          }

          // Vendedores disponíveis
          const vendedoresDisp = [...new Set(allSales.map(v => v.vendedor || "SEM VENDEDOR"))].sort();
          
          // Meses disponíveis
          const mesesDisp = [...new Set(allSales.map(v => v.data?.slice(0,7)).filter(Boolean))].sort();
          const mesAtual = metasMesAtual;
          const mesLabel = mesAtual.slice(5) + "/" + mesAtual.slice(0,4);
          
          // Metas do mês (formato: metasConfig[YYYY-MM] = { geral: N, vendedores: { NOME: N } })
          const metasMes = metasConfig[mesAtual] || {};
          const metaGeral = metasMes.geral || 0;
          const metasVendedores = metasMes.vendedores || {};
          
          // Realizado no mês
          const vendasMes = allSales.filter(v => v.data?.slice(0,7) === mesAtual);
          const fatMes = vendasMes.reduce((s,v) => s + (v.valorLiquido || 0), 0);
          const vendasCountMes = vendasMes.length;
          const clientesMes = new Set(vendasMes.map(v => v.clienteId).filter(Boolean)).size;
          
          // Por vendedor no mês
          const vendedorMes = {};
          vendasMes.forEach(v => {
            const vd = v.vendedor || "SEM VENDEDOR";
            if (!vendedorMes[vd]) vendedorMes[vd] = {vendas: 0, valor: 0, clientes: new Set()};
            vendedorMes[vd].vendas++;
            vendedorMes[vd].valor += v.valorLiquido || 0;
            if (v.clienteId) vendedorMes[vd].clientes.add(v.clienteId);
          });
          
          // Histórico mensal (últimos 12 meses) para comparativo
          const ultimos12 = mesesDisp.slice(-12);
          const historicoMensal = {};
          ultimos12.forEach(m => { historicoMensal[m] = {valor: 0, vendas: 0}; });
          allSales.forEach(v => {
            const m = v.data?.slice(0,7);
            if (historicoMensal[m] !== undefined) {
              historicoMensal[m].valor += v.valorLiquido || 0;
              historicoMensal[m].vendas++;
            }
          });
          const maxHist = Math.max(...Object.values(historicoMensal).map(h => h.valor), 1);
          
          // Calcular termômetro
          const pctGeral = metaGeral > 0 ? (fatMes / metaGeral) * 100 : 0;
          const corTermometro = pctGeral >= 100 ? "#22c55e" : pctGeral >= 70 ? "#eab308" : pctGeral >= 40 ? "#f97316" : "#ef4444";
          
          // Navegação mês
          const mesAnterior = () => {
            const idx = mesesDisp.indexOf(mesAtual);
            if (idx > 0) setMetasMesAtual(mesesDisp[idx-1]);
          };
          const mesProximo = () => {
            const idx = mesesDisp.indexOf(mesAtual);
            if (idx < mesesDisp.length - 1) setMetasMesAtual(mesesDisp[idx+1]);
          };
          
          // Salvar metas editadas
          const salvarMetasMes = (campo, valor) => {
            const novas = {...metasConfig};
            if (!novas[mesAtual]) novas[mesAtual] = {geral: 0, vendedores: {}};
            if (campo === "geral") {
