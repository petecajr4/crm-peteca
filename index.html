            <>
              <div style={{fontSize:11,color:'#64748b',textTransform:'uppercase',letterSpacing:1,fontWeight:600,marginBottom:10}}>Tags em uso ({tags.length})</div>
              <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:20}}>
                {tags.map(t => (
                  <div key={t.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.05)',borderRadius:10}}>
                    <div style={{width:20,height:20,borderRadius:5,background:t.cor,boxShadow:`0 0 8px ${t.cor}66`,flexShrink:0}}></div>
                    <div style={{flex:1,fontSize:13,color:'#e2e8f0',fontWeight:600}}>{t.nome}</div>
                    <div style={{fontSize:10,color:'#64748b',fontFamily:'monospace'}}>{t.cor}</div>
                  </div>
                ))}
              </div>
              
              <div style={{padding:16,background:'rgba(99,102,241,0.05)',border:'1px solid rgba(99,102,241,0.15)',borderRadius:10}}>
                <div style={{fontSize:12,fontWeight:700,color:'#c4b5fd',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
                  💡 Para adicionar/editar tags
                </div>
                <div style={{fontSize:11,color:'#94a3b8',lineHeight:1.6}}>
                  1. Abra sua planilha <strong style={{color:'#e2e8f0'}}>CRM_Kanban</strong> no Google Sheets<br/>
                  2. Vá na aba <strong style={{color:'#e2e8f0'}}>Tags</strong><br/>
                  3. Adicione nova linha: <code style={{background:'rgba(0,0,0,0.3)',padding:'1px 5px',borderRadius:3,fontSize:10}}>TAG_12</code> • nome • cor (ex: <code style={{background:'rgba(0,0,0,0.3)',padding:'1px 5px',borderRadius:3,fontSize:10}}>#22c55e</code>) • <code style={{background:'rgba(0,0,0,0.3)',padding:'1px 5px',borderRadius:3,fontSize:10}}>sim</code><br/>
                  4. Para desativar: mude <code style={{background:'rgba(0,0,0,0.3)',padding:'1px 5px',borderRadius:3,fontSize:10}}>sim</code> → <code style={{background:'rgba(0,0,0,0.3)',padding:'1px 5px',borderRadius:3,fontSize:10}}>nao</code>
                </div>
                <button onClick={() => { window.open('https://sheets.google.com', '_blank'); }} style={{marginTop:10,padding:'7px 14px',background:'linear-gradient(135deg,#6366f1,#a855f7)',border:'none',borderRadius:8,color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',boxShadow:'0 2px 8px rgba(99,102,241,0.3)'}}>🔗 Abrir Google Sheets</button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// MODAL GERENCIAR VENDEDORES (admin)
// ============================================================
function GerenciarVendedoresModal({ onClose, showToast }) {
  const [usuarios, setUsuarios] = useState([]);
  const [loading, setLoading] = useState(true);
  
  const KANBAN_API = 'https://script.google.com/macros/s/AKfycbyqtgNDt03Z2cfTlbDAUObosynmHaFvXTW4h76X-p3H55_ZFnkKwqKEi6gwFLI9Er4y/exec';
  
  useEffect(() => {
    fetch(KANBAN_API + '?action=getUsuarios&t=' + Date.now())
      .then(r => r.json())
      .then(res => {
        if (res.ok) setUsuarios(res.usuarios);
        setLoading(false);
      });
  }, []);
  
  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',backdropFilter:'blur(6px)',zIndex:1400,display:'flex',alignItems:'center',justifyContent:'center',padding:20,animation:'fadeIn .2s'}}>
      <div onClick={e => e.stopPropagation()} style={{width:'100%',maxWidth:540,maxHeight:'85vh',overflowY:'auto',background:'rgba(13,21,38,0.95)',backdropFilter:'blur(20px) saturate(180%)',border:'1px solid rgba(34,197,94,0.3)',borderRadius:16,boxShadow:'0 20px 60px rgba(0,0,0,0.5)',animation:'scaleIn .25s'}}>
        <div style={{padding:'18px 22px',borderBottom:'1px solid rgba(34,197,94,0.15)',background:'linear-gradient(135deg,rgba(34,197,94,0.08),rgba(16,185,129,0.05))'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}}>
            <div>
              <div style={{fontSize:16,fontWeight:800,color:'#e2e8f0'}}>👥 Gerenciar Vendedores</div>
              <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{usuarios.length} usuários ativos</div>
            </div>
            <button onClick={onClose} style={{width:32,height:32,borderRadius:8,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',color:'#94a3b8',fontSize:16,fontWeight:700,cursor:'pointer'}}>✕</button>
          </div>
        </div>
        
        <div style={{padding:22}}>
          {loading ? (
            <div style={{padding:30,textAlign:'center',color:'#64748b',fontSize:12}}>Carregando...</div>
          ) : (
            <>
              <div style={{fontSize:11,color:'#64748b',textTransform:'uppercase',letterSpacing:1,fontWeight:600,marginBottom:10}}>Usuários cadastrados</div>
              <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:20}}>
                {usuarios.map(u => (
                  <div key={u.nome} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.05)',borderRadius:10}}>
                    <span style={{fontSize:16}}>{u.tipo === 'admin' ? '👑' : '👤'}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,color:'#e2e8f0',fontWeight:700}}>{u.nome}</div>
                      <div style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:1}}>{u.tipo}</div>
                    </div>
                  </div>
                ))}
              </div>
              
              <div style={{padding:16,background:'rgba(34,197,94,0.05)',border:'1px solid rgba(34,197,94,0.15)',borderRadius:10}}>
                <div style={{fontSize:12,fontWeight:700,color:'#86efac',marginBottom:8}}>💡 Para gerenciar usuários e senhas</div>
                <div style={{fontSize:11,color:'#94a3b8',lineHeight:1.6}}>
                  1. Abra sua planilha <strong style={{color:'#e2e8f0'}}>CRM_Kanban</strong><br/>
                  2. Vá na aba <strong style={{color:'#e2e8f0'}}>Usuarios</strong><br/>
                  3. Para <strong style={{color:'#e2e8f0'}}>trocar senha</strong>: edite a coluna "senha"<br/>
                  4. Para <strong style={{color:'#e2e8f0'}}>desativar</strong>: mude "sim" → "nao" na coluna "ativo"<br/>
                  5. Para <strong style={{color:'#e2e8f0'}}>adicionar novo</strong>: nova linha com nome, senha, tipo (vendedor/admin), ativo
                </div>
                <button onClick={() => { window.open('https://sheets.google.com', '_blank'); }} style={{marginTop:10,padding:'7px 14px',background:'linear-gradient(135deg,#16a34a,#22c55e)',border:'none',borderRadius:8,color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',boxShadow:'0 2px 8px rgba(34,197,94,0.3)'}}>🔗 Abrir Google Sheets</button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}
