                  {getIdeMembers(selectedClient.d).map(m => (
                    <div key={m.i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid #152240"}}>
                      <span style={{fontSize:11,color:"#5a7a9a",fontFamily:"monospace"}}>{m.i}</span>
                      <span style={{fontSize:13,color: m.i===selectedClient.i ? "#3b82f6" : "#c8d6e5",fontWeight: m.i===selectedClient.i ? 600 : 400}}>
                        {m.n} {m.i===selectedClient.i && " ← este"}
                      </span>
                    </div>
                  ))}
                  <button onClick={() => {removeFromIde(selectedClient.i);setSelectedClient({...selectedClient,d:null});}} style={{
                    marginTop:12,padding:"8px 16px",background:"#3b1111",border:"1px solid #5c2020",
                    borderRadius:8,color:"#f87171",fontSize:12,cursor:"pointer"
                  }}>Remover deste grupo</button>
                </>
              ) : (
                <div style={{color:"#4a5a6a",fontSize:13}}>Não pertence a nenhum grupo econômico</div>
              )}
            </div>

            {/* Ações */}
            <div style={{display:"flex",gap:12}}>
              <button onClick={() => {toggleAtivo(selectedClient.i, selectedClient.a);setSelectedClient(null);}} style={{
                flex:1,padding:"12px",background:selectedClient.a===1?"#3b1111":"#0d3320",
                border:`1px solid ${selectedClient.a===1?"#5c2020":"#1a5c35"}`,borderRadius:10,
                color:selectedClient.a===1?"#f87171":"#4ade80",fontSize:13,fontWeight:600,cursor:"pointer"
              }}>{selectedClient.a===1?"⛔ Inativar Cliente":"✅ Ativar Cliente"}</button>
            </div>
          </div>
        </div>
        );
      })()}

      {/* MODAL: Confirmação dupla */}
      {showConfirmModal && (
        <div style={{
          position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.8)",
          display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:20
        }}>
          <div style={{
            background:"linear-gradient(135deg,#1a1020,#201530)",border:"1px solid #3a2050",
            borderRadius:16,padding:32,maxWidth:420,width:"100%",textAlign:"center",
            animation:"slideUp .3s ease"
          }}>
            <div style={{fontSize:40,marginBottom:16}}>{showConfirmModal.action==="inativar"?"⚠️":"✅"}</div>
            <div style={{fontSize:16,fontWeight:700,color:"#e2e8f0",marginBottom:8}}>
              {showConfirmModal.step === 1 ? "Confirmar ação" : "Confirmação final"}
            </div>
            <div style={{fontSize:13,color:"#8899bb",marginBottom:24}}>
              {showConfirmModal.step === 1 
                ? `Deseja realmente ${showConfirmModal.action} este cliente?`
                : `Esta é a SEGUNDA confirmação. Tem certeza que deseja ${showConfirmModal.action} o cliente #${showConfirmModal.id}?`
              }
            </div>
            <div style={{display:"flex",gap:12}}>
              <button onClick={() => setShowConfirmModal(null)} style={{
                flex:1,padding:"12px",background:"#1a2744",border:"1px solid #2a3f66",borderRadius:10,
                color:"#8899bb",fontSize:13,cursor:"pointer"
              }}>Cancelar</button>
              <button onClick={confirmToggle} style={{
                flex:1,padding:"12px",
                background:showConfirmModal.action==="inativar"?"#dc2626":"#16a34a",
                border:"none",borderRadius:10,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"
              }}>{showConfirmModal.step===1 ? "Sim, continuar" : `Confirmar ${showConfirmModal.action}`}</button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL: Gerenciar IDE */}
      {showIdeManager && (
        <div style={{
          position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",
          display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20
        }} onClick={() => {setShowIdeManager(false);setIdeAction(null);setSelectedForIde([]);setNewIdeName("");}}>
          <div style={{
            background:"linear-gradient(135deg,#111c30,#152240)",border:"1px solid #7c3aed",
            borderRadius:16,padding:28,maxWidth:850,width:"100%",maxHeight:"90vh",overflowY:"auto",
            animation:"slideUp .3s ease"
          }} onClick={e => e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div>
                <div style={{fontSize:18,fontWeight:700,color:"#e2e8f0"}}>🔗 Gerenciar Grupos Econômicos (IDE)</div>
                <div style={{fontSize:11,color:"#5a7a9a",marginTop:4}}>
                  {ides.filter(i=>i!=="TODOS"&&i!=="COM_IDE"&&i!=="SEM_IDE").length} grupos • Agrupa clientes do mesmo dono/empresa
                </div>
              </div>
              <button onClick={() => {setShowIdeManager(false);setIdeAction(null);}} style={{background:"none",border:"none",color:"#5a7a9a",fontSize:20,cursor:"pointer"}}>✕</button>
            </div>

            {/* Botões de ação */}
            {!ideAction && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:20}}>
                <button onClick={() => setIdeAction("criar")} style={{
                  padding:"14px",background:"linear-gradient(135deg,#7c3aed,#6d28d9)",
                  border:"none",borderRadius:10,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"
                }}>+ Criar Novo Grupo</button>
                <button onClick={() => setIdeAction("adicionar")} style={{
                  padding:"14px",background:"linear-gradient(135deg,#2563eb,#1d4ed8)",
                  border:"none",borderRadius:10,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"
                }}>➕ Adicionar a Grupo</button>
                <button onClick={() => setIdeAction("sugerir")} style={{
                  padding:"14px",background:"linear-gradient(135deg,#f59e0b,#d97706)",
                  border:"none",borderRadius:10,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"
                }}>🔍 Sugerir Duplicados</button>
              </div>
            )}

            {/* CRIAR NOVO GRUPO */}
            {ideAction === "criar" && (() => {
              // Auto-gerar próximo número para a cidade selecionada
              const cidadeSel = selectedForIde.length > 0 
                ? getClientData(clientes.find(c => c.i === selectedForIde[0]) || clientes[0]).c 
                : "";
              const cidadeNorm = cidadeSel.replace(/\s+/g,"").toUpperCase();
              const existentes = ides.filter(i => i.includes(cidadeNorm)).length;
              const sugestaoNome = cidadeNorm ? `IDE_${cidadeNorm}_${String(existentes + 1).padStart(2,'0')}` : "";
              
              return (
                <div style={{background:"#0a1220",borderRadius:10,padding:20,marginBottom:16}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#a78bfa"}}>Criar novo grupo IDE</div>
                    <button onClick={() => {setIdeAction(null);setSelectedForIde([]);setNewIdeName("");setSearch("");}} style={{fontSize:11,color:"#5a7a9a",background:"none",border:"none",cursor:"pointer"}}>← Voltar</button>
                  </div>
                  
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                    <div>
                      <label style={{fontSize:10,color:"#5a7a9a",display:"block",marginBottom:4}}>Nome do grupo</label>
                      <input value={newIdeName} onChange={e => setNewIdeName(e.target.value.toUpperCase())}
                        placeholder={sugestaoNome || "IDE_CIDADE_01"}
                        style={{width:"100%",padding:"10px 14px",background:"#111c30",border:"1px solid #1e3050",borderRadius:8,color:"#e2e8f0",fontSize:14}}/>
                    </div>
                    <div>
                      <label style={{fontSize:10,color:"#5a7a9a",display:"block",marginBottom:4}}>Sugestão automática</label>
                      {sugestaoNome && (
                        <button onClick={() => setNewIdeName(sugestaoNome)} style={{
                          padding:"10px 14px",background:"rgba(124,58,237,0.15)",border:"1px solid #7c3aed",borderRadius:8,
                          color:"#a78bfa",fontSize:13,cursor:"pointer",width:"100%",textAlign:"left"
                        }}>📋 Usar: {sugestaoNome}</button>
                      )}
                    </div>
                  </div>
                  
                  <label style={{fontSize:10,color:"#5a7a9a",display:"block",marginBottom:4}}>Buscar clientes para adicionar ao grupo</label>
                  <input placeholder="Nome, ID ou cidade..." onChange={e => setSearch(e.target.value)} value={search}
                    style={{width:"100%",padding:"8px 12px",background:"#111c30",border:"1px solid #1e3050",borderRadius:8,color:"#e2e8f0",fontSize:13,marginBottom:8}}/>
                  
                  <div style={{maxHeight:200,overflowY:"auto",marginBottom:12}}>
                    {clientes.filter(c => {
                      const cd = getClientData(c);
                      if (!search.trim()) return false;
                      const s = search.toLowerCase();
                      return cd.n.toLowerCase().includes(s) || String(cd.i).includes(s) || cd.c.toLowerCase().includes(s);
                    }).slice(0,30).map(c => {
                      const cd = getClientData(c);
                      const selected = selectedForIde.includes(cd.i);
                      return (
                        <div key={cd.i} onClick={() => setSelectedForIde(prev => selected ? prev.filter(x=>x!==cd.i) : [...prev, cd.i])} style={{
                          display:"flex",alignItems:"center",gap:8,padding:"8px 12px",cursor:"pointer",borderRadius:6,marginBottom:2,
                          background: selected ? "rgba(124,58,237,0.15)" : "transparent",
                          border: selected ? "1px solid rgba(124,58,237,0.3)" : "1px solid transparent"
                        }}>
                          <div style={{width:16,height:16,borderRadius:4,border:"2px solid #3a5070",
                            background:selected?"#7c3aed":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                            {selected && <span style={{color:"#fff",fontSize:10}}>✓</span>}
                          </div>
                          <span style={{fontSize:11,color:"#5a7a9a",fontFamily:"monospace"}}>{cd.i}</span>
                          <span style={{fontSize:13,color:"#c8d6e5",fontWeight:500}}>{cd.n}</span>
                          <span style={{fontSize:10,color:"#4a5a6a",marginLeft:"auto"}}>{cd.c}</span>
                          {cd.d && <span style={{fontSize:9,color:"#f59e0b",padding:"1px 4px",background:"rgba(245,158,11,0.15)",borderRadius:3}}>IDE: {cd.d}</span>}
                        </div>
                      );
                    })}
                  </div>
                  
                  {selectedForIde.length > 0 && (
                    <div style={{padding:10,background:"rgba(124,58,237,0.1)",borderRadius:8,marginBottom:12}}>
                      <div style={{fontSize:11,color:"#a78bfa",marginBottom:6}}>{selectedForIde.length} selecionado(s):</div>
                      {selectedForIde.map(id => {
                        const cd = getClientData(clientes.find(c => c.i === id) || {i:id,n:"?"});
                        return (
                          <span key={id} style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 8px",margin:"2px",background:"rgba(124,58,237,0.2)",borderRadius:4,fontSize:11,color:"#c8d6e5"}}>
                            {cd.i} - {cd.n}
                            <span onClick={(e) => {e.stopPropagation();setSelectedForIde(prev=>prev.filter(x=>x!==id));}} style={{cursor:"pointer",color:"#ef4444",fontWeight:700,marginLeft:4}}>✕</span>
                          </span>
                        );
                      })}
                    </div>
                  )}
                  
                  <button disabled={!newIdeName || selectedForIde.length < 2} onClick={() => {
                    const newMods = {...mods};
                    selectedForIde.forEach(id => { if (!newMods[id]) newMods[id] = {}; newMods[id].d = newIdeName; });
                    saveMods(newMods);
                    showToast(`✅ Grupo ${newIdeName} criado com ${selectedForIde.length} clientes!`);
                    setIdeAction(null);setSelectedForIde([]);setNewIdeName("");setSearch("");
                  }} style={{
                    width:"100%",padding:"12px",
                    background: (!newIdeName||selectedForIde.length<2) ? "#1a2744" : "linear-gradient(135deg,#7c3aed,#6d28d9)",
                    border:"none",borderRadius:8,
                    color: (!newIdeName||selectedForIde.length<2) ? "#4a5a6a" : "#fff",
                    fontSize:13,fontWeight:600,cursor: (!newIdeName||selectedForIde.length<2) ? "default" : "pointer"
                  }}>Criar Grupo ({selectedForIde.length} membros)</button>
                </div>
              );
            })()}

            {/* ADICIONAR A GRUPO EXISTENTE */}
            {ideAction === "adicionar" && (
              <div style={{background:"#0a1220",borderRadius:10,padding:20,marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#3b82f6"}}>Adicionar cliente a grupo existente</div>
                  <button onClick={() => {setIdeAction(null);setNewIdeName("");setSearch("");}} style={{fontSize:11,color:"#5a7a9a",background:"none",border:"none",cursor:"pointer"}}>← Voltar</button>
                </div>
                <select onChange={e => setNewIdeName(e.target.value)} value={newIdeName}
                  style={{width:"100%",padding:"10px 14px",background:"#111c30",border:"1px solid #1e3050",borderRadius:8,color:"#e2e8f0",fontSize:13,marginBottom:12}}>
                  <option value="">Selecione o grupo...</option>
                  {ides.filter(i=>i!=="TODOS"&&i!=="COM_IDE"&&i!=="SEM_IDE").map(i => <option key={i} value={i}>{i} ({getIdeMembers(i).length} membros)</option>)}
                </select>
                {newIdeName && (
                  <>
                    <div style={{fontSize:11,color:"#5a7a9a",marginBottom:6}}>Membros atuais:</div>
                    <div style={{marginBottom:12}}>
                      {getIdeMembers(newIdeName).map(m => (
                        <span key={m.i} style={{display:"inline-block",padding:"3px 8px",margin:"2px",background:"rgba(59,130,246,0.15)",borderRadius:4,fontSize:11,color:"#8899bb"}}>
                          {m.i} - {m.n} ({m.c})
                        </span>
                      ))}
                    </div>
                    <input placeholder="Buscar cliente por nome, ID ou cidade..." value={search} onChange={e => setSearch(e.target.value)}
                      style={{width:"100%",padding:"8px 12px",background:"#111c30",border:"1px solid #1e3050",borderRadius:8,color:"#e2e8f0",fontSize:13,marginBottom:8}}/>
                    <div style={{maxHeight:200,overflowY:"auto"}}>
                      {clientes.filter(c => {
                        const cd = getClientData(c);
                        if (cd.d === newIdeName) return false;
                        if (!search.trim()) return false;
                        const s = search.toLowerCase();
                        return cd.n.toLowerCase().includes(s) || String(cd.i).includes(s) || cd.c.toLowerCase().includes(s);
                      }).slice(0,20).map(c => {
                        const cd = getClientData(c);
                        return (
                          <div key={cd.i} onClick={() => { addToIde(cd.i, newIdeName); setSearch(""); }} style={{
                            display:"flex",alignItems:"center",gap:8,padding:"8px 12px",cursor:"pointer",borderRadius:6,marginBottom:2
                          }} onMouseEnter={e=>e.currentTarget.style.background="rgba(59,130,246,0.1)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                            <span style={{fontSize:11,color:"#5a7a9a",fontFamily:"monospace"}}>{cd.i}</span>
                            <span style={{fontSize:13,color:"#c8d6e5"}}>{cd.n}</span>
                            <span style={{fontSize:10,color:"#4a5a6a"}}>{cd.c}</span>
                            <span style={{fontSize:11,color:"#3b82f6",marginLeft:"auto"}}>+ Adicionar</span>
                          </div>
                        );
                      })}
                    </div>
                  </>
                )}
              </div>
            )}

            {/* SUGERIR DUPLICADOS */}
            {ideAction === "sugerir" && (() => {
              // Encontrar possíveis duplicados: mesmo endereço ou nomes muito parecidos na mesma cidade
              const sugestoes = [];
              const allClients = clientes.map(c => getClientData(c)).filter(c => c.a === 1);
              
              // Agrupar por cidade
              const porCidade = {};
              allClients.forEach(c => {
                if (!porCidade[c.c]) porCidade[c.c] = [];
                porCidade[c.c].push(c);
              });
              
              Object.entries(porCidade).forEach(([cidade, lista]) => {
                if (lista.length < 2) return;
                for (let i = 0; i < lista.length; i++) {
                  for (let j = i+1; j < lista.length; j++) {
                    const a = lista[i], b = lista[j];
                    if (a.d && b.d && a.d === b.d) continue; // já no mesmo IDE
                    
                    // Mesmo endereço (rua + número)
                    const mesmoEnd = a.r && b.r && a.nu && b.nu 
                      && a.r.replace(/\s+/g,'').toLowerCase() === b.r.replace(/\s+/g,'').toLowerCase()
                      && a.nu === b.nu;
                    
                    // Nomes parecidos (primeiras 3 palavras iguais)
                    const palavrasA = a.n.toUpperCase().split(/\s+/).filter(w => w.length > 2).slice(0,3).join(' ');
                    const palavrasB = b.n.toUpperCase().split(/\s+/).filter(w => w.length > 2).slice(0,3).join(' ');
                    const nomePar = palavrasA.length > 5 && palavrasB.length > 5 && palavrasA === palavrasB;
                    
                    if (mesmoEnd || nomePar) {
                      sugestoes.push({
                        a, b, cidade, motivo: mesmoEnd ? "📍 Mesmo endereço" : "📝 Nome parecido",
                        key: [a.i,b.i].sort().join('-')
                      });
                    }
                  }
                }
              });
              
              // Remover duplicatas
              const vistos = new Set();
              const unicas = sugestoes.filter(s => {
                if (vistos.has(s.key)) return false;
                vistos.add(s.key);
                return true;
              });

              return (
                <div style={{background:"#0a1220",borderRadius:10,padding:20,marginBottom:16}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#f59e0b"}}>🔍 Possíveis Duplicados Encontrados</div>
                    <button onClick={() => setIdeAction(null)} style={{fontSize:11,color:"#5a7a9a",background:"none",border:"none",cursor:"pointer"}}>← Voltar</button>
                  </div>
                  <div style={{fontSize:11,color:"#5a7a9a",marginBottom:16}}>
                    {unicas.length} possíveis duplicados encontrados. Analise cada par e decida se deseja criar um grupo IDE.
                  </div>
                  <div style={{maxHeight:500,overflowY:"auto"}}>
                    {unicas.length === 0 && (
                      <div style={{padding:30,textAlign:"center",color:"#5a7a9a"}}>Nenhum duplicado encontrado! Base limpa.</div>
                    )}
                    {unicas.map((s,si) => (
                      <div key={s.key} style={{padding:14,background:"#111c30",borderRadius:8,marginBottom:10,border:"1px solid #1e3050"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{padding:"3px 8px",background:"rgba(245,158,11,0.15)",border:"1px solid #f59e0b",borderRadius:4,fontSize:10,color:"#fbbf24",fontWeight:600}}>{s.motivo}</span>
                            <span style={{fontSize:11,color:"#5a7a9a"}}>{s.cidade}</span>
                          </div>
                          <button onClick={() => {
                            const cidNorm = s.cidade.replace(/\s+/g,"").toUpperCase();
                            const existentes = ides.filter(i => i.includes(cidNorm)).length;
                            const nomeIde = `IDE_${cidNorm}_${String(existentes+1).padStart(2,'0')}`;
                            const newMods = {...mods};
                            [s.a.i, s.b.i].forEach(id => { if(!newMods[id]) newMods[id]={}; newMods[id].d=nomeIde; });
                            saveMods(newMods);
                            showToast(`✅ Grupo ${nomeIde} criado com 2 clientes!`);
                          }} style={{padding:"6px 14px",background:"linear-gradient(135deg,#7c3aed,#6d28d9)",border:"none",borderRadius:6,color:"#fff",fontSize:11,fontWeight:600,cursor:"pointer"}}>
                            🔗 Criar IDE
                          </button>
                        </div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                          {[s.a, s.b].map(c => (
                            <div key={c.i} style={{padding:10,background:"#0a1220",borderRadius:6,border:"1px solid #152240"}}>
                              <div style={{fontSize:12,fontWeight:600,color:"#e2e8f0"}}>{c.n}</div>
                              <div style={{fontSize:10,color:"#5a7a9a",marginTop:4}}>
                                ID {c.i} • {c.r}, {c.nu} • {c.b}
                                {c.d && <span style={{color:"#a78bfa",marginLeft:6}}>IDE: {c.d}</span>}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}

            {/* LISTA DE TODOS OS GRUPOS IDE */}
            {!ideAction && (
              <div>
                <div style={{fontSize:13,color:"#5a7a9a",marginBottom:12}}>{ides.filter(i=>i!=="TODOS"&&i!=="COM_IDE"&&i!=="SEM_IDE").length} grupos cadastrados</div>
                <div style={{maxHeight:500,overflowY:"auto"}}>
                  {ides.filter(i=>i!=="TODOS"&&i!=="COM_IDE"&&i!=="SEM_IDE").map(ide => {
                    const members = getIdeMembers(ide);
                    return (
                      <div key={ide} style={{background:"#0a1220",borderRadius:8,padding:14,marginBottom:8,border:"1px solid #152240"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                          <div style={{fontSize:13,fontWeight:600,color:"#a78bfa"}}>{ide}</div>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontSize:11,color:"#5a7a9a"}}>{members.length} membros</span>
                            <span style={{fontSize:10,color:"#5a7a9a"}}>{members[0]?.c || ""}</span>
                          </div>
                        </div>
                        <div>
                          {members.map(m => (
                            <div key={m.i} style={{display:"inline-flex",alignItems:"center",gap:4,padding:"4px 10px",margin:"2px",background:"rgba(59,130,246,0.1)",borderRadius:4,fontSize:11,color:"#8899bb"}}>
                              <span style={{fontFamily:"monospace",color:"#5a7a9a"}}>{m.i}</span>
                              <span>{m.n}</span>
                              <span onClick={() => {
                                const newMods = {...mods};
                                if (!newMods[m.i]) newMods[m.i] = {};
                                newMods[m.i].d = null;
                                saveMods(newMods);
                                showToast(`${m.n} removido do grupo ${ide}`);
                              }} style={{cursor:"pointer",color:"#ef4444",fontWeight:700,marginLeft:6,fontSize:10}} title="Remover deste grupo">✕</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* MODAL: Recontato TicketFlow */}
      {reContatoModal && (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:250,padding:20}} onClick={() => setReContatoModal(null)}>
          <div style={{background:"linear-gradient(135deg,#111c30,#152240)",border:"1px solid #2563eb",borderRadius:16,padding:28,maxWidth:500,width:"100%",animation:"slideUp .3s ease"}} onClick={e => e.stopPropagation()}>
            <div style={{fontSize:16,fontWeight:700,color:"#e2e8f0",marginBottom:4}}>📤 Abrir Recontato no TicketFlow</div>
            <div style={{fontSize:11,color:"#5a7a9a",marginBottom:20}}>Ticket será criado automaticamente com os dados do cliente</div>
            
            <div style={{background:"#0a1220",borderRadius:8,padding:14,marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:600,color:"#e2e8f0",marginBottom:4}}>{reContatoModal.nome}</div>
              <div style={{fontSize:11,color:"#5a7a9a"}}>{reContatoModal.cidade} • {reContatoModal.diasSemCompra >= 9999 ? "Nunca comprou" : reContatoModal.diasSemCompra + " dias sem comprar"} • R$ {(reContatoModal.total||0).toLocaleString('pt-BR',{maximumFractionDigits:0})} histórico</div>
              {reContatoModal.produtos && Object.keys(reContatoModal.produtos).length > 0 && (
                <div style={{fontSize:10,color:"#60a5fa",marginTop:6}}>
                  Top produtos: {Object.entries(reContatoModal.produtos).sort(([,a],[,b]) => b.valor - a.valor).slice(0,3).map(([,p]) => p.desc).join(', ')}
                </div>
              )}
            </div>
            
            <div style={{marginBottom:16}}>
              <label style={{fontSize:10,color:"#5a7a9a",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>Vendedor responsável *</label>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {VENDEDORES_TICKETFLOW.map(v => (
                  <button key={v} onClick={() => setReContatoVendedor(v)} style={{
                    padding:"8px 14px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",
                    background: reContatoVendedor === v ? "rgba(37,99,235,0.2)" : "#0a1220",
                    border: `1px solid ${reContatoVendedor === v ? "#2563eb" : "#1e3050"}`,
                    color: reContatoVendedor === v ? "#60a5fa" : "#8899bb"
                  }}>{v}</button>
                ))}
              </div>
            </div>
            
            <div style={{display:"flex",gap:10}}>
              <button onClick={() => setReContatoModal(null)} style={{flex:1,padding:"12px",background:"#1a2744",border:"1px solid #2a3f66",borderRadius:8,color:"#8899bb",fontSize:12,cursor:"pointer"}}>Cancelar</button>
              <button disabled={!reContatoVendedor || ticketflowSyncing} onClick={async () => {
                setTicketflowSyncing(true);
                const result = await criarRecontato(reContatoModal, reContatoVendedor);
                setTicketflowSyncing(false);
                if (result.ok) {
                  // Salvar anotação local de que o recontato foi aberto
                  const novasAnot = {...anotacoes};
                  const crmKey = reContatoModal.id;
                  if (!novasAnot[crmKey]) novasAnot[crmKey] = [];
                  novasAnot[crmKey].push({
                    tipo: "ticketflow",
                    vendedor: "CRM Peteca",
                    data: new Date().toISOString(),
                    dataDisplay: new Date().toLocaleDateString('pt-BR'),
                    obs: `📤 Ticket de Recontato aberto no TicketFlow. Vendedor: ${reContatoVendedor}`,
                    ticketId: result.id
                  });
                  setAnotacoes(novasAnot);
                  try { await window.storage.set(ANOTACOES_STORAGE, JSON.stringify(novasAnot)); } catch(e) {}
                  
                  setReContatoModal(null);
                  showToast(`✅ Ticket criado no TicketFlow! Vendedor: ${reContatoVendedor}`);
                } else {
                  showToast(`❌ Erro ao criar ticket: ${result.error || 'Sem conexão'}`, "error");
                }
              }} style={{
                flex:1,padding:"12px",
                background: (!reContatoVendedor || ticketflowSyncing) ? "#1a2744" : "linear-gradient(135deg,#2563eb,#1d4ed8)",
                border:"none",borderRadius:8,
                color: (!reContatoVendedor || ticketflowSyncing) ? "#4a5a6a" : "#fff",
                fontSize:12,fontWeight:700,
                cursor: (!reContatoVendedor || ticketflowSyncing) ? "default" : "pointer"
              }}>{ticketflowSyncing ? "⏳ Criando..." : "📤 Criar Ticket"}</button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL: Backup */}
      {showBackupModal && (
        <div style={{
          position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",
          display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20
        }} onClick={() => setShowBackupModal(false)}>
          <div style={{
            background:"linear-gradient(135deg,#111c30,#152240)",border:"1px solid #1e3050",
            borderRadius:16,padding:32,maxWidth:450,width:"100%",animation:"slideUp .3s ease"
          }} onClick={e => e.stopPropagation()}>
            <div style={{fontSize:18,fontWeight:700,color:"#e2e8f0",marginBottom:4}}>💾 Backup do Sistema</div>
            <div style={{fontSize:12,color:"#5a7a9a",marginBottom:24}}>
              Último backup: {lastBackup ? new Date(lastBackup).toLocaleDateString("pt-BR") : "Nunca realizado"}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <button onClick={(e) => { e.stopPropagation(); exportBackup(); }} style={{
                padding:"14px",background:"linear-gradient(135deg,#2563eb,#1d4ed8)",
                border:"none",borderRadius:10,color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer"
              }}>⬇ Exportar Backup</button>
              <button onClick={() => fileInputRef.current?.click()} style={{
                padding:"14px",background:"#1a2744",border:"1px solid #2a3f66",
                borderRadius:10,color:"#8899bb",fontSize:14,cursor:"pointer"
              }}>⬆ Importar Backup</button>
              <input ref={fileInputRef} type="file" accept=".json" onChange={importBackup} style={{display:"none"}} />
              <div style={{borderTop:"1px solid #1e3050",paddingTop:12,marginTop:4}}>
                <div style={{fontSize:11,color:"#5a7a9a",marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Zona de perigo</div>
                {!showConfirmReset ? (
                  <button onClick={() => setShowConfirmReset(1)} style={{
                    width:"100%",padding:"12px",background:"#3b1111",border:"1px solid #5c2020",
                    borderRadius:10,color:"#f87171",fontSize:13,fontWeight:600,cursor:"pointer"
                  }}>🗑 Resetar Todas as Vendas</button>
                ) : showConfirmReset === 1 ? (
                  <div style={{background:"#2a0a0a",border:"1px solid #dc2626",borderRadius:10,padding:16,textAlign:"center"}}>
                    <div style={{fontSize:13,color:"#fca5a5",marginBottom:12}}>Tem certeza? Isso apagará TODAS as vendas importadas.</div>
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={() => setShowConfirmReset(null)} style={{flex:1,padding:"10px",background:"#1a2744",border:"1px solid #2a3f66",borderRadius:8,color:"#8899bb",fontSize:12,cursor:"pointer"}}>Cancelar</button>
                      <button onClick={() => setShowConfirmReset(2)} style={{flex:1,padding:"10px",background:"#dc2626",border:"none",borderRadius:8,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>Sim, continuar</button>
                    </div>
                  </div>
                ) : showConfirmReset === 2 ? (
                  <div style={{background:"#2a0a0a",border:"1px solid #dc2626",borderRadius:10,padding:16,textAlign:"center"}}>
                    <div style={{fontSize:13,color:"#fca5a5",marginBottom:12}}>⚠️ SEGUNDA CONFIRMAÇÃO: Ação irreversível!</div>
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={() => setShowConfirmReset(null)} style={{flex:1,padding:"10px",background:"#1a2744",border:"1px solid #2a3f66",borderRadius:8,color:"#8899bb",fontSize:12,cursor:"pointer"}}>Cancelar</button>
                      <button onClick={async () => {
                        setShowConfirmReset(3);
                        setResetProgress({total: 3, done: 0, current: "Apagando índice principal..."});
                        
                        // Estratégia super simples: apagar apenas o ÍNDICE
                        // Sem o índice, o loadVendas não vai carregar NADA
                        // O resto fica "órfão" mas não causa problema
                        
                        try {
                          await window.storage.delete(VENDAS_STORAGE);
                          setResetProgress({total: 3, done: 1, current: "Índice apagado"});
                        } catch(e) {
                          try { await window.storage.set(VENDAS_STORAGE, JSON.stringify({version:2, anos:[]})); } catch(ee) {}
                          setResetProgress({total: 3, done: 1, current: "Índice zerado"});
                        }
                        
                        await new Promise(r => setTimeout(r, 300));
                        setResetProgress({total: 3, done: 2, current: "Limpando memória..."});
                        
                        setVendas({});
                        setAnosSelecionados([]);
                        setHoveredMes(null);
                        
                        await new Promise(r => setTimeout(r, 300));
                        setResetProgress({total: 3, done: 3, current: "Concluído!"});
                        
                        await new Promise(r => setTimeout(r, 500));
                        setResetProgress(null);
                        setShowConfirmReset(null);
                        setShowBackupModal(false);
                        showToast("✅ Reset concluído! Sistema pronto para novas importações.");
                      }} style={{flex:1,padding:"10px",background:"#dc2626",border:"none",borderRadius:8,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>CONFIRMAR RESET</button>
                    </div>
                  </div>
                ) : (
                  // Modo 3: progresso em andamento
                  <div style={{background:"#1a0a0a",border:"1px solid #dc2626",borderRadius:10,padding:20,textAlign:"center"}}>
                    <div style={{fontSize:24,marginBottom:12,animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</div>
                    <div style={{fontSize:14,fontWeight:700,color:"#fca5a5",marginBottom:4}}>Resetando vendas...</div>
                    <div style={{fontSize:11,color:"#8899bb",marginBottom:16,fontFamily:"monospace"}}>
                      {resetProgress?.current || "..."}
                    </div>
                    <div style={{height:14,background:"#0a1220",borderRadius:7,overflow:"hidden",marginBottom:8,border:"1px solid #3a1010"}}>
                      <div style={{
                        height:"100%",
                        width:`${resetProgress?.total > 0 ? (resetProgress.done / resetProgress.total) * 100 : 0}%`,
                        background:"linear-gradient(90deg,#dc2626,#f87171)",
                        transition:"width .3s ease",
                        boxShadow:"0 0 10px rgba(220,38,38,0.5)"
                      }}/>
                    </div>
                    <div style={{fontSize:13,fontWeight:700,color:"#fca5a5"}}>
                      {resetProgress?.done || 0} de {resetProgress?.total || 0} meses 
                      ({resetProgress?.total > 0 ? Math.round((resetProgress.done / resetProgress.total) * 100) : 0}%)
                    </div>
                  </div>
                )}
              </div>
            </div>
            <button onClick={() => setShowBackupModal(false)} style={{
              width:"100%",marginTop:16,padding:"10px",background:"none",border:"1px solid #1e3050",
              borderRadius:8,color:"#5a7a9a",fontSize:12,cursor:"pointer"
            }}>Fechar</button>
          </div>
        </div>
      )}

      {/* TOAST */}
      {toast && (
        <div style={{
          position:"fixed",bottom:24,right:24,
          background: toast.type==="error" ? "#7f1d1d" : "#0d3320",
          border: `1px solid ${toast.type==="error" ? "#dc2626" : "#16a34a"}`,
          borderRadius:10,padding:"12px 20px",color: toast.type==="error" ? "#fca5a5" : "#86efac",
          fontSize:13,fontWeight:500,zIndex:500,animation:"slideUp .3s ease",
          boxShadow:"0 8px 30px rgba(0,0,0,0.4)"
        }}>{toast.msg}</div>
      )}
    </div>
  );
}

const container=document.getElementById('root');
const root=ReactDOM.createRoot(container);
root.render(React.createElement(CRMPeteca));
</script>
</body></html>
