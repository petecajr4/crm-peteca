          border: `1px solid ${toast.type==="error" ? "#dc2626" : toast.type==="warning" ? "#eab308" : "#16a34a"}`,
          borderRadius:10,padding:"12px 18px",
          color: toast.type==="error" ? "#fca5a5" : toast.type==="warning" ? "#fde68a" : "#86efac",
          fontSize:13,fontWeight:500,zIndex:500,animation:"slideUp .3s ease",
          boxShadow:"0 8px 30px rgba(0,0,0,0.4)",
          display:"flex",alignItems:"center",gap:14,maxWidth:"calc(100vw - 48px)"
        }}>
          <div style={{flex:1}}>{toast.msg}</div>
          {toast.action && toast.actionLabel && (
            <button onClick={() => { toast.action(); setToast(null); }} style={{
              padding:"6px 12px",
              background:"rgba(255,255,255,0.1)",
              border:"1px solid rgba(255,255,255,0.2)",
              borderRadius:6,
              color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",
              flexShrink:0
            }} onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,0.18)";}}
               onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.1)";}}>
              {toast.actionLabel}
            </button>
          )}
        </div>
      )}
    </div>
  );
}

// ============================================================
// KANBAN BOLINHAS (admin) — versão simplificada do vendedor
// ============================================================
function KanbanBolinhasAdmin({ kanbans, onSelectKanban, cidadeDestacada }) {
  const containerRef = useRef(null);
  const [dimensions, setDimensions] = useState({ w: 800, h: 600 });
  const particlesRef = useRef({});
  const draggingRef = useRef(null);
  const [, setTick] = useState(0);
  const [hoveredId, setHoveredId] = useState(null);
  
  // v5: Big Bangs — ondas de choque visuais (suporta múltiplas simultâneas)
  const [bigBangs, setBigBangs] = useState([]); // array de {id, x, y, time, color}
  
  // v6: Banimento dramático — intrusos voam pra fora ao colidir
  const banidosRef = useRef({}); // id -> { phase, startTime, fromX, fromY, vx, vy, rot, rotSpeed, color, trail }
  // phase: 'flying' (saindo) | 'banned' (fora da tela) | 'returning' (voltando)
  const [, setBanidosRender] = useState(0); // força render quando banidos mudam
  
  // Anima as ondas dos Big Bangs (re-render contínuo enquanto ativos)
  useEffect(() => {
    if (bigBangs.length === 0) return;
    let raf;
    const tick = () => {
      setTick(t => t + 1);
      const now = Date.now();
      const ativos = bigBangs.filter(b => now - b.time < 600);
      if (ativos.length > 0) raf = requestAnimationFrame(tick);
      else setBigBangs([]);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [bigBangs]);
  
  // PALETA EXTREMA (12 cores muito distintas, sem conflito com status azul/verde/laranja/cinza)
  const PALETA_CIDADES = [
    '#ec4899', // rosa choque
    '#a855f7', // roxo neon
    '#22d3ee', // ciano elétrico
    '#ffd60a', // amarelo solar
    '#d946ef', // magenta
    '#14b8a6', // turquesa
    '#ff5252', // vermelho coral
    '#a3e635', // lima
    '#fdba74', // coral pêssego
    '#34d399', // verde menta
    '#c084fc', // lavanda
    '#facc15'  // dourado
  ];
  
  // Grupos por cidade (mapa cidade -> array de ids)
  const gruposCidade = useMemo(() => {
    const mapa = {};
    kanbans.forEach(k => {
      const cidade = k.cliente_cidade || '—';
      if (!mapa[cidade]) mapa[cidade] = [];
      mapa[cidade].push(k.id);
    });
    // Só retorna grupos com 2+ bolinhas e atribui cor da paleta
    return Object.entries(mapa)
      .filter(([_, ids]) => ids.length >= 2)
      .map(([cidade, ids]) => {
        // Hash estável da cidade pra cor consistente
        let hash = 0;
        for (let c = 0; c < cidade.length; c++) hash = ((hash << 5) - hash) + cidade.charCodeAt(c);
        const idx = Math.abs(hash) % PALETA_CIDADES.length;
        return { cidade, ids, cor: PALETA_CIDADES[idx] };
      });
  }, [kanbans]);
  
  // Mapa id -> grupo (lookup rápido pra renderização da aura)
  const idToGrupo = useMemo(() => {
    const m = {};
    gruposCidade.forEach(g => {
      g.ids.forEach(id => { m[id] = g; });
    });
    return m;
  }, [gruposCidade]);
  
  // Quando filtra cidade, desativa as auras (todos seriam da mesma cidade = redundante)
  const aurasDesativadas = !!cidadeDestacada;
  
  // Cidade da bolinha hover (pra acender linhas)
  const hoveredGrupo = hoveredId ? idToGrupo[hoveredId] : null;
  
  const STATUS_CORES = {
    aberto:  { cor: '#60a5fa', corEscura: '#2563eb' },
    contato: { cor: '#4ade80', corEscura: '#16a34a' },
    retorno: { cor: '#fb923c', corEscura: '#ea580c' },
    perdido: { cor: '#6b7280', corEscura: '#374151' }
  };
  
  const calcSize = (p) => {
    const v = Math.max(0, Number(p) || 0);
    if (v === 0) return 42;
    return Math.max(42, Math.min(130, 30 + Math.log10(v + 1) * 14));
  };
  
  useEffect(() => {
    const updateDim = () => {
      if (containerRef.current) {
        const r = containerRef.current.getBoundingClientRect();
        setDimensions({ w: r.width, h: Math.max(500, r.height) });
      }
    };
    updateDim();
    window.addEventListener('resize', updateDim);
    return () => window.removeEventListener('resize', updateDim);
  }, []);
  
  useEffect(() => {
    const atuais = new Set(kanbans.map(k => k.id));
    Object.keys(particlesRef.current).forEach(id => {
      if (!atuais.has(id)) delete particlesRef.current[id];
    });
    kanbans.forEach(k => {
      if (!particlesRef.current[k.id]) {
        const isPerdido = k.status === 'perdido';
        const angle = Math.random() * Math.PI * 2;
        const speed = isPerdido ? 1.2 : 2.5;
        particlesRef.current[k.id] = {
          x: 100 + Math.random() * Math.max(100, dimensions.w - 200),
          y: isPerdido ? dimensions.h * 0.78 + Math.random() * (dimensions.h * 0.15) : 80 + Math.random() * Math.max(100, dimensions.h * 0.55),
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: calcSize(k.potencial_perdido) / 2,
          m: Math.pow(calcSize(k.potencial_perdido) / 2, 2)
        };
      } else {
        particlesRef.current[k.id].r = calcSize(k.potencial_perdido) / 2;
        particlesRef.current[k.id].m = Math.pow(calcSize(k.potencial_perdido) / 2, 2);
      }
    });
  }, [kanbans, dimensions]);
  
  useEffect(() => {
    let running = true;
    const kanbansMap = {};
    kanbans.forEach(k => { kanbansMap[k.id] = k; });
    
    const tickFn = () => {
      if (!running) return;
      const parts = particlesRef.current;
      const ids = Object.keys(parts);
      const { w, h } = dimensions;
      const perdidosLimite = h * 0.7;
      
      ids.forEach(id => {
        const p = parts[id];
        if (!p) return;
        if (draggingRef.current?.id === id) return;
        // Pula banidas (têm sua própria física)
        if (banidosRef.current[id]) return;
        const kanban = kanbansMap[id];
        const isPerdido = kanban?.status === 'perdido';
        p.x += p.vx; p.y += p.vy;
        const drag = isPerdido ? 0.995 : 0.998;
        p.vx *= drag; p.vy *= drag;
        if (Math.random() < 0.08) {
          const force = isPerdido ? 0.35 : 0.6;
          p.vx += (Math.random() - 0.5) * force;
          p.vy += (Math.random() - 0.5) * force;
        }
        if (isPerdido && p.y < perdidosLimite) p.vy += 0.12;
        if (!isPerdido && p.y > perdidosLimite - 20) p.vy -= 0.15;
        const vAtual = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
        const vMin = isPerdido ? 0.4 : 0.8;
        if (vAtual < vMin) {
          if (vAtual > 0.01) { p.vx *= vMin/vAtual; p.vy *= vMin/vAtual; }
          else { const ang = Math.random()*Math.PI*2; p.vx = Math.cos(ang)*vMin; p.vy = Math.sin(ang)*vMin; }
        }
        const maxV = isPerdido ? 2.8 : 4.5;
        if (vAtual > maxV) { p.vx = (p.vx/vAtual)*maxV; p.vy = (p.vy/vAtual)*maxV; }
        if (p.x - p.r < 10) { p.x = p.r + 10; p.vx = Math.abs(p.vx) * 0.95; }
        if (p.x + p.r > w - 10) { p.x = w - p.r - 10; p.vx = -Math.abs(p.vx) * 0.95; }
        if (p.y - p.r < 10) { p.y = p.r + 10; p.vy = Math.abs(p.vy) * 0.95; }
        if (p.y + p.r > h - 10) { p.y = h - p.r - 10; p.vy = -Math.abs(p.vy) * 0.95; }
      });
      
      for (let i = 0; i < ids.length; i++) {
        for (let j = i+1; j < ids.length; j++) {
          const a = parts[ids[i]]; const b = parts[ids[j]];
          if (!a || !b) continue;
          // Pula colisões com banidas
          if (banidosRef.current[ids[i]] || banidosRef.current[ids[j]]) continue;
          const dx = b.x - a.x; const dy = b.y - a.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          const minDist = a.r + b.r + 2;
          if (dist < minDist && dist > 0.01) {
            const overlap = minDist - dist;
            const nx = dx/dist; const ny = dy/dist;
            const totalMass = a.m + b.m;
            a.x -= nx*overlap*(b.m/totalMass); a.y -= ny*overlap*(b.m/totalMass);
            b.x += nx*overlap*(a.m/totalMass); b.y += ny*overlap*(a.m/totalMass);
            const van = a.vx*nx + a.vy*ny; const vbn = b.vx*nx + b.vy*ny;
            if (van - vbn > 0) {
              const vanNew = (van*(a.m-b.m) + 2*b.m*vbn)/totalMass;
              const vbnNew = (vbn*(b.m-a.m) + 2*a.m*van)/totalMass;
              a.vx += (vanNew-van)*nx*0.95; a.vy += (vanNew-van)*ny*0.95;
              b.vx += (vbnNew-vbn)*nx*0.95; b.vy += (vbnNew-vbn)*ny*0.95;
            }
          }
        }
      }
      
      // Forças elásticas entre bolinhas da mesma cidade (só ativam quando arrastando uma do grupo)
      const dragId = draggingRef.current?.id;
      if (dragId) {
        gruposCidade.forEach(grupo => {
          // Só aplica se a bolinha arrastada pertence a esse grupo
          if (!grupo.ids.includes(dragId)) return;
          const distalvo = 180;
          const k_mola = 0.0025; // mais forte quando arrastando
          for (let i = 0; i < grupo.ids.length; i++) {
            for (let j = i+1; j < grupo.ids.length; j++) {
              const a = parts[grupo.ids[i]]; const b = parts[grupo.ids[j]];
              if (!a || !b) continue;
              const dx = b.x - a.x; const dy = b.y - a.y;
              const dist = Math.sqrt(dx*dx + dy*dy);
              if (dist < 1) continue;
              const nx = dx/dist; const ny = dy/dist;
              const forca = (dist - distalvo) * k_mola;
              a.vx += nx * forca;
              a.vy += ny * forca;
              b.vx -= nx * forca;
              b.vy -= ny * forca;
            }
          }
        });
      }
      
      // VÓRTEX + BANIMENTO: enquanto arrasta, TODAS as irmãs ativas repelem e banem intrusos
      if (dragId) {
        const grupoArrastado = idToGrupo[dragId];
        if (grupoArrastado) {
          // Mapa de status pra excluir perdidas
          const statusMap = {};
          kanbans.forEach(k => { statusMap[k.id] = k.status; });
          
          // Irmãs ativas (incluindo a agarrada) — perdidas não participam
          const irmasAtivas = grupoArrastado.ids.filter(iid => statusMap[iid] !== 'perdido');
          
          const RAIO_VORTEX = 250;
          const FORCA_REPULSAO = 1.4;
          const FORCA_ROTACAO = 0.5;
          
          ids.forEach(id => {
            // Pula a agarrada e as próprias irmãs
            const grupoBolinha = idToGrupo[id];
            if (grupoBolinha && grupoBolinha.cidade === grupoArrastado.cidade) return;
            // Já banido? Pula
            if (banidosRef.current[id]) return;
            
            const intruso = parts[id];
            if (!intruso) return;
            
            // Para cada irmã ativa, verifica se essa intrusa está colidindo ou sob vórtex
            for (let k = 0; k < irmasAtivas.length; k++) {
              const irmaId = irmasAtivas[k];
              const irmaP = parts[irmaId];
              if (!irmaP) continue;
              
              const dx = intruso.x - irmaP.x;
              const dy = intruso.y - irmaP.y;
              const dist = Math.sqrt(dx*dx + dy*dy);
              const distColisao = irmaP.r + intruso.r + 4;
              
              // 💥 COLISÃO REAL com QUALQUER irmã = BANIR
              if (dist < distColisao && dist > 0.1) {
                const nx = dx/dist;
                const ny = dy/dist;
                const vForte = 28;
                const vRot = 12;
                banidosRef.current[id] = {
                  phase: 'flying',
                  startTime: Date.now(),
                  vx: nx * vForte + (-ny) * vRot,
                  vy: ny * vForte + nx * vRot,
                  rot: 0,
                  rotSpeed: (Math.random() - 0.5) * 0.4 + 0.2,
                  color: grupoBolinha ? grupoBolinha.cor : '#94a3b8',
                  trail: [],
                  fromCenterX: irmaP.x,
                  fromCenterY: irmaP.y
                };
                setBanidosRender(r => r + 1);
                return; // Sai do forEach desse intruso (já banido)
              }
              
              // Vórtex normal de cada irmã (acumula força)
              if (dist < RAIO_VORTEX && dist > 1) {
                const nx = dx/dist;
                const ny = dy/dist;
                const intensidade = (1 - dist / RAIO_VORTEX);
                intruso.vx += nx * FORCA_REPULSAO * intensidade;
                intruso.vy += ny * FORCA_REPULSAO * intensidade;
                intruso.vx += -ny * FORCA_ROTACAO * intensidade;
                intruso.vy += nx * FORCA_ROTACAO * intensidade;
              }
            }
          });
        }
      }
      
      // 🌀 ANIMAÇÃO DAS BANIDAS (espiral pra fora + trail)
      Object.keys(banidosRef.current).forEach(id => {
        const b = banidosRef.current[id];
        const p = parts[id];
        if (!p || !b) return;
        
        if (b.phase === 'flying') {
          // Move com inércia (sem damping pra não desacelerar)
          p.x += b.vx;
          p.y += b.vy;
          b.rot += b.rotSpeed;
          
          // Adiciona ponto ao trail (max 12 pontos)
          b.trail.push({ x: p.x, y: p.y, time: Date.now() });
          if (b.trail.length > 12) b.trail.shift();
          
          // Saiu da tela? Marca como banida (esconde da renderização)
          const margem = 100;
          if (p.x < -margem || p.x > w + margem || p.y < -margem || p.y > h + margem) {
            b.phase = 'banned';
            // Move pra MUITO fora (não interfere em colisões)
            p.x = -9999;
            p.y = -9999;
            p.vx = 0; p.vy = 0;
          }
        } else if (b.phase === 'returning') {
          // Anima retorno: vai do ponto da borda pro centro do alvo
          const elapsed = Date.now() - b.returnStart;
          const dur = 700; // 700ms pra voltar
          const t = Math.min(elapsed / dur, 1);
          // Easing: easeOutCubic
          const ease = 1 - Math.pow(1 - t, 3);
          p.x = b.returnFromX + (b.returnToX - b.returnFromX) * ease;
          p.y = b.returnFromY + (b.returnToY - b.returnFromY) * ease;
          b.rot = (1 - t) * 6; // para de girar conforme chega
          
          if (t >= 1) {
            // Chegou! Limpa banimento, devolve velocidade leve
            const ang = Math.random() * Math.PI * 2;
            p.vx = Math.cos(ang) * 1.5;
            p.vy = Math.sin(ang) * 1.5;
            delete banidosRef.current[id];
            setBanidosRender(r => r + 1);
          }
        }
      });
      
      setTick(t => t + 1);
      requestAnimationFrame(tickFn);
    };
    const raf = requestAnimationFrame(tickFn);
    return () => { running = false; cancelAnimationFrame(raf); };
  }, [kanbans, dimensions, gruposCidade, idToGrupo]);
  
  // 💥 BIG BANG: dispara onda de choque que arremessa intrusos pra fora
  const dispararBigBang = (id) => {
    const p = particlesRef.current[id];
    if (!p) return;
    
    const grupoArrastado = idToGrupo[id];
    const cor = grupoArrastado ? grupoArrastado.cor : '#ffffff';
    
    // Construir mapa rápido de status (perdidos não participam)
    const statusMap = {};
    kanbans.forEach(k => { statusMap[k.id] = k.status; });
    
    // Identificar todas as irmãs ATIVAS (incluindo a agarrada) — só não-perdidas
    let irmasAtivas = [id];
    if (grupoArrastado) {
      irmasAtivas = grupoArrastado.ids.filter(iid => statusMap[iid] !== 'perdido');
      if (irmasAtivas.length === 0) irmasAtivas = [id]; // fallback
    }
    
    // 💥 Dispara Big Bang VISUAL de cada irmã ativa
    const novasOndas = [];
    const now = Date.now();
    irmasAtivas.forEach((irmaId, idx) => {
      const irmaP = particlesRef.current[irmaId];
      if (!irmaP) return;
      novasOndas.push({
        id: irmaId + '_' + now + '_' + idx,
        x: irmaP.x,
        y: irmaP.y,
        time: now + idx * 30, // pequeno delay entre as ondas pra efeito cascata
        color: cor
      });
    });
    setBigBangs(novasOndas);
    
    // Arremesso físico: cada irmã ativa empurra os intrusos no seu raio
    if (grupoArrastado) {
      const RAIO_BANG = 350;
      const FORCA_BANG = 18;
      
      // Para cada intruso, calcula força total somada de todas as irmãs
      Object.keys(particlesRef.current).forEach(otherId => {
        const grupoOutro = idToGrupo[otherId];
        // Pula se for da mesma cidade (não é intruso)
        if (grupoOutro && grupoOutro.cidade === grupoArrastado.cidade) return;
        
        const intruso = particlesRef.current[otherId];
        if (!intruso) return;
        
        // Soma a contribuição de cada irmã ativa
        irmasAtivas.forEach(irmaId => {
          const irmaP = particlesRef.current[irmaId];
          if (!irmaP) return;
          
          const dx = intruso.x - irmaP.x;
          const dy = intruso.y - irmaP.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          
          if (dist < RAIO_BANG && dist > 1) {
            const nx = dx/dist;
            const ny = dy/dist;
            const intensidade = Math.pow(1 - dist / RAIO_BANG, 2);
            intruso.vx += nx * FORCA_BANG * intensidade;
            intruso.vy += ny * FORCA_BANG * intensidade;
          }
        });
      });
    }
  };

  const onMouseDown = (e, id) => {
    const rect = containerRef.current.getBoundingClientRect();
    const p = particlesRef.current[id]; if (!p) return;
    draggingRef.current = { id, offsetX: e.clientX-rect.left-p.x, offsetY: e.clientY-rect.top-p.y, moved: false, startX: e.clientX, startY: e.clientY, lastX: p.x, lastY: p.y, velX: 0, velY: 0 };
    // 💥 Dispara Big Bang
    dispararBigBang(id);
  };
  const onMouseMove = (e) => {
    const d = draggingRef.current; if (!d) return;
    const rect = containerRef.current.getBoundingClientRect();
    const p = particlesRef.current[d.id]; if (!p) return;
    const nx = e.clientX - rect.left - d.offsetX; const ny = e.clientY - rect.top - d.offsetY;
    d.velX = nx - d.lastX; d.velY = ny - d.lastY; d.lastX = nx; d.lastY = ny;
    p.x = nx; p.y = ny; p.vx = 0; p.vy = 0;
    if (Math.abs(e.clientX-d.startX)+Math.abs(e.clientY-d.startY) > 5) d.moved = true;
  };
  const onMouseUp = (id) => {
    const d = draggingRef.current;
    if (d && !d.moved && d.id === id) onSelectKanban(id);
    else if (d && d.moved && d.id === id) {
      const p = particlesRef.current[id];
      if (p) { p.vx = d.velX * 1.2; p.vy = d.velY * 1.2; }
    }
    draggingRef.current = null;
    
    // 🌀 RETORNO EM CASCATA: trazer banidas de volta uma a uma
    const banidosIds = Object.keys(banidosRef.current).filter(bid => 
      banidosRef.current[bid].phase === 'flying' || banidosRef.current[bid].phase === 'banned'
    );
    
    banidosIds.forEach((bid, idx) => {
      setTimeout(() => {
        const b = banidosRef.current[bid];
        if (!b) return;
        const p = particlesRef.current[bid];
        if (!p) return;
        
        const { w, h } = dimensions;
        const centroX = b.fromCenterX || w/2;
        const centroY = b.fromCenterY || h/2;
        
        // Posição final: lado OPOSTO do aglomerado, mas dentro da tela
        const dxC = centroX - w/2;
        const dyC = centroY - h/2;
        const distC = Math.sqrt(dxC*dxC + dyC*dyC) || 1;
        // Vetor oposto normalizado
        const oppNx = -dxC / distC;
        const oppNy = -dyC / distC;
        // Aleatoriedade na posição final
        const angRand = Math.random() * Math.PI * 2;
        const distFinal = 200 + Math.random() * 150;
        const toX = Math.max(60, Math.min(w - 60, w/2 + oppNx * distFinal + Math.cos(angRand) * 80));
        const toY = Math.max(60, Math.min(h - 60, h/2 + oppNy * distFinal + Math.sin(angRand) * 80));
        
        // Posição de entrada: borda da tela na direção da posição final
        const angEntry = Math.atan2(toY - h/2, toX - w/2);
        const fromX = w/2 + Math.cos(angEntry) * (Math.max(w, h) * 0.7);
        const fromY = h/2 + Math.sin(angEntry) * (Math.max(w, h) * 0.7);
        
        b.phase = 'returning';
        b.returnStart = Date.now();
        b.returnFromX = fromX;
        b.returnFromY = fromY;
        b.returnToX = toX;
        b.returnToY = toY;
        // Posiciona na entrada
        p.x = fromX;
        p.y = fromY;
        p.vx = 0; p.vy = 0;
        setBanidosRender(r => r + 1);
      }, idx * 100); // 100ms entre cada
    });
  };
  
  return (
    <div ref={containerRef} style={{
      position:"relative",
      height:'calc(100vh - 320px)',
      minHeight:500,
      background:"rgba(8,12,24,0.4)",
      border:"1px solid rgba(255,255,255,0.05)",
      borderRadius:16,
      overflow:"hidden",
      cursor:"default"
    }}
      onMouseMove={onMouseMove}
      onMouseUp={() => draggingRef.current = null}
      onMouseLeave={() => draggingRef.current = null}
    >
      <div style={{position:'absolute',left:0,right:0,top:'70%',height:1,background:'linear-gradient(90deg, transparent, rgba(107,114,128,0.2), transparent)',pointerEvents:'none'}}></div>
      <div style={{position:'absolute',left:14,top:'calc(70% + 8px)',fontSize:9,color:'rgba(107,114,128,0.5)',letterSpacing:2,textTransform:'uppercase',fontWeight:600,pointerEvents:'none'}}>⚫ Perdidos</div>
      
      {/* 💥 ONDAS DE CHOQUE BIG BANG (múltiplas simultâneas) */}
      {bigBangs.map(bb => {
        const elapsed = Date.now() - bb.time;
        if (elapsed < 0 || elapsed > 600) return null; // ainda não começou ou já terminou
        const progress = Math.min(elapsed / 600, 1);
        const raio = progress * 400;
        const opacity = 1 - progress;
        return (
          <React.Fragment key={bb.id}>
            {/* Anel principal */}
            <div style={{
              position:'absolute',
              left: bb.x - raio,
              top: bb.y - raio,
              width: raio * 2,
              height: raio * 2,
              borderRadius:'50%',
              border: `${4 - progress * 3}px solid ${bb.color}`,
              boxShadow: `0 0 ${40 * (1-progress)}px ${bb.color}, inset 0 0 ${30 * (1-progress)}px ${bb.color}88`,
              opacity: opacity,
              pointerEvents:'none',
              zIndex: 5
            }}/>
            {/* Anel secundário branco (delay) */}
            {elapsed > 50 && (() => {
              const elapsed2 = elapsed - 50;
              const progress2 = Math.min(elapsed2 / 550, 1);
              const raio2 = progress2 * 320;
              const opacity2 = (1 - progress2) * 0.7;
              return (
                <div style={{
                  position:'absolute',
                  left: bb.x - raio2,
                  top: bb.y - raio2,
                  width: raio2 * 2,
                  height: raio2 * 2,
                  borderRadius:'50%',
                  border: `2px solid #fff`,
                  opacity: opacity2,
                  pointerEvents:'none',
                  zIndex: 5
                }}/>
              );
            })()}
            {/* Flash central */}
            {progress < 0.3 && (
              <div style={{
                position:'absolute',
                left: bb.x - 30,
                top: bb.y - 30,
                width: 60, height: 60,
                borderRadius:'50%',
                background: `radial-gradient(circle, #ffffff ${(1-progress*3)*100}%, transparent 100%)`,
                opacity: 1 - progress*3,
                pointerEvents:'none',
                zIndex: 6,
                filter: 'blur(8px)'
              }}/>
            )}
          </React.Fragment>
        );
      })}

      {/* 🌠 TRAIL DAS BANIDAS (rastro de cometa) */}
      {(() => {
        const flying = Object.entries(banidosRef.current).filter(([_, b]) => b.phase === 'flying' && b.trail.length > 1);
        if (flying.length === 0) return null;
        return (
          <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:40}}>
            {flying.map(([id, b]) => {
              const pts = b.trail;
              if (pts.length < 2) return null;
              return pts.slice(0, -1).map((pt, i) => {
                const next = pts[i + 1];
                const ratio = (i + 1) / pts.length;
                return (
                  <line key={id+'_'+i}
                    x1={pt.x} y1={pt.y}
                    x2={next.x} y2={next.y}
                    stroke={b.color}
                    strokeWidth={2 + ratio * 6}
                    strokeOpacity={ratio * 0.8}
                    strokeLinecap="round"/>
                );
              });
            })}
          </svg>
        );
      })()}

      {/* Tag flutuante da cidade destacada (só se tem filtro) */}
      {cidadeDestacada && (() => {
        const grupo = gruposCidade.find(g => g.cidade === cidadeDestacada);
        const qtd = grupo ? grupo.ids.length : 0;
        return (
          <div style={{
            position:'absolute',top:14,left:14,
            padding:'8px 14px',
            background:'linear-gradient(135deg,rgba(99,102,241,0.2),rgba(168,85,247,0.15))',
            backdropFilter:'blur(16px)',
            border:'1px solid rgba(168,85,247,0.3)',
            borderRadius:100,fontSize:11,color:'#c4b5fd',fontWeight:600,
            zIndex:20,boxShadow:'0 4px 12px rgba(168,85,247,0.2)',
            display:'flex',alignItems:'center',gap:6
          }}>
            <span>📍</span>
            <span>{cidadeDestacada}</span>
            <span style={{background:'rgba(168,85,247,0.3)',padding:'2px 7px',borderRadius:10,fontSize:10}}>{qtd}</span>
          </div>
        );
      })()}
      
      {/* Legenda flutuante */}
      <div style={{position:'absolute',top:14,right:14,display:'flex',gap:12,padding:'8px 14px',background:'rgba(13,21,38,0.85)',backdropFilter:'blur(16px)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:100,fontSize:11,color:'#94a3b8',fontWeight:500,zIndex:20,boxShadow:'0 4px 12px rgba(0,0,0,0.3)'}}>
        {Object.entries({aberto:'Aberto',contato:'Em contato',retorno:'Retorno',perdido:'Perdido'}).map(([key, label]) => (
          <div key={key} style={{display:'flex',alignItems:'center',gap:5}}>
            <span style={{width:8,height:8,borderRadius:'50%',background:STATUS_CORES[key].cor,boxShadow:`0 0 6px ${STATUS_CORES[key].cor}80`}}></span>
            <span>{label}</span>
          </div>
        ))}
      </div>
      
      {kanbans.map(k => {
        const p = particlesRef.current[k.id];
        if (!p) return null;
        
        // Banidas: estado especial
        const banimento = banidosRef.current[k.id];
        if (banimento && banimento.phase === 'banned') return null; // não renderiza enquanto fora
        
        const s = STATUS_CORES[k.status] || STATUS_CORES.aberto;
        const size = p.r * 2;
        const fontSize = Math.max(9, Math.min(14, size * 0.14));
        const shortName = k.cliente_nome.length > 20 && size < 80 ? k.cliente_nome.slice(0,18)+'…' : k.cliente_nome;
        
        // v4: aura/halo da cidade
        const grupoDaCidade = idToGrupo[k.id];
        const temAura = grupoDaCidade && !aurasDesativadas;
        
        // v4: lógica de hover (acende irmãs, escurece outros)
        const isHovered = hoveredId === k.id;
        const isIrma = hoveredGrupo && grupoDaCidade && hoveredGrupo.cidade === grupoDaCidade.cidade && !isHovered;
        const isOutraCidade = hoveredId && !isHovered && !isIrma;
        
        // Borda da cidade (substitui o halo)
        const corBorda = temAura ? grupoDaCidade.cor : s.cor;
        const larguraBorda = temAura ? 3 : 1.5;
        
        // Glow padrão
        let boxShadow = `0 4px 20px ${s.cor}55, inset 0 2px 8px rgba(255,255,255,0.2), inset 0 -4px 10px rgba(0,0,0,0.15)`;
        if (isHovered) {
          boxShadow = `0 0 28px 6px ${corBorda}aa, 0 8px 32px ${s.cor}88, inset 0 2px 8px rgba(255,255,255,0.3)`;
        } else if (isIrma) {
          boxShadow = `0 0 18px 4px ${corBorda}88, 0 4px 20px ${s.cor}66`;
        }
        
        // Opacidade
        let opacity = k.status === 'perdido' ? 0.7 : 1;
        if (isOutraCidade) opacity = 0.35;
        
        // Banida: rotação dramática + brilho
        const isBanida = !!banimento;
        const rotacao = banimento ? banimento.rot : 0;
        const sombraBanida = banimento 
          ? `0 0 30px 6px ${banimento.color}cc, 0 0 60px 12px ${banimento.color}66, ${boxShadow}`
          : null;
        
        return (
          <div
            key={k.id}
            className="bubble"
            onMouseDown={e => !isBanida && onMouseDown(e, k.id)}
            onMouseUp={() => !isBanida && onMouseUp(k.id)}
            onMouseEnter={() => !isBanida && setHoveredId(k.id)}
            onMouseLeave={() => setHoveredId(null)}
            style={{
              left: p.x - p.r, top: p.y - p.r, width: size, height: size,
              background: `radial-gradient(circle at 35% 30%, ${s.cor}ee, ${s.corEscura}dd)`,
              border: `${larguraBorda}px solid ${corBorda}`,
              boxShadow: sombraBanida || boxShadow,
              color: '#fff', fontSize: fontSize,
              opacity: opacity,
              position: 'absolute', borderRadius: '50%',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              textAlign: 'center', cursor: isBanida ? 'default' : 'grab', userSelect: 'none',
              fontWeight: 700, padding: 6, overflow: 'hidden', lineHeight: 1.1,
              transition: isBanida ? 'none' : 'opacity .25s, box-shadow .25s, border-color .25s',
              transform: isBanida ? `rotate(${rotacao}rad)` : 'none',
              zIndex: isBanida ? 50 : (isHovered ? 30 : (isIrma ? 20 : 10)),
              pointerEvents: isBanida ? 'none' : 'auto'
            }}
            title={`${k.cliente_nome} • ${k.vendedor}${grupoDaCidade ? ' • 📍 ' + grupoDaCidade.cidade : ''}`}
          >
            <span className="bubble-label" style={{fontSize:fontSize,fontWeight:700}}>{shortName}</span>
            {/* Nome do vendedor em selo pequeno */}
            {size >= 60 && (
              <span style={{
                position:'absolute',bottom:-4,right:-4,
                background:'rgba(0,0,0,0.6)',color:'#fff',
                fontSize:8,padding:'2px 5px',borderRadius:8,
                fontWeight:700,letterSpacing:0.5,pointerEvents:'none',
                border:'1px solid rgba(255,255,255,0.2)'
              }}>{k.vendedor.slice(0,3)}</span>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ============================================================
// MODAL DETALHE KANBAN (admin) - com botão Finalizar
// ============================================================
function KanbanDetalheAdminModal({ kanban, onClose, onUpdateStatus, onUpdateTags, onAddComment, onFinalize, tags, adminName, callKanbanAPI }) {
  const [commentText, setCommentText] = useState('');
  const [historico, setHistorico] = useState([]);
  const [loadingHist, setLoadingHist] = useState(false);
  const [confirmFinalize, setConfirmFinalize] = useState(false);
  const [motivoFinal, setMotivoFinal] = useState('');
  
  const STATUS_CORES = {
    aberto:  { cor: '#60a5fa', corEscura: '#2563eb', emoji: '🔵', label: 'Aberto' },
    contato: { cor: '#4ade80', corEscura: '#16a34a', emoji: '🟢', label: 'Em contato' },
    retorno: { cor: '#fb923c', corEscura: '#ea580c', emoji: '🟠', label: 'Retorno provável' },
    perdido: { cor: '#6b7280', corEscura: '#374151', emoji: '⚫', label: 'Perdido' }
  };
  
  const tagsAtuais = useMemo(() => (kanban.tags || '').split(';').filter(Boolean), [kanban.tags]);
  
  const loadHistorico = useCallback(async () => {
    setLoadingHist(true);
    const res = await callKanbanAPI('getHistory', { kanban_id: kanban.id });
    if (res.ok) setHistorico(res.historico);
    setLoadingHist(false);
  }, [kanban.id, callKanbanAPI]);
  
  useEffect(() => { loadHistorico(); }, [loadHistorico]);
  
  const toggleTag = (tagNome) => {
    const novas = tagsAtuais.includes(tagNome) ? tagsAtuais.filter(t => t !== tagNome) : [...tagsAtuais, tagNome];
    onUpdateTags(kanban.id, novas);
  };
  const handleAddComment = async () => {
    if (!commentText.trim()) return;
    const ok = await onAddComment(kanban.id, commentText.trim());
    if (ok) { setCommentText(''); loadHistorico(); }
  };
  const handleFinalize = async () => {
    await onFinalize(kanban.id, motivoFinal || 'Finalizado pelo admin');
    onClose();
  };
  
  const s = STATUS_CORES[kanban.status] || STATUS_CORES.aberto;
  const fmt = (n) => 'R$ ' + Number(n||0).toLocaleString('pt-BR', {minimumFractionDigits: 2});
  const fmtData = (d) => { if (!d) return '—'; try { const dt=new Date(d); return dt.toLocaleDateString('pt-BR')+' '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); } catch(e){return String(d);} };
  
  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',backdropFilter:'blur(6px)',zIndex:1300,display:'flex',alignItems:'center',justifyContent:'center',padding:20,animation:'fadeIn .2s'}}>
      <div onClick={e => e.stopPropagation()} style={{width:'100%',maxWidth:640,maxHeight:'90vh',overflowY:'auto',background:'rgba(13,21,38,0.95)',backdropFilter:'blur(20px) saturate(180%)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:20,boxShadow:'0 20px 60px rgba(0,0,0,0.5)',animation:'scaleIn .25s cubic-bezier(.4,0,.2,1)'}}>
        <div style={{background:`linear-gradient(135deg, ${s.cor}33, ${s.corEscura}22)`,borderBottom:`1px solid ${s.cor}44`,padding:'20px 24px',position:'relative'}}>
          <button onClick={onClose} style={{position:'absolute',top:14,right:14,width:32,height:32,borderRadius:8,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',color:'#94a3b8',fontSize:16,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>✕</button>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6,flexWrap:'wrap'}}>
            <span style={{fontSize:10,fontWeight:700,letterSpacing:1,textTransform:'uppercase',padding:'3px 8px',borderRadius:20,background:`${s.cor}33`,color:s.cor,border:`1px solid ${s.cor}66`}}>{s.emoji} {s.label}</span>
            <span style={{fontSize:10,fontWeight:700,letterSpacing:1,textTransform:'uppercase',padding:'3px 8px',borderRadius:20,background:'rgba(168,85,247,0.15)',color:'#c4b5fd',border:'1px solid rgba(168,85,247,0.25)'}}>👤 {kanban.vendedor}</span>
          </div>
          <div style={{fontSize:20,fontWeight:800,letterSpacing:-0.5,marginBottom:4}}>{kanban.cliente_nome}</div>
          <div style={{fontSize:11,color:'#94a3b8',letterSpacing:0.5}}>📍 {kanban.cliente_cidade || '—'} • ID {kanban.cliente_id}</div>
        </div>
        
        <div style={{padding:'18px 24px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
          <div style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.05)',borderRadius:10,padding:'10px 14px'}}>
            <div style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:1,fontWeight:600,marginBottom:4}}>Faturamento histórico</div>
            <div style={{fontSize:15,fontWeight:700,color:'#4ade80'}}>{fmt(kanban.faturamento_hist)}</div>
          </div>
          <div style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.05)',borderRadius:10,padding:'10px 14px'}}>
            <div style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:1,fontWeight:600,marginBottom:4}}>Potencial perdido</div>
            <div style={{fontSize:15,fontWeight:700,color:'#fca5a5'}}>{fmt(kanban.potencial_perdido)}</div>
          </div>
        </div>
        
        <div style={{padding:'18px 24px',borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
          <div style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:1,fontWeight:600,marginBottom:10}}>Mudar situação</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {Object.entries(STATUS_CORES).map(([key, st]) => {
              const isActive = kanban.status === key;
              return (
                <button key={key} onClick={() => onUpdateStatus(kanban.id, key)} disabled={isActive} style={{padding:'8px 14px',borderRadius:20,background: isActive ? `${st.cor}30` : 'rgba(255,255,255,0.04)',border:`1px solid ${isActive ? st.cor+'80' : 'rgba(255,255,255,0.08)'}`,color: isActive ? st.cor : '#94a3b8',fontSize:12,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
                  <span>{st.emoji}</span><span>{st.label}</span>{isActive && <span style={{fontSize:10,opacity:0.8}}>✓ atual</span>}
                </button>
              );
            })}
          </div>
        </div>
        
        <div style={{padding:'18px 24px',borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
          <div style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:1,fontWeight:600,marginBottom:10}}>Tags {tagsAtuais.length > 0 && <span style={{color:'#a78bfa'}}>({tagsAtuais.length})</span>}</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {tags.map(t => {
              const selected = tagsAtuais.includes(t.nome);
              return (
                <button key={t.id} onClick={() => toggleTag(t.nome)} style={{padding:'5px 11px',borderRadius:16,fontSize:11,fontWeight:600,background: selected ? t.cor : 'rgba(255,255,255,0.03)',color: selected ? '#fff' : '#94a3b8',border:`1px solid ${selected ? t.cor : 'rgba(255,255,255,0.08)'}`,boxShadow: selected ? `0 2px 8px ${t.cor}50` : 'none',cursor:'pointer'}}>{selected ? '✓ ' : ''}{t.nome}</button>
              );
            })}
          </div>
        </div>
        
        <div style={{padding:'18px 24px',borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
          <div style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:1,fontWeight:600,marginBottom:10}}>Adicionar comentário</div>
          <textarea value={commentText} onChange={e => setCommentText(e.target.value)} placeholder="Ex: Cliente retornou, pediu pra enviar proposta..." rows={3} style={{width:'100%',padding:'11px 14px',background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:10,color:'#e2e8f0',fontSize:13,resize:'vertical',fontFamily:'inherit'}} />
          <button onClick={handleAddComment} disabled={!commentText.trim()} style={{marginTop:8,padding:'9px 18px',background: commentText.trim() ? 'linear-gradient(135deg,#6366f1,#a855f7)' : 'rgba(255,255,255,0.05)',border:'none',borderRadius:8,color:'#fff',fontSize:12,fontWeight:600,cursor:'pointer',display:'inline-flex',alignItems:'center',gap:8}}>💾 Salvar comentário</button>
        </div>
        
        {/* FINALIZAR — só admin */}
        <div style={{padding:'18px 24px',borderBottom:'1px solid rgba(255,255,255,0.05)',background:'linear-gradient(135deg,rgba(34,197,94,0.05),rgba(16,185,129,0.03))'}}>
          <div style={{fontSize:10,color:'#86efac',textTransform:'uppercase',letterSpacing:1,fontWeight:700,marginBottom:10}}>🏁 Finalizar Kanban (admin)</div>
          {!confirmFinalize ? (
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}>
              <div style={{fontSize:11,color:'#94a3b8',flex:1,minWidth:200,lineHeight:1.5}}>
                Finaliza e remove este Kanban da lista ativa. Use quando o caso estiver resolvido (recuperado, perdido definitivo ou descartado).
              </div>
              <button onClick={() => setConfirmFinalize(true)} style={{padding:'9px 18px',background:'linear-gradient(135deg,#16a34a,#22c55e)',border:'none',borderRadius:8,color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer',boxShadow:'0 4px 12px rgba(34,197,94,0.3)',whiteSpace:'nowrap'}}>🏁 Finalizar</button>
            </div>
          ) : (
            <div>
              <input type="text" value={motivoFinal} onChange={e => setMotivoFinal(e.target.value)} placeholder="Motivo (ex: Voltou a comprar, Perdido pra concorrente...)" style={{width:'100%',padding:'10px 14px',background:'rgba(255,255,255,0.02)',border:'1px solid rgba(34,197,94,0.3)',borderRadius:10,color:'#e2e8f0',fontSize:13,marginBottom:10}} />
              <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                <button onClick={() => { setConfirmFinalize(false); setMotivoFinal(''); }} style={{padding:'8px 14px',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:8,color:'#94a3b8',fontSize:12,fontWeight:600,cursor:'pointer'}}>Cancelar</button>
                <button onClick={handleFinalize} style={{padding:'8px 14px',background:'linear-gradient(135deg,#16a34a,#22c55e)',border:'none',borderRadius:8,color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer',boxShadow:'0 4px 12px rgba(34,197,94,0.3)'}}>✓ Confirmar Finalização</button>
              </div>
            </div>
          )}
        </div>
        
        <div style={{padding:'18px 24px'}}>
          <div style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:1,fontWeight:600,marginBottom:10}}>Histórico ({historico.length})</div>
          {loadingHist ? (
            <div style={{padding:14,textAlign:'center',color:'#64748b',fontSize:12}}>Carregando...</div>
          ) : historico.length === 0 ? (
            <div style={{padding:14,textAlign:'center',color:'#64748b',fontSize:12}}>Sem histórico ainda.</div>
          ) : (
            <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:260,overflowY:'auto'}}>
              {historico.map(h => {
                const icones = {criou:'➕',mudou_status:'🔄',mudou_tags:'🏷',comentou:'💬',finalizou:'✅',auto_finalizou:'✨'};
                return (
                  <div key={h.id} style={{padding:'10px 12px',background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.05)',borderRadius:8,fontSize:12}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4,gap:8}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,color:'#c4b5fd',fontWeight:600}}>
                        <span>{icones[h.acao] || '•'}</span><span>{h.por}</span>
                        {h.de && h.para && <span style={{color:'#64748b',fontWeight:400}}>{h.de} → {h.para}</span>}
                      </div>
                      <div style={{fontSize:10,color:'#64748b'}}>{fmtData(h.quando)}</div>
                    </div>
                    {h.detalhes && <div style={{color:'#c8d6e5',lineHeight:1.5,whiteSpace:'pre-wrap'}}>{h.detalhes}</div>}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// MODAL ENVIAR AO KANBAN
// ============================================================
function EnviarKanbanModal({ cliente, onClose, onSuccess, onDuplicate, onError, callKanbanAPI, adminName }) {
  const [vendedor, setVendedor] = useState('');
  const [obs, setObs] = useState('');
  const [loading, setLoading] = useState(false);
  
  // Calcular valores com segurança (NaN-safe)
  const fatHist = Number(cliente.total) || 0;
  const vendasCount = Number(cliente.vendas) || 0;
  const ticketMedio = vendasCount > 0 ? fatHist / vendasCount : 0;
  const diasSemCompra = Number(cliente.diasSemCompra) || 0;
  const potPerdidoRaw = cliente.potencialPerdido != null && !isNaN(cliente.potencialPerdido) 
    ? Number(cliente.potencialPerdido) 
    : ticketMedio * Math.max(1, Math.floor(diasSemCompra / 30));
  const potPerdido = (isNaN(potPerdidoRaw) ? 0 : potPerdidoRaw);
  
  // ID do cliente: pega primeiro membro, ou fallback pra código/id direto
  const clienteId = (cliente.membros && cliente.membros.length > 0) 
    ? cliente.membros[0] 
    : (cliente.i || cliente.code || 'NOVO_' + Date.now());
  
  const vendedoresDropdown = ["RODRIGO", "DENIS", "ANE", "ANDERSON", "LEX", "REGINALDO"];
  
  const enviar = async () => {
    if (!vendedor) return;
    setLoading(true);
    try {
      const res = await callKanbanAPI('create', {
        cliente_id: String(clienteId),
        cliente_nome: cliente.nome || 'Cliente sem nome',
        cliente_cidade: cliente.cidade || '',
        vendedor: vendedor,
        faturamento_hist: fatHist,
        potencial_perdido: potPerdido,
        observacoes: obs || '',
        criado_por: adminName || 'Admin'
      });
      
      if (res.ok) {
        onSuccess(cliente.nome, vendedor);
        return;
      }
      
      // Erro "já existe"
      if (res.error && res.error.toLowerCase().includes('já possui kanban')) {
        setLoading(false);
        onDuplicate();
        onClose();
        return;
      }
      
      // Outros erros
      setLoading(false);
      onError(res.error || 'desconhecido');
    } catch (err) {
      setLoading(false);
      onError(err.message || 'Erro de rede');
    }
  };
  
  return (
    <div onClick={() => !loading && onClose()} style={{
      position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(6px)",
      zIndex:1200,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"fadeIn .2s"
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        width:"100%",maxWidth:480,background:"rgba(13,21,38,0.95)",
        backdropFilter:"blur(20px) saturate(180%)",
        border:"1px solid rgba(168,85,247,0.3)",borderRadius:16,
        boxShadow:"0 20px 60px rgba(0,0,0,0.5)",animation:"scaleIn .25s",overflow:"hidden"
      }}>
        <div style={{background:"linear-gradient(135deg,rgba(99,102,241,0.2),rgba(168,85,247,0.15))",padding:"18px 22px",borderBottom:"1px solid rgba(168,85,247,0.2)"}}>
          <div style={{fontSize:11,color:"#c4b5fd",letterSpacing:1.5,textTransform:"uppercase",fontWeight:700,marginBottom:4}}>🎱 Enviar ao Kanban</div>
          <div style={{fontSize:16,fontWeight:800,color:"#e2e8f0",letterSpacing:-0.3,marginBottom:2}}>{cliente.nome}</div>
          <div style={{fontSize:11,color:"#94a3b8"}}>📍 {cliente.cidade || '—'} • {vendasCount} compras • R$ {fatHist.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
        </div>
        
        <div style={{padding:22}}>
          <div style={{marginBottom:16}}>
            <label style={{fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:1,fontWeight:600,display:"block",marginBottom:6}}>Vendedor responsável</label>
            <select 
              value={vendedor} 
              onChange={e => setVendedor(e.target.value)}
              disabled={loading}
              style={{width:"100%",padding:"11px 14px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,color:"#e2e8f0",fontSize:14,cursor:"pointer"}}
            >
              <option value="">Selecione...</option>
              {vendedoresDropdown.map(v => <option key={v} value={v}>{v}</option>)}
            </select>
          </div>
          
          <div style={{marginBottom:16}}>
            <label style={{fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:1,fontWeight:600,display:"block",marginBottom:6}}>Observação inicial (opcional)</label>
            <textarea 
              value={obs}
              onChange={e => setObs(e.target.value)}
              placeholder="Ex: Cliente não compra há 90 dias. Priorizar contato."
              rows={3}
              disabled={loading}
              style={{width:"100%",padding:"11px 14px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,color:"#e2e8f0",fontSize:13,resize:"vertical",fontFamily:"inherit"}}
            />
          </div>
          
          <div style={{padding:"10px 12px",background:"rgba(168,85,247,0.08)",border:"1px solid rgba(168,85,247,0.2)",borderRadius:8,fontSize:11,color:"#c4b5fd",marginBottom:16,lineHeight:1.5}}>
            💡 O vendedor verá esse cliente como bolinha no portal dele. O tamanho será proporcional ao potencial perdido ({potPerdido > 0 ? '≈ R$ ' + potPerdido.toLocaleString('pt-BR',{minimumFractionDigits:2}) : 'bolinha pequena - sem histórico'}).
          </div>
          
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={onClose} disabled={loading} style={{padding:"10px 18px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,color:"#94a3b8",fontSize:12,fontWeight:600,cursor:"pointer"}}>Cancelar</button>
            <button onClick={enviar} disabled={loading || !vendedor} style={{
              padding:"10px 18px",
              background: (loading || !vendedor) ? "rgba(99,102,241,0.3)" : "linear-gradient(135deg,#6366f1,#a855f7)",
              border:"none",borderRadius:8,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",
              boxShadow: (loading || !vendedor) ? "none" : "0 4px 12px rgba(99,102,241,0.3)",
              display:"flex",alignItems:"center",gap:8
            }}>
              {loading ? <><span style={{display:"inline-block",width:12,height:12,border:"2px solid #fff",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}></span>Enviando...</> : <>🎱 Enviar</>}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ANALISAR NOVOS CLIENTES — Pré-análise antes de importar (v6)
// ============================================================
function AnalisarNovosClientesModal({ dados, clientes, getClientData, onCancelar, onConfirmar, showToast }) {
  const [decisoes, setDecisoes] = useState({}); // { id: { type, alvoId?, nome?, cidade?, etc } }
  const [buscaPorCliente, setBuscaPorCliente] = useState({}); // { id: searchString }
  
  const novos = dados.novosClientes;
  
  // Helper similaridade (mesma lógica do MergeManager)
  const similaridade = useCallback((a, b) => {
    const s1 = String(a||'').toUpperCase().trim().replace(/\s+/g,' ');
    const s2 = String(b||'').toUpperCase().trim().replace(/\s+/g,' ');
    if (!s1 || !s2) return 0;
    if (s1 === s2) return 100;
    if (s1.includes(s2) || s2.includes(s1)) {
      const ratio = Math.min(s1.length, s2.length) / Math.max(s1.length, s2.length);
      return Math.round(70 + ratio * 25);
    }
    const w1 = s1.split(' ').filter(Boolean);
    const w2 = s2.split(' ').filter(Boolean);
    if (w1[0] && w2[0] && w1[0] === w2[0] && w1[0].length >= 4) {
      const comum = w1.filter(w => w2.includes(w) && w.length >= 3).length;
      const total = Math.max(w1.length, w2.length);
      const ratio = comum / total;
      return Math.round(50 + ratio * 40);
    }
    return 0;
  }, []);
  
  // Calcula sugestão automática para cada novo
  const sugestoes = useMemo(() => {
    const result = {};
    const reais = clientes.filter(c => c.c !== "CADASTRO PENDENTE" && c.a !== 0).map(c => getClientData(c));
    
    novos.forEach(n => {
      const candidatos = [];
      reais.forEach(r => {
        const score = similaridade(n.nome, r.n);
        if (score >= 70) candidatos.push({ real: r, score });
      });
      candidatos.sort((a,b) => b.score - a.score);
      result[n.id] = candidatos.slice(0, 3);
    });
    return result;
  }, [novos, clientes, getClientData, similaridade]);
  
  const setDecisao = (id, decisao) => {
    setDecisoes(prev => ({ ...prev, [id]: decisao }));
  };
  
  const buscarClientesPara = (id, query) => {
    if (!query || query.trim().length < 2) return [];
    const q = query.toLowerCase().trim();
    return clientes
      .filter(c => c.c !== "CADASTRO PENDENTE" && c.a !== 0)
      .map(c => getClientData(c))
      .filter(c => 
        c.n.toLowerCase().includes(q) || 
        String(c.i).includes(q) ||
        (c.c && c.c.toLowerCase().includes(q))
      )
      .slice(0, 8);
  };
  
  const totalDecidido = Object.keys(decisoes).length;
  const todosDecididos = totalDecidido === novos.length;
  const fmt = n => 'R$ ' + Number(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2});
  
  const confirmar = () => {
    const arr = novos.map(n => ({
      id: n.id,
      ...decisoes[n.id]
    }));
    onConfirmar(arr);
  };
  
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',backdropFilter:'blur(8px)',zIndex:1500,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:20,overflowY:'auto',animation:'fadeIn .2s'}}>
      <div style={{width:'100%',maxWidth:1000,marginTop:20,marginBottom:40,background:'rgba(13,21,38,0.97)',backdropFilter:'blur(20px) saturate(180%)',border:'1px solid rgba(245,158,11,0.4)',borderRadius:16,boxShadow:'0 20px 60px rgba(0,0,0,0.5)',animation:'scaleIn .25s'}}>
        {/* Header sticky */}
        <div style={{padding:'18px 22px',borderBottom:'1px solid rgba(245,158,11,0.2)',background:'linear-gradient(135deg,rgba(245,158,11,0.12),rgba(251,146,60,0.08))',position:'sticky',top:0,borderRadius:'16px 16px 0 0',zIndex:10}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,flexWrap:'wrap'}}>
            <div>
              <div style={{fontSize:16,fontWeight:800,color:'#fdba74',display:'flex',alignItems:'center',gap:8}}>
                ⚠️ Pré-análise da importação
              </div>
              <div style={{fontSize:11,color:'#94a3b8',marginTop:4,lineHeight:1.5}}>
                {dados.vendas.length} vendas • <strong style={{color:'#fdba74'}}>{novos.length} clientes novos detectados</strong><br/>
                Identifique cada cliente novo antes de importar. Você pode vincular a um existente, criar como novo cadastro ou ignorar.
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{padding:'6px 12px',background:todosDecididos?'rgba(34,197,94,0.15)':'rgba(245,158,11,0.15)',border:`1px solid ${todosDecididos?'rgba(34,197,94,0.4)':'rgba(245,158,11,0.4)'}`,borderRadius:8,fontSize:12,color:todosDecididos?'#86efac':'#fdba74',fontWeight:700}}>
                {totalDecidido} / {novos.length} resolvidos
              </div>
            </div>
          </div>
        </div>
        
        {/* Lista de novos */}
        <div style={{padding:'14px 22px'}}>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {novos.map(n => {
              const sugs = sugestoes[n.id] || [];
              const decisao = decisoes[n.id];
              const buscaQuery = buscaPorCliente[n.id] || '';
              const resultadosBusca = buscarClientesPara(n.id, buscaQuery);
              const corBorda = decisao 
                ? (decisao.type === 'vincular' ? '#22c55e' : decisao.type === 'criar' ? '#3b82f6' : '#ef4444')
                : 'rgba(245,158,11,0.3)';
              
              return (
                <div key={n.id} style={{padding:14,background:'rgba(255,255,255,0.02)',border:`1.5px solid ${corBorda}`,borderRadius:10,transition:'border-color .2s'}}>
                  {/* Header do cliente novo */}
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12,flexWrap:'wrap',marginBottom:10}}>
                    <div style={{flex:'1 1 250px'}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3,flexWrap:'wrap'}}>
                        <span style={{fontSize:11,color:'#fca5a5',padding:'2px 8px',background:'rgba(220,38,38,0.15)',border:'1px solid rgba(220,38,38,0.3)',borderRadius:4,fontWeight:700,letterSpacing:1}}>📁 NOVO</span>
                        <span style={{fontSize:11,color:'#64748b',fontFamily:'monospace'}}>#{n.id}</span>
                      </div>
                      <div style={{fontSize:14,fontWeight:700,color:'#e2e8f0',lineHeight:1.3}}>{n.nome}</div>
                      <div style={{fontSize:11,color:'#94a3b8',marginTop:3}}>
                        {n.totalVendas} venda{n.totalVendas===1?'':'s'} • <strong>{fmt(n.totalValor)}</strong>
                      </div>
                    </div>
                    {decisao && (
                      <button onClick={() => { 
                        const novas = {...decisoes}; 
                        delete novas[n.id]; 
                        setDecisoes(novas);
                      }} style={{padding:'4px 10px',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:6,color:'#94a3b8',fontSize:10,fontWeight:600,cursor:'pointer'}}>↻ Mudar decisão</button>
                    )}
                  </div>
                  
                  {/* Decisão tomada */}
                  {decisao && decisao.type === 'vincular' && (
                    <div style={{padding:'10px 12px',background:'rgba(34,197,94,0.08)',border:'1px solid rgba(34,197,94,0.25)',borderRadius:8,fontSize:12,color:'#86efac',display:'flex',alignItems:'center',gap:8}}>
                      ✓ <strong>VINCULADO</strong> a #{decisao.alvoId} {decisao.alvoNome} — vendas serão atribuídas a este cliente
                    </div>
                  )}
                  {decisao && decisao.type === 'criar' && (
                    <div style={{padding:'10px 12px',background:'rgba(59,130,246,0.08)',border:'1px solid rgba(59,130,246,0.25)',borderRadius:8,fontSize:12,color:'#93c5fd'}}>
                      ➕ <strong>NOVO CADASTRO</strong> • {decisao.nome}{decisao.cidade ? ` • ${decisao.cidade}` : ''}{decisao.bairro ? ` • ${decisao.bairro}` : ''}
                    </div>
                  )}
                  {decisao && decisao.type === 'ignorar' && (
                    <div style={{padding:'10px 12px',background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.25)',borderRadius:8,fontSize:12,color:'#fca5a5'}}>
                      🚫 <strong>IGNORADO</strong> — as {n.totalVendas} venda(s) ({fmt(n.totalValor)}) serão descartadas
                    </div>
                  )}
                  
                  {/* Sem decisão: mostrar opções */}
                  {!decisao && (
                    <>
                      {/* Sugestões automáticas */}
                      {sugs.length > 0 && (
                        <div style={{marginBottom:10,padding:'10px 12px',background:'rgba(168,85,247,0.06)',border:'1px solid rgba(168,85,247,0.2)',borderRadius:8}}>
                          <div style={{fontSize:10,color:'#c4b5fd',textTransform:'uppercase',letterSpacing:1,fontWeight:700,marginBottom:8}}>💡 Sugestões automáticas</div>
                          {sugs.map(s => (
                            <div key={s.real.i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:10,padding:'6px 0',borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
                              <div style={{flex:1,minWidth:200}}>
                                <div style={{fontSize:12,color:'#e2e8f0',fontWeight:600}}>
                                  {s.real.n} 
                                  <span style={{fontSize:10,padding:'1px 6px',marginLeft:6,borderRadius:8,background:`${s.score>=90?'rgba(34,197,94':s.score>=80?'rgba(132,204,22':'rgba(245,158,11'},0.2)`,color:s.score>=90?'#86efac':s.score>=80?'#bef264':'#fdba74',border:`1px solid ${s.score>=90?'#22c55e':s.score>=80?'#84cc16':'#f59e0b'}`}}>{s.score}%</span>
                                </div>
                                <div style={{fontSize:10,color:'#94a3b8',marginTop:1}}>#{s.real.i} • 📍 {s.real.c}{s.real.b ? ' • ' + s.real.b : ''}</div>
                              </div>
                              <button onClick={() => setDecisao(n.id, { type:'vincular', alvoId: s.real.i, alvoNome: s.real.n })} style={{padding:'5px 12px',background:'linear-gradient(135deg,#16a34a,#22c55e)',border:'none',borderRadius:6,color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>✓ Vincular</button>
                            </div>
                          ))}
                        </div>
                      )}
                      
                      {/* Busca manual */}
                      <div style={{marginBottom:10}}>
                        <label style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:1,fontWeight:600,display:'block',marginBottom:5}}>🔍 Buscar cliente existente</label>
                        <input
                          value={buscaQuery}
                          onChange={e => setBuscaPorCliente(prev => ({...prev, [n.id]: e.target.value}))}
                          placeholder="Nome, ID ou cidade..."
                          style={{width:'100%',padding:'8px 12px',background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:8,color:'#e2e8f0',fontSize:12}}
                        />
                        {resultadosBusca.length > 0 && (
                          <div style={{marginTop:6,maxHeight:160,overflowY:'auto',background:'rgba(0,0,0,0.3)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:6}}>
                            {resultadosBusca.map(r => (
                              <div key={r.i} onClick={() => {
                                setDecisao(n.id, { type:'vincular', alvoId: r.i, alvoNome: r.n });
                                setBuscaPorCliente(prev => ({...prev, [n.id]: ''}));
                              }} style={{padding:'8px 12px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,borderBottom:'1px solid rgba(255,255,255,0.04)'}}
                              onMouseEnter={e=>e.currentTarget.style.background='rgba(34,197,94,0.08)'}

// ============================================================
// MERGE MANAGER — Detecta e mescla clientes pendentes com cadastros reais
// ============================================================
function MergeManagerModal({ onClose, clientes, vendas, aliasClientes, salvarAlias, showToast }) {
  const [pendentesIgnorados, setPendentesIgnorados] = useState(() => {
    try { return JSON.parse(localStorage.getItem('peteca_merge_ignorados') || '[]'); } catch(e) { return []; }
  });
  const [executando, setExecutando] = useState(false);
  
  // Helper: similaridade de strings (Levenshtein simplificado, normalizada 0-100)
  const similaridade = useCallback((a, b) => {
    const s1 = String(a||'').toUpperCase().trim().replace(/\s+/g,' ');
    const s2 = String(b||'').toUpperCase().trim().replace(/\s+/g,' ');
    if (!s1 || !s2) return 0;
    if (s1 === s2) return 100;
    
    // Match parcial: um contém o outro
    if (s1.includes(s2) || s2.includes(s1)) {
      const ratio = Math.min(s1.length, s2.length) / Math.max(s1.length, s2.length);
      return Math.round(70 + ratio * 25); // 70-95%
    }
    
    // Calcula primeiras palavras (sobrenome principal)
    const w1 = s1.split(' ').filter(Boolean);
    const w2 = s2.split(' ').filter(Boolean);
    
    // Match de primeira palavra (sobrenome do cliente)
    if (w1[0] && w2[0] && w1[0] === w2[0] && w1[0].length >= 4) {
      // Conta quantas palavras coincidem em qualquer posição
      const comum = w1.filter(w => w2.includes(w) && w.length >= 3).length;
      const total = Math.max(w1.length, w2.length);
      const ratio = comum / total;
      return Math.round(50 + ratio * 40); // 50-90%
    }
    
    return 0;
  }, []);
  
  // Calcular cidade da última venda de cada cliente
  const cidadeVendasMap = useMemo(() => {
    const m = {};
    Object.values(vendas).forEach(arr => {
      if (!Array.isArray(arr)) return;
      arr.forEach(v => {
        if (v.clienteId && v.cidade) {
          // Mantém a mais recente
          const id = String(v.clienteId);
          if (!m[id] || (v.data && v.data > m[id].data)) {
            m[id] = { cidade: v.cidade, data: v.data };
          }
        }
      });
    });
    const result = {};
    Object.keys(m).forEach(id => { result[id] = m[id].cidade; });
    return result;
  }, [vendas]);
  
  // Detectar sugestões de mesclagem
  const sugestoes = useMemo(() => {
    // Pendentes que não foram ignorados nem já mesclados
    const ignoradosSet = new Set(pendentesIgnorados.map(String));
    const aliasSet = new Set(Object.keys(aliasClientes).map(String));
    
    const pendentes = clientes.filter(c => 
      c.c === "CADASTRO PENDENTE" && 
      !ignoradosSet.has(String(c.i)) &&
      !aliasSet.has(String(c.i))
    );
    
    // Reais (não pendentes, não inativos)
    const reais = clientes.filter(c => 
      c.c !== "CADASTRO PENDENTE" && 
      c.a !== 0
    );
    
    const result = [];
    pendentes.forEach(p => {
      // Procura matches em TODOS os reais (cidade não é mais filtro obrigatório)
      const candidatos = [];
      reais.forEach(r => {
        const score = similaridade(p.n, r.n);
        if (score >= 70) {
          candidatos.push({ real: r, score });
        }
      });
      
      if (candidatos.length === 0) return;
      
      // Ordena por maior score
      candidatos.sort((a, b) => b.score - a.score);
      const melhor = candidatos[0];
      
      // Calcula stats do pendente
      let vendasPendente = 0, totalPendente = 0;
      Object.values(vendas).forEach(arr => {
        if (!Array.isArray(arr)) return;
        arr.forEach(v => {
          if (String(v.clienteId) === String(p.i)) {
            vendasPendente++;
            totalPendente += v.valorLiquido || 0;
          }
        });
      });
      
      // v6: Calcula stats do cliente real (transparência)
      let vendasReal = 0, totalReal = 0;
      Object.values(vendas).forEach(arr => {
        if (!Array.isArray(arr)) return;
        arr.forEach(v => {
          if (String(v.clienteId) === String(melhor.real.i)) {
            vendasReal++;
            totalReal += v.valorLiquido || 0;
          }
        });
      });
      
      result.push({
        pendente: p,
        cidadePendente: 'Pendente',
        candidato: melhor.real,
        score: melhor.score,
        vendasPendente,
        totalPendente,
        vendasReal,
        totalReal,
        outrosCandidatos: candidatos.slice(1, 4)
      });
    });
    
    // Ordena: 100% primeiro, depois por score desc
    result.sort((a, b) => b.score - a.score);
    return result;
  }, [clientes, vendas, aliasClientes, pendentesIgnorados, similaridade]);
  
  const ignorarSugestao = (id) => {
    const novos = [...pendentesIgnorados, String(id)];
    setPendentesIgnorados(novos);
    try { localStorage.setItem('peteca_merge_ignorados', JSON.stringify(novos)); } catch(e) {}
  };
  
  const aceitarMesclagem = async (idPendente, idReal, nome) => {
    const novoAlias = { ...aliasClientes, [String(idPendente)]: String(idReal) };
    await salvarAlias(novoAlias);
    showToast(`✓ "${nome}" mesclado!`);
  };
  
  const aceitarTodos100 = async () => {
    setExecutando(true);
    const novoAlias = { ...aliasClientes };
    let count = 0;
    sugestoes.forEach(s => {
      if (s.score === 100) {
        novoAlias[String(s.pendente.i)] = String(s.candidato.i);
        count++;
      }
    });
    await salvarAlias(novoAlias);
    setExecutando(false);
    showToast(`✓ ${count} mesclagens 100% aplicadas!`);
  };
  
  const desfazerTodas = async () => {
    if (!window.confirm('Desfazer TODAS as mesclagens? Isso não pode ser revertido por essa tela.')) return;
    await salvarAlias({});
    showToast('Todas mesclagens desfeitas');
  };
  
  const sug100 = sugestoes.filter(s => s.score === 100);
  const sugParcial = sugestoes.filter(s => s.score < 100);
  const totalAlias = Object.keys(aliasClientes).length;
  
  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',backdropFilter:'blur(6px)',zIndex:1400,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:20,overflowY:'auto',animation:'fadeIn .2s'}}>
      <div onClick={e => e.stopPropagation()} style={{width:'100%',maxWidth:900,marginTop:20,marginBottom:40,background:'rgba(13,21,38,0.95)',backdropFilter:'blur(20px) saturate(180%)',border:'1px solid rgba(168,85,247,0.3)',borderRadius:16,boxShadow:'0 20px 60px rgba(0,0,0,0.5)',animation:'scaleIn .25s'}}>
        <div style={{padding:'18px 22px',borderBottom:'1px solid rgba(168,85,247,0.15)',background:'linear-gradient(135deg,rgba(168,85,247,0.1),rgba(99,102,241,0.05))',position:'sticky',top:0,borderRadius:'16px 16px 0 0',zIndex:5}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:10,flexWrap:'wrap'}}>
            <div>
              <div style={{fontSize:16,fontWeight:800,color:'#e2e8f0',display:'flex',alignItems:'center',gap:8}}>🔗 Mesclar Clientes Duplicados</div>
              <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>
                {sugestoes.length === 0 
                  ? 'Nenhuma sugestão encontrada' 
                  : `${sug100.length} match${sug100.length===1?'':'es'} 100% • ${sugParcial.length} parcial${sugParcial.length===1?'':'is'}`}
                {totalAlias > 0 && <span> • {totalAlias} já mesclado{totalAlias===1?'':'s'}</span>}
              </div>
            </div>
            <button onClick={onClose} style={{width:32,height:32,borderRadius:8,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',color:'#94a3b8',fontSize:16,fontWeight:700,cursor:'pointer'}}>✕</button>
          </div>
        </div>
        
        <div style={{padding:22}}>
          {sugestoes.length === 0 ? (
            <div style={{padding:40,textAlign:'center'}}>
              <div style={{fontSize:48,marginBottom:14}}>✨</div>
              <div style={{fontSize:14,fontWeight:700,marginBottom:6,color:'#e2e8f0'}}>Tudo limpo!</div>
              <div style={{fontSize:12,color:'#94a3b8',lineHeight:1.5}}>
                Nenhum cadastro pendente com correspondência detectada.<br/>
                {totalAlias > 0 && <span style={{color:'#86efac'}}>{totalAlias} mesclagem{totalAlias===1?'':'s'} ativa{totalAlias===1?'':'s'}.</span>}
              </div>
              {totalAlias > 0 && (
                <button onClick={desfazerTodas} style={{marginTop:14,padding:'8px 18px',background:'rgba(220,38,38,0.1)',border:'1px solid rgba(220,38,38,0.3)',borderRadius:8,color:'#fca5a5',fontSize:12,fontWeight:600,cursor:'pointer'}}>↻ Desfazer todas mesclagens</button>
              )}
            </div>
          ) : (
            <>
              {sug100.length > 0 && (
                <div style={{marginBottom:20}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                    <div style={{fontSize:11,color:'#86efac',textTransform:'uppercase',letterSpacing:1,fontWeight:700}}>
                      ✓ Match 100% — Pode aceitar todos
                    </div>
                    <button onClick={aceitarTodos100} disabled={executando} style={{padding:'6px 12px',background:'linear-gradient(135deg,#16a34a,#22c55e)',border:'none',borderRadius:6,color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer'}}>
                      {executando ? 'Aplicando...' : `✓ Aceitar todos os ${sug100.length}`}
                    </button>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:8}}>
                    {sug100.map(s => (
                      <SugestaoLinha key={s.pendente.i} s={s} onAceitar={aceitarMesclagem} onIgnorar={ignorarSugestao}/>
                    ))}
                  </div>
                </div>
              )}
              
              {sugParcial.length > 0 && (
                <div>
                  <div style={{fontSize:11,color:'#fdba74',textTransform:'uppercase',letterSpacing:1,fontWeight:700,marginBottom:10}}>
                    ⚠ Match parcial — Verifique antes de aceitar
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:8}}>
                    {sugParcial.map(s => (
                      <SugestaoLinha key={s.pendente.i} s={s} onAceitar={aceitarMesclagem} onIgnorar={ignorarSugestao}/>
                    ))}
                  </div>
                </div>
              )}
              
              {totalAlias > 0 && (
                <div style={{marginTop:20,padding:14,background:'rgba(34,197,94,0.05)',border:'1px solid rgba(34,197,94,0.2)',borderRadius:10,display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,flexWrap:'wrap'}}>
                  <div style={{fontSize:12,color:'#86efac'}}>
                    ✓ {totalAlias} mesclagem{totalAlias===1?'':'s'} ativa{totalAlias===1?'':'s'}
                  </div>
                  <button onClick={desfazerTodas} style={{padding:'6px 12px',background:'rgba(220,38,38,0.1)',border:'1px solid rgba(220,38,38,0.3)',borderRadius:6,color:'#fca5a5',fontSize:11,fontWeight:600,cursor:'pointer'}}>↻ Desfazer todas</button>
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

  const corScore = s.score === 100 ? '#22c55e' : s.score >= 90 ? '#84cc16' : s.score >= 80 ? '#eab308' : '#fb923c';
  
  return (
    <div style={{padding:'12px 14px',background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.05)',borderRadius:10}}>
      <div style={{display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
        {/* Pendente */}
        <div style={{flex:'1 1 250px',minWidth:200}}>
          <div style={{fontSize:9,color:'#fca5a5',textTransform:'uppercase',letterSpacing:1,fontWeight:700,marginBottom:3}}>📁 Pendente</div>
          <div style={{fontSize:13,fontWeight:700,color:'#e2e8f0',lineHeight:1.3}}>{s.pendente.n}</div>
          <div style={{fontSize:10,color:'#94a3b8',marginTop:2}}>
            ID #{s.pendente.i} • {s.vendasPendente} venda{s.vendasPendente===1?'':'s'} • {fmt(s.totalPendente)}
          </div>
        </div>
        
        {/* Seta */}
        <div style={{fontSize:20,color:corScore,flexShrink:0}}>→</div>
        
        {/* Real */}
        <div style={{flex:'1 1 250px',minWidth:200}}>
          <div style={{fontSize:9,color:'#86efac',textTransform:'uppercase',letterSpacing:1,fontWeight:700,marginBottom:3,display:'flex',alignItems:'center',gap:6}}>
            <span>✓ Cliente Real</span>
            <span style={{padding:'1px 6px',borderRadius:8,background:`${corScore}33`,color:corScore,fontSize:9,border:`1px solid ${corScore}`}}>{s.score}%</span>
          </div>
          <div style={{fontSize:13,fontWeight:700,color:'#e2e8f0',lineHeight:1.3}}>{s.candidato.n}</div>
          <div style={{fontSize:10,color:'#94a3b8',marginTop:2}}>
            ID #{s.candidato.i} • 📍 {s.candidato.c}{s.candidato.b ? ' • ' + s.candidato.b : ''}
          </div>
          <div style={{fontSize:10,color: s.vendasReal > 0 ? '#fbbf24' : '#64748b',marginTop:3,fontWeight: s.vendasReal > 0 ? 600 : 400}}>
            {s.vendasReal === 0 
              ? '🔹 Sem vendas próprias (esqueleto de cadastro)' 
              : `📊 Já tem ${s.vendasReal} venda${s.vendasReal===1?'':'s'} • ${fmt(s.totalReal)}`}
          </div>
        </div>
        
        {/* Ações */}
        <div style={{display:'flex',gap:6,flexShrink:0}}>
          <button onClick={() => onAceitar(s.pendente.i, s.candidato.i, s.pendente.n)} style={{padding:'8px 14px',background:'linear-gradient(135deg,#16a34a,#22c55e)',border:'none',borderRadius:8,color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',boxShadow:'0 2px 8px rgba(34,197,94,0.3)'}}>✓ Aceitar</button>
          <button onClick={() => onIgnorar(s.pendente.i)} style={{padding:'8px 12px',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:8,color:'#94a3b8',fontSize:11,fontWeight:600,cursor:'pointer'}}>✗ Ignorar</button>
