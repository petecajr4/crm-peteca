<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM PETECA — Vendedor</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter','Segoe UI','Helvetica Neue',sans-serif;
    background:radial-gradient(ellipse at top left, #0f1629 0%, #080c18 50%, #050811 100%);
    color:#e2e8f0;
    min-height:100vh;
    overflow-x:hidden;
  }
  #root{min-height:100vh;position:relative;z-index:1}
  
  /* Aurora background */
  .aurora-bg{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
  .aurora-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;animation:aurora 20s ease-in-out infinite}
  @keyframes aurora{
    0%{transform:translate(0,0) rotate(0deg)}
    33%{transform:translate(30px,-20px) rotate(120deg)}
    66%{transform:translate(-20px,30px) rotate(240deg)}
    100%{transform:translate(0,0) rotate(360deg)}
  }
  
  @keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes scaleIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
  @keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
  
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#3b4f8a,#1e3050);border-radius:4px}
  
  input,select,button{font-family:inherit}
  input,select{outline:none}
  input:focus,select:focus{border-color:#6366f1!important;box-shadow:0 0 0 3px rgba(99,102,241,0.15)}
  button{cursor:pointer;transition:all .15s cubic-bezier(.4,0,.2,1)}
  button:active:not(:disabled){transform:scale(0.97)}
  button:hover:not(:disabled){filter:brightness(1.1)}
  button:disabled{cursor:default;opacity:0.6}
  
  .gradient-text{
    background:linear-gradient(135deg,#60a5fa 0%,#a78bfa 50%,#f472b6 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
  }
</style>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>

<!-- Aurora decorativo -->
<div class="aurora-bg">
  <div class="aurora-blob" style="width:500px;height:500px;background:#6366f1;top:-10%;left:-5%"></div>
  <div class="aurora-blob" style="width:400px;height:400px;background:#a855f7;top:30%;right:-10%;animation-delay:-7s"></div>
  <div class="aurora-blob" style="width:450px;height:450px;background:#ec4899;bottom:-10%;left:30%;animation-delay:-14s"></div>
</div>

<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// ============================================================
// CONFIG — URL da API do Apps Script
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbyqtgNDt03Z2cfTlbDAUObosynmHaFvXTW4h76X-p3H55_ZFnkKwqKEi6gwFLI9Er4y/exec';
const STORAGE_KEY = 'peteca_vendedor_user';

// ============================================================
// API HELPER
// ============================================================
async function callAPI(action, payload = {}) {
  try {
    const url = API_URL + '?action=' + encodeURIComponent(action) + 
                '&payload=' + encodeURIComponent(JSON.stringify(payload)) +
                '&t=' + Date.now();
    const res = await fetch(url);
    const data = await res.json();
    return data;
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

// ============================================================
// APP PRINCIPAL
// ============================================================
function App() {
  const [user, setUser] = useState(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : null;
    } catch(e) { return null; }
  });
  
  const handleLogin = (userData) => {
    setUser(userData);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(userData)); } catch(e) {}
  };
  
  const handleLogout = () => {
    setUser(null);
    try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  };
  
  if (!user) return <LoginScreen onLogin={handleLogin} />;
  return <Home user={user} onLogout={handleLogout} />;
}

// ============================================================
// TELA DE LOGIN
// ============================================================
function LoginScreen({ onLogin }) {
  const [usuarios, setUsuarios] = useState([]);
  const [loadingUsuarios, setLoadingUsuarios] = useState(true);
  const [nome, setNome] = useState('');
  const [senha, setSenha] = useState('');
  const [erro, setErro] = useState('');
  const [loading, setLoading] = useState(false);
  
  // Carregar lista de usuários
  useEffect(() => {
    callAPI('getUsuarios').then(res => {
      if (res.ok) setUsuarios(res.usuarios.filter(u => u.tipo === 'vendedor'));
      setLoadingUsuarios(false);
    });
  }, []);
  
  const doLogin = async () => {
    if (!nome || !senha) {
      setErro('Selecione seu nome e digite a senha');
      return;
    }
    setErro('');
    setLoading(true);
    const res = await callAPI('login', { nome, senha });
    setLoading(false);
    
    if (res.ok) {
      onLogin(res.user);
    } else {
      setErro(res.error || 'Erro ao fazer login');
    }
  };
  
  return (
    <div style={{
      minHeight: '100vh',
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      padding: 20
    }}>
      <div style={{
        width: '100%',
        maxWidth: 400,
        background: 'rgba(13,21,38,0.75)',
        backdropFilter: 'blur(24px) saturate(200%)',
        WebkitBackdropFilter: 'blur(24px) saturate(200%)',
        border: '1px solid rgba(255,255,255,0.1)',
        borderRadius: 20,
        padding: 32,
        boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
        animation: 'scaleIn .4s cubic-bezier(.4,0,.2,1)'
      }}>
        {/* Logo */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 28 }}>
          <div style={{
            width: 48,
            height: 48,
            borderRadius: 14,
            background: 'linear-gradient(135deg,#6366f1 0%,#a855f7 50%,#ec4899 100%)',
            backgroundSize: '200% 200%',
            animation: 'gradientShift 8s ease infinite',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            fontSize: 22,
            fontWeight: 800,
            color: '#fff',
            boxShadow: '0 8px 24px rgba(99,102,241,0.4), inset 0 1px 0 rgba(255,255,255,0.2)',
            letterSpacing: -1
          }}>P</div>
          <div>
            <div style={{ fontSize: 20, fontWeight: 800, letterSpacing: -0.5 }}>
              <span className="gradient-text">PETECA CRM</span>
            </div>
            <div style={{ fontSize: 10, color: '#64748b', letterSpacing: 2, textTransform: 'uppercase', marginTop: 2, fontWeight: 500 }}>
              Portal do Vendedor
            </div>
          </div>
        </div>
        
        <div style={{ fontSize: 14, color: '#94a3b8', marginBottom: 24, lineHeight: 1.5 }}>
          Entre com seu usuário para acessar seu Kanban de recuperação.
        </div>
        
        {/* Nome */}
        <div style={{ marginBottom: 16 }}>
          <label style={{ fontSize: 11, color: '#64748b', textTransform: 'uppercase', letterSpacing: 1, fontWeight: 600, display: 'block', marginBottom: 6 }}>
            Seu nome
          </label>
          {loadingUsuarios ? (
            <div style={{
              padding: '11px 14px',
              background: 'rgba(255,255,255,0.02)',
              border: '1px solid rgba(255,255,255,0.06)',
              borderRadius: 10,
              color: '#64748b',
              fontSize: 13,
              display: 'flex',
              alignItems: 'center',
              gap: 10
            }}>
              <span style={{ display: 'inline-block', width: 12, height: 12, border: '2px solid #64748b', borderTopColor: 'transparent', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }}></span>
              Carregando...
            </div>
          ) : (
            <select 
              value={nome} 
              onChange={e => setNome(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') doLogin(); }}
              style={{
                width: '100%',
                padding: '11px 14px',
                background: 'rgba(255,255,255,0.02)',
                border: '1px solid rgba(255,255,255,0.1)',
                borderRadius: 10,
                color: '#e2e8f0',
                fontSize: 14,
                cursor: 'pointer'
              }}
            >
              <option value="">Selecione seu nome...</option>
              {usuarios.map(u => (
                <option key={u.nome} value={u.nome}>{u.nome}</option>
              ))}
            </select>
          )}
        </div>
        
        {/* Senha */}
        <div style={{ marginBottom: 20 }}>
          <label style={{ fontSize: 11, color: '#64748b', textTransform: 'uppercase', letterSpacing: 1, fontWeight: 600, display: 'block', marginBottom: 6 }}>
            Senha
          </label>
          <input 
            type="password" 
            value={senha} 
            onChange={e => setSenha(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') doLogin(); }}
            placeholder="••••••••"
            style={{
              width: '100%',
              padding: '11px 14px',
              background: 'rgba(255,255,255,0.02)',
              border: '1px solid rgba(255,255,255,0.1)',
              borderRadius: 10,
              color: '#e2e8f0',
              fontSize: 14
            }}
          />
        </div>
        
        {/* Erro */}
        {erro && (
          <div style={{
            background: 'rgba(239,68,68,0.1)',
            border: '1px solid rgba(239,68,68,0.3)',
            borderRadius: 8,
            padding: '10px 12px',
            color: '#fca5a5',
            fontSize: 12,
            marginBottom: 16,
            animation: 'slideUp .2s'
          }}>
            ⚠ {erro}
          </div>
        )}
        
        {/* Botão Entrar */}
        <button 
          onClick={doLogin} 
          disabled={loading}
          style={{
            width: '100%',
            padding: '13px',
            background: loading 
              ? 'rgba(99,102,241,0.3)' 
              : 'linear-gradient(135deg,#6366f1 0%,#a855f7 100%)',
            border: 'none',
            borderRadius: 10,
            color: '#fff',
            fontSize: 14,
            fontWeight: 700,
            letterSpacing: 0.3,
            boxShadow: loading ? 'none' : '0 8px 24px rgba(99,102,241,0.35)',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            gap: 10
          }}
        >
          {loading ? (
            <>
              <span style={{ display: 'inline-block', width: 14, height: 14, border: '2px solid #fff', borderTopColor: 'transparent', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }}></span>
              Entrando...
            </>
          ) : (
            <>🔓 Entrar</>
          )}
        </button>
        
        {/* Rodapé */}
        <div style={{
          marginTop: 24,
          paddingTop: 16,
          borderTop: '1px solid rgba(255,255,255,0.05)',
          fontSize: 10,
          color: '#64748b',
          textAlign: 'center',
          lineHeight: 1.5
        }}>
          Esqueceu sua senha? Fale com o administrador.
        </div>
      </div>
    </div>
  );
}

// ============================================================
// HOME (temporária — apenas confirma login)
// ============================================================
function Home({ user, onLogout }) {
  return (
    <div style={{ minHeight: '100vh', padding: 24 }}>
      {/* Header */}
      <div style={{
        background: 'rgba(13,21,38,0.75)',
        backdropFilter: 'blur(24px) saturate(200%)',
        WebkitBackdropFilter: 'blur(24px) saturate(200%)',
        border: '1px solid rgba(99,102,241,0.15)',
        borderRadius: 16,
        padding: '14px 24px',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'space-between',
        marginBottom: 24,
        animation: 'slideUp .3s'
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <div style={{
            width: 40,
            height: 40,
            borderRadius: 10,
            background: 'linear-gradient(135deg,#6366f1 0%,#a855f7 50%,#ec4899 100%)',
            backgroundSize: '200% 200%',
            animation: 'gradientShift 8s ease infinite',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            fontSize: 18,
            fontWeight: 800,
            color: '#fff',
            boxShadow: '0 4px 16px rgba(99,102,241,0.4), inset 0 1px 0 rgba(255,255,255,0.2)'
          }}>P</div>
          <div>
            <div style={{ fontSize: 16, fontWeight: 800, letterSpacing: -0.3 }}>
              <span className="gradient-text">PETECA CRM</span>
            </div>
            <div style={{ fontSize: 10, color: '#64748b', letterSpacing: 1.5, textTransform: 'uppercase', fontWeight: 500 }}>
              Portal do Vendedor
            </div>
          </div>
        </div>
        
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <div style={{
            background: 'rgba(99,102,241,0.1)',
            border: '1px solid rgba(99,102,241,0.25)',
            borderRadius: 10,
            padding: '7px 14px',
            fontSize: 13,
            color: '#c4b5fd',
            fontWeight: 600,
            display: 'flex',
            alignItems: 'center',
            gap: 8
          }}>
            <span style={{ fontSize: 14 }}>👤</span>
            {user.nome}
          </div>
          <button 
            onClick={onLogout}
            style={{
              background: 'rgba(239,68,68,0.08)',
              border: '1px solid rgba(239,68,68,0.25)',
              borderRadius: 10,
              padding: '7px 14px',
              color: '#fca5a5',
              fontSize: 12,
              fontWeight: 600
            }}
          >
            ⎋ Sair
          </button>
        </div>
      </div>
      
      {/* Conteúdo temporário */}
      <div style={{
        maxWidth: 600,
        margin: '40px auto',
        textAlign: 'center',
        padding: 40,
        background: 'rgba(20,28,48,0.6)',
        backdropFilter: 'blur(20px) saturate(180%)',
        WebkitBackdropFilter: 'blur(20px) saturate(180%)',
        border: '1px solid rgba(255,255,255,0.08)',
        borderRadius: 20,
        animation: 'scaleIn .4s cubic-bezier(.4,0,.2,1)'
      }}>
        <div style={{ fontSize: 64, marginBottom: 20 }}>🎉</div>
        <div style={{ fontSize: 22, fontWeight: 800, marginBottom: 8, letterSpacing: -0.5 }}>
          Olá, <span className="gradient-text">{user.nome}</span>!
        </div>
        <div style={{ fontSize: 13, color: '#94a3b8', marginBottom: 20, lineHeight: 1.6 }}>
          Login funcionando perfeitamente.<br/>
          Seu Kanban será implementado na próxima etapa.
        </div>
        <div style={{
          display: 'inline-block',
          background: 'rgba(34,197,94,0.1)',
          border: '1px solid rgba(34,197,94,0.3)',
          borderRadius: 10,
          padding: '10px 18px',
          fontSize: 12,
          color: '#86efac',
          fontWeight: 600
        }}>
          ✓ Etapa 2 concluída — conectado à API
        </div>
      </div>
    </div>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(App));
</script>
</body>
</html>
