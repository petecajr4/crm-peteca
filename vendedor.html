<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM PETECA — Vendedor</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter','Segoe UI','Helvetica Neue',sans-serif;
    background:radial-gradient(ellipse at top left, #0f1629 0%, #080c18 50%, #050811 100%);
    color:#e2e8f0;
    min-height:100vh;
    overflow-x:hidden;
  }
  #root{min-height:100vh;position:relative;z-index:1}
  .aurora-bg{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
  .aurora-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.12;animation:aurora 20s ease-in-out infinite}
  @keyframes aurora{0%{transform:translate(0,0) rotate(0deg)}33%{transform:translate(30px,-20px) rotate(120deg)}66%{transform:translate(-20px,30px) rotate(240deg)}100%{transform:translate(0,0) rotate(360deg)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes scaleIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
  @keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#3b4f8a,#1e3050);border-radius:4px}
  input,select,textarea,button{font-family:inherit}
  input,select,textarea{outline:none}
  input:focus,select:focus,textarea:focus{border-color:#6366f1!important;box-shadow:0 0 0 3px rgba(99,102,241,0.15)}
  button{cursor:pointer;transition:all .15s cubic-bezier(.4,0,.2,1)}
  button:active:not(:disabled){transform:scale(0.97)}
  button:hover:not(:disabled){filter:brightness(1.1)}
  button:disabled{cursor:default;opacity:0.6}
  .gradient-text{background:linear-gradient(135deg,#60a5fa 0%,#a78bfa 50%,#f472b6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .bubble{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;text-align:center;cursor:grab;user-select:none;transition:box-shadow .2s, filter .2s;will-change:transform;font-weight:700;padding:6px;overflow:hidden;line-height:1.1}
  .bubble:active{cursor:grabbing}
  .bubble:hover{filter:brightness(1.15);z-index:10}
  .bubble-label{pointer-events:none;word-break:break-word;text-shadow:0 1px 2px rgba(0,0,0,0.4)}
</style>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div class="aurora-bg">
  <div class="aurora-blob" style="width:500px;height:500px;background:#6366f1;top:-10%;left:-5%"></div>
  <div class="aurora-blob" style="width:400px;height:400px;background:#a855f7;top:30%;right:-10%;animation-delay:-7s"></div>
  <div class="aurora-blob" style="width:450px;height:450px;background:#ec4899;bottom:-10%;left:30%;animation-delay:-14s"></div>
</div>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

const API_URL = 'https://script.google.com/macros/s/AKfycbyqtgNDt03Z2cfTlbDAUObosynmHaFvXTW4h76X-p3H55_ZFnkKwqKEi6gwFLI9Er4y/exec';
const STORAGE_KEY = 'peteca_vendedor_user';

const STATUS = {
  aberto:  { label: 'Aberto',           cor: '#60a5fa', corEscura: '#2563eb', emoji: '🔵' },
  contato: { label: 'Em contato',       cor: '#4ade80', corEscura: '#16a34a', emoji: '🟢' },
  retorno: { label: 'Retorno provável', cor: '#fb923c', corEscura: '#ea580c', emoji: '🟠' },
  perdido: { label: 'Perdido',          cor: '#6b7280', corEscura: '#374151', emoji: '⚫' }
};

async function callAPI(action, payload = {}) {
  try {
    const url = API_URL + '?action=' + encodeURIComponent(action) + 
                '&payload=' + encodeURIComponent(JSON.stringify(payload)) +
                '&t=' + Date.now();
    const res = await fetch(url);
    return await res.json();
  } catch (e) { return { ok: false, error: e.message }; }
}

function useToast() {
  const [toast, setToast] = useState(null);
  const show = (msg, type='success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  };
  return [toast, show];
}

function Toast({ toast }) {
  if (!toast) return null;
  const cores = {
    success: { bg: '#0d3320', border: '#16a34a', color: '#86efac' },
    error:   { bg: '#7f1d1d', border: '#dc2626', color: '#fca5a5' },
    warning: { bg: '#3a2d08', border: '#eab308', color: '#fde68a' }
  };
  const c = cores[toast.type] || cores.success;
  return (
    <div style={{position:'fixed',bottom:70,right:24,zIndex:2000,background:c.bg,border:`1px solid ${c.border}`,borderRadius:10,padding:'12px 20px',color:c.color,fontSize:13,fontWeight:500,animation:'slideUp .3s',boxShadow:'0 8px 30px rgba(0,0,0,0.4)'}}>{toast.msg}</div>
  );
}

function App() {
  const [user, setUser] = useState(() => {
    try { const saved = localStorage.getItem(STORAGE_KEY); return saved ? JSON.parse(saved) : null; } catch(e) { return null; }
  });
  const handleLogin = (u) => { setUser(u); try { localStorage.setItem(STORAGE_KEY, JSON.stringify(u)); } catch(e) {} };
  const handleLogout = () => { setUser(null); try { localStorage.removeItem(STORAGE_KEY); } catch(e) {} };
  if (!user) return <LoginScreen onLogin={handleLogin} />;
  return <Home user={user} onLogout={handleLogout} />;
}

function LoginScreen({ onLogin }) {
  const [usuarios, setUsuarios] = useState([]);
  const [loadingUsuarios, setLoadingUsuarios] = useState(true);
  const [nome, setNome] = useState('');
  const [senha, setSenha] = useState('');
  const [erro, setErro] = useState('');
  const [loading, setLoading] = useState(false);
  
  useEffect(() => {
    callAPI('getUsuarios').then(res => {
      if (res.ok) setUsuarios(res.usuarios.filter(u => u.tipo === 'vendedor'));
      setLoadingUsuarios(false);
    });
  }, []);
  
  const doLogin = async () => {
    if (!nome || !senha) { setErro('Selecione seu nome e digite a senha'); return; }
    setErro(''); setLoading(true);
    const res = await callAPI('login', { nome, senha });
    setLoading(false);
    if (res.ok) onLogin(res.user);
    else setErro(res.error || 'Erro ao fazer login');
  };
  
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{width:'100%',maxWidth:400,background:'rgba(13,21,38,0.75)',backdropFilter:'blur(24px) saturate(200%)',WebkitBackdropFilter:'blur(24px) saturate(200%)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:20,padding:32,boxShadow:'0 20px 60px rgba(0,0,0,0.4)',animation:'scaleIn .4s cubic-bezier(.4,0,.2,1)'}}>
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:28}}>
          <div style={{width:48,height:48,borderRadius:14,background:'linear-gradient(135deg,#6366f1 0%,#a855f7 50%,#ec4899 100%)',backgroundSize:'200% 200%',animation:'gradientShift 8s ease infinite',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:800,color:'#fff',boxShadow:'0 8px 24px rgba(99,102,241,0.4), inset 0 1px 0 rgba(255,255,255,0.2)',letterSpacing:-1}}>P</div>
          <div>
            <div style={{fontSize:20,fontWeight:800,letterSpacing:-0.5}}><span className="gradient-text">PETECA CRM</span></div>
            <div style={{fontSize:10,color:'#64748b',letterSpacing:2,textTransform:'uppercase',marginTop:2,fontWeight:500}}>Portal do Vendedor</div>
          </div>
        </div>
        <div style={{fontSize:14,color:'#94a3b8',marginBottom:24,lineHeight:1.5}}>Entre com seu usuário para acessar seu Kanban de recuperação.</div>
        <div style={{marginBottom:16}}>
          <label style={{fontSize:11,color:'#64748b',textTransform:'uppercase',letterSpacing:1,fontWeight:600,display:'block',marginBottom:6}}>Seu nome</label>
          {loadingUsuarios ? (
            <div style={{padding:'11px 14px',background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:10,color:'#64748b',fontSize:13,display:'flex',alignItems:'center',gap:10}}><span style={{display:'inline-block',width:12,height:12,border:'2px solid #64748b',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}></span>Carregando...</div>
          ) : (
            <select value={nome} onChange={e => setNome(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') doLogin(); }} style={{width:'100%',padding:'11px 14px',background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:10,color:'#e2e8f0',fontSize:14,cursor:'pointer'}}>
              <option value="">Selecione seu nome...</option>
              {usuarios.map(u => <option key={u.nome} value={u.nome}>{u.nome}</option>)}
            </select>
          )}
        </div>
        <div style={{marginBottom:20}}>
          <label style={{fontSize:11,color:'#64748b',textTransform:'uppercase',letterSpacing:1,fontWeight:600,display:'block',marginBottom:6}}>Senha</label>
          <input type="password" value={senha} onChange={e => setSenha(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') doLogin(); }} placeholder="••••••••" style={{width:'100%',padding:'11px 14px',background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:10,color:'#e2e8f0',fontSize:14}} />
        </div>
        {erro && <div style={{background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:8,padding:'10px 12px',color:'#fca5a5',fontSize:12,marginBottom:16,animation:'slideUp .2s'}}>⚠ {erro}</div>}
        <button onClick={doLogin} disabled={loading} style={{width:'100%',padding:'13px',background:loading?'rgba(99,102,241,0.3)':'linear-gradient(135deg,#6366f1 0%,#a855f7 100%)',border:'none',borderRadius:10,color:'#fff',fontSize:14,fontWeight:700,letterSpacing:0.3,boxShadow:loading?'none':'0 8px 24px rgba(99,102,241,0.35)',display:'flex',alignItems:'center',justifyContent:'center',gap:10}}>
          {loading ? <><span style={{display:'inline-block',width:14,height:14,border:'2px solid #fff',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}></span>Entrando...</> : <>🔓 Entrar</>}
        </button>
        <div style={{marginTop:24,paddingTop:16,borderTop:'1px solid rgba(255,255,255,0.05)',fontSize:10,color:'#64748b',textAlign:'center',lineHeight:1.5}}>Esqueceu sua senha? Fale com o administrador.</div>
      </div>
    </div>
  );
}

function Home({ user, onLogout }) {
  const [kanbans, setKanbans] = useState([]);
  const [loading, setLoading] = useState(true);
  const [lastSync, setLastSync] = useState(null);
  const [selectedKanban, setSelectedKanban] = useState(null);
  const [toast, showToast] = useToast();
  const [tags, setTags] = useState([]);
  
  const loadKanbans = useCallback(async (silent = false) => {
    if (!silent) setLoading(true);
    const res = await callAPI('getByVendedor', { vendedor: user.nome });
    if (res.ok) { setKanbans(res.kanbans); setLastSync(Date.now()); }
    else if (!silent) showToast('Erro ao carregar: ' + (res.error || 'desconhecido'), 'error');
    if (!silent) setLoading(false);
  }, [user.nome]);
  
  const loadTags = useCallback(async () => {
    const res = await callAPI('getTags');
    if (res.ok) setTags(res.tags);
  }, []);
  
  useEffect(() => { loadKanbans(); loadTags(); }, [loadKanbans, loadTags]);
  
  useEffect(() => {
    const interval = setInterval(() => { if (!document.hidden) loadKanbans(true); }, 120000);
    return () => clearInterval(interval);
  }, [loadKanbans]);
  
  const stats = useMemo(() => {
    const s = { total:0, aberto:0, contato:0, retorno:0, perdido:0 };
    kanbans.forEach(k => { s.total++; if (s[k.status] !== undefined) s[k.status]++; });
    return s;
  }, [kanbans]);
  
  const atualizarKanban = (id, changes) => {
    setKanbans(prev => prev.map(k => k.id === id ? {...k, ...changes} : k));
  };
  
  const handleUpdateStatus = async (id, novoStatus) => {
    atualizarKanban(id, { status: novoStatus });
    const res = await callAPI('updateStatus', { id, novoStatus, por: user.nome });
    if (res.ok) showToast(`Movido para ${STATUS[novoStatus].label}`);
    else { showToast('Erro ao salvar', 'error'); loadKanbans(); }
  };
  
  const handleUpdateTags = async (id, novasTags) => {
    atualizarKanban(id, { tags: novasTags.join(';') });
    const res = await callAPI('updateTags', { id, tags: novasTags, por: user.nome });
    if (res.ok) showToast('Tags atualizadas');
    else { showToast('Erro ao salvar', 'error'); loadKanbans(); }
  };
  
  const handleAddComment = async (id, texto) => {
    const res = await callAPI('addComment', { id, texto, por: user.nome });
    if (res.ok) showToast('Comentário adicionado');
    else showToast('Erro ao salvar', 'error');
    return res.ok;
  };
  
  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <Header user={user} onLogout={onLogout} stats={stats} lastSync={lastSync} onRefresh={() => loadKanbans()} loading={loading} />
      {loading ? (
        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:12}}>
            <div style={{width:40,height:40,border:'3px solid rgba(99,102,241,0.2)',borderTopColor:'#6366f1',borderRadius:'50%',animation:'spin 1s linear infinite'}}></div>
            <div style={{fontSize:13,color:'#64748b'}}>Carregando seu Kanban...</div>
          </div>
        </div>
      ) : kanbans.length === 0 ? (
        <EmptyState userName={user.nome} />
      ) : (
        <KanbanField kanbans={kanbans} onSelectKanban={setSelectedKanban} />
      )}
      <Legenda />
      {selectedKanban && (
        <KanbanModal 
          kanban={kanbans.find(k => k.id === selectedKanban)}
          onClose={() => setSelectedKanban(null)}
          onUpdateStatus={handleUpdateStatus}
          onUpdateTags={handleUpdateTags}
          onAddComment={handleAddComment}
          tags={tags}
          user={user}
        />
      )}
      <Toast toast={toast} />
    </div>
  );
}

function Header({ user, onLogout, stats, lastSync, onRefresh, loading }) {
  const minsAgo = lastSync ? Math.floor((Date.now() - lastSync) / 60000) : null;
  return (
    <div style={{background:'rgba(13,21,38,0.85)',backdropFilter:'blur(24px) saturate(200%)',WebkitBackdropFilter:'blur(24px) saturate(200%)',borderBottom:'1px solid rgba(99,102,241,0.15)',padding:'12px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:50,flexWrap:'wrap',gap:12}}>
      <div style={{display:'flex',alignItems:'center',gap:14}}>
        <div style={{width:40,height:40,borderRadius:10,background:'linear-gradient(135deg,#6366f1 0%,#a855f7 50%,#ec4899 100%)',backgroundSize:'200% 200%',animation:'gradientShift 8s ease infinite',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,fontWeight:800,color:'#fff',boxShadow:'0 4px 16px rgba(99,102,241,0.4), inset 0 1px 0 rgba(255,255,255,0.2)'}}>P</div>
        <div>
          <div style={{fontSize:15,fontWeight:800,letterSpacing:-0.3}}>
            <span className="gradient-text">Kanban</span>
            <span style={{color:'#64748b',fontWeight:600}}> • {user.nome}</span>
          </div>
          <div style={{fontSize:10,color:'#64748b',letterSpacing:1,marginTop:1}}>
            {stats.total} clientes • {stats.total - stats.perdido} ativos
            {minsAgo !== null && <span> • Sync {minsAgo === 0 ? '<1min' : minsAgo+'min'} atrás</span>}
          </div>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <button onClick={onRefresh} disabled={loading} style={{background:'rgba(99,102,241,0.08)',border:'1px solid rgba(99,102,241,0.2)',borderRadius:10,padding:'7px 12px',color:'#c4b5fd',fontSize:12,fontWeight:500,display:'flex',alignItems:'center',gap:6}}>
          <span style={{display:'inline-block',animation:loading?'spin 1s linear infinite':'none'}}>🔄</span>
          <span>Atualizar</span>
        </button>
        <button onClick={onLogout} style={{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.25)',borderRadius:10,padding:'7px 14px',color:'#fca5a5',fontSize:12,fontWeight:600}}>⎋ Sair</button>
      </div>
    </div>
  );
}

function EmptyState({ userName }) {
  return (
    <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:40}}>
      <div style={{maxWidth:440,textAlign:'center',background:'rgba(20,28,48,0.6)',backdropFilter:'blur(20px) saturate(180%)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:20,padding:40,animation:'scaleIn .4s'}}>
        <div style={{fontSize:64,marginBottom:20}}>🎯</div>
        <div style={{fontSize:20,fontWeight:800,marginBottom:8,letterSpacing:-0.5}}>
          Seu Kanban está vazio, <span className="gradient-text">{userName}</span>!
        </div>
        <div style={{fontSize:13,color:'#94a3b8',lineHeight:1.6}}>Quando o administrador encaminhar clientes pra você, as bolinhas vão aparecer aqui flutuando.</div>
      </div>
    </div>
  );
}

function Legenda() {
  return (
    <div style={{position:'fixed',bottom:14,left:'50%',transform:'translateX(-50%)',background:'rgba(13,21,38,0.85)',backdropFilter:'blur(16px)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:100,padding:'8px 18px',display:'flex',alignItems:'center',gap:18,fontSize:11,color:'#94a3b8',fontWeight:500,zIndex:40,boxShadow:'0 8px 24px rgba(0,0,0,0.3)',flexWrap:'wrap',justifyContent:'center',maxWidth:'calc(100vw - 40px)'}}>
      {Object.entries(STATUS).map(([key, s]) => (
        <div key={key} style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{width:10,height:10,borderRadius:'50%',background:s.cor,boxShadow:`0 0 8px ${s.cor}80`}}></span>
          <span>{s.label}</span>
        </div>
      ))}
    </div>
  );
}

function KanbanField({ kanbans, onSelectKanban }) {
  const containerRef = useRef(null);
  const [dimensions, setDimensions] = useState({ w: 800, h: 600 });
  const particlesRef = useRef({});
  const draggingRef = useRef(null);
  const [, setTick] = useState(0);
  
  const calcSize = (potencial) => {
    const p = Math.max(0, Number(potencial) || 0);
    if (p === 0) return 42;
    const size = 30 + Math.log10(p + 1) * 14;
    return Math.max(42, Math.min(130, size));
  };
  
  useEffect(() => {
    const updateDim = () => {
      if (containerRef.current) {
        const r = containerRef.current.getBoundingClientRect();
        setDimensions({ w: r.width, h: r.height });
      }
    };
    updateDim();
    window.addEventListener('resize', updateDim);
    return () => window.removeEventListener('resize', updateDim);
  }, []);
  
  useEffect(() => {
    const atuais = new Set(kanbans.map(k => k.id));
    Object.keys(particlesRef.current).forEach(id => {
      if (!atuais.has(id)) delete particlesRef.current[id];
    });
    kanbans.forEach(k => {
      if (!particlesRef.current[k.id]) {
        const isPerdido = k.status === 'perdido';
        // Velocidade inicial mais energética
        const angle = Math.random() * Math.PI * 2;
        const speed = isPerdido ? 1.2 : 2.5;
        particlesRef.current[k.id] = {
          x: 100 + Math.random() * Math.max(100, dimensions.w - 200),
          y: isPerdido ? dimensions.h * 0.78 + Math.random() * (dimensions.h * 0.15) : 80 + Math.random() * Math.max(100, dimensions.h * 0.55),
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: calcSize(k.potencial_perdido) / 2,
          // Massa proporcional à área (bolinhas maiores empurram mais)
          m: Math.pow(calcSize(k.potencial_perdido) / 2, 2)
        };
      } else {
        particlesRef.current[k.id].r = calcSize(k.potencial_perdido) / 2;
        particlesRef.current[k.id].m = Math.pow(calcSize(k.potencial_perdido) / 2, 2);
      }
    });
  }, [kanbans, dimensions]);
  
  useEffect(() => {
    let running = true;
    const kanbansMap = {};
    kanbans.forEach(k => { kanbansMap[k.id] = k; });
    
    const tickFn = () => {
      if (!running) return;
      const parts = particlesRef.current;
      const ids = Object.keys(parts);
      const { w, h } = dimensions;
      const perdidosLimite = h * 0.7;
      
      ids.forEach(id => {
        const p = parts[id];
        if (!p) return;
        if (draggingRef.current?.id === id) return;
        
        const kanban = kanbansMap[id];
        const isPerdido = kanban?.status === 'perdido';
        
        // Movimento
        p.x += p.vx;
        p.y += p.vy;
        
        // Amortecimento MUITO LEVE (quase nada) — mantém velocidade como bilhar
        const drag = isPerdido ? 0.995 : 0.998;
        p.vx *= drag;
        p.vy *= drag;
        
        // Empurrãozinho constante pra manter em movimento
        if (Math.random() < 0.08) {
          const force = isPerdido ? 0.35 : 0.6;
          p.vx += (Math.random() - 0.5) * force;
          p.vy += (Math.random() - 0.5) * force;
        }
        
        // Atração suave pra zona do status
        if (isPerdido && p.y < perdidosLimite) p.vy += 0.12;
        if (!isPerdido && p.y > perdidosLimite - 20) p.vy -= 0.15;
        
        // Velocidade MÍNIMA (pra nunca parar de verdade)
        const vAtual = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
        const vMin = isPerdido ? 0.4 : 0.8;
        if (vAtual < vMin) {
          if (vAtual > 0.01) {
            const boost = vMin / vAtual;
            p.vx *= boost;
            p.vy *= boost;
          } else {
            // Praticamente parada → dar empurrão aleatório forte
            const ang = Math.random() * Math.PI * 2;
            p.vx = Math.cos(ang) * vMin;
            p.vy = Math.sin(ang) * vMin;
          }
        }
        
        // Velocidade MÁXIMA (pra não virar foguete)
        const maxV = isPerdido ? 2.8 : 4.5;
        if (vAtual > maxV) {
          p.vx = (p.vx / vAtual) * maxV;
          p.vy = (p.vy / vAtual) * maxV;
        }
        
        // Colisão com bordas — REBATIMENTO QUASE ELÁSTICO (mantém energia)
        if (p.x - p.r < 10) { p.x = p.r + 10; p.vx = Math.abs(p.vx) * 0.95; }
        if (p.x + p.r > w - 10) { p.x = w - p.r - 10; p.vx = -Math.abs(p.vx) * 0.95; }
        if (p.y - p.r < 10) { p.y = p.r + 10; p.vy = Math.abs(p.vy) * 0.95; }
        if (p.y + p.r > h - 10) { p.y = h - p.r - 10; p.vy = -Math.abs(p.vy) * 0.95; }
      });
      
      // Colisão entre bolinhas — ELÁSTICA 2D com massa (física real de bilhar)
      for (let i = 0; i < ids.length; i++) {
        for (let j = i+1; j < ids.length; j++) {
          const a = parts[ids[i]];
          const b = parts[ids[j]];
          if (!a || !b) continue;
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          const minDist = a.r + b.r + 2;
          if (dist < minDist && dist > 0.01) {
            // Separação (resolução de overlap)
            const overlap = minDist - dist;
            const nx = dx / dist;
            const ny = dy / dist;
            // Separação proporcional à massa (bolinhas pequenas empurradas mais)
            const totalMass = a.m + b.m;
            a.x -= nx * overlap * (b.m / totalMass);
            a.y -= ny * overlap * (b.m / totalMass);
            b.x += nx * overlap * (a.m / totalMass);
            b.y += ny * overlap * (a.m / totalMass);
            
            // Colisão elástica 2D (conservação de momento)
            // Velocidades ao longo da normal
            const van = a.vx * nx + a.vy * ny;
            const vbn = b.vx * nx + b.vy * ny;
            
            // Só processa se estão se aproximando (van > vbn significa afastando)
            if (van - vbn > 0) {
              // Fórmula de colisão elástica com massa
              // Coeficiente de restituição 0.95 (quase perfeito = bilhar)
              const e = 0.95;
              const vanNew = (van * (a.m - b.m) + 2 * b.m * vbn) / totalMass;
              const vbnNew = (vbn * (b.m - a.m) + 2 * a.m * van) / totalMass;
              
              // Aplicar só a componente normal (tangencial é preservada)
              a.vx += (vanNew - van) * nx * e;
              a.vy += (vanNew - van) * ny * e;
              b.vx += (vbnNew - vbn) * nx * e;
              b.vy += (vbnNew - vbn) * ny * e;
            }
          }
        }
      }
      
      setTick(t => t + 1);
      requestAnimationFrame(tickFn);
    };
    
    const raf = requestAnimationFrame(tickFn);
    return () => { running = false; cancelAnimationFrame(raf); };
  }, [kanbans, dimensions]);
  
  const onMouseDown = (e, id) => {
    const rect = containerRef.current.getBoundingClientRect();
    const p = particlesRef.current[id];
    if (!p) return;
    draggingRef.current = { 
      id, 
      offsetX: e.clientX - rect.left - p.x, 
      offsetY: e.clientY - rect.top - p.y, 
      moved: false, 
      startX: e.clientX, 
      startY: e.clientY,
      lastX: p.x,
      lastY: p.y,
      velX: 0,
      velY: 0
    };
  };
  const onMouseMove = (e) => {
    const d = draggingRef.current;
    if (!d) return;
    const rect = containerRef.current.getBoundingClientRect();
    const p = particlesRef.current[d.id];
    if (!p) return;
    const newX = e.clientX - rect.left - d.offsetX;
    const newY = e.clientY - rect.top - d.offsetY;
    // Calcular velocidade do movimento pra usar quando soltar
    d.velX = newX - d.lastX;
    d.velY = newY - d.lastY;
    d.lastX = newX;
    d.lastY = newY;
    p.x = newX;
    p.y = newY;
    p.vx = 0; p.vy = 0;
    if (Math.abs(e.clientX - d.startX) + Math.abs(e.clientY - d.startY) > 5) d.moved = true;
  };
  const onMouseUp = (id) => {
    const d = draggingRef.current;
    if (d && !d.moved && d.id === id) {
      onSelectKanban(id);
    } else if (d && d.moved && d.id === id) {
      // TACADA: aplicar velocidade do movimento ao soltar
      const p = particlesRef.current[id];
      if (p) {
        p.vx = d.velX * 1.2;
        p.vy = d.velY * 1.2;
      }
    }
    draggingRef.current = null;
  };
  const onTouchStart = (e, id) => {
    const t = e.touches[0];
    const rect = containerRef.current.getBoundingClientRect();
    const p = particlesRef.current[id];
    if (!p) return;
    draggingRef.current = { 
      id, 
      offsetX: t.clientX - rect.left - p.x, 
      offsetY: t.clientY - rect.top - p.y, 
      moved: false, 
      startX: t.clientX, 
      startY: t.clientY,
      lastX: p.x,
      lastY: p.y,
      velX: 0,
      velY: 0
    };
  };
  const onTouchMove = (e) => {
    const d = draggingRef.current;
    if (!d) return;
    e.preventDefault();
    const t = e.touches[0];
    const rect = containerRef.current.getBoundingClientRect();
    const p = particlesRef.current[d.id];
    if (!p) return;
    const newX = t.clientX - rect.left - d.offsetX;
    const newY = t.clientY - rect.top - d.offsetY;
    d.velX = newX - d.lastX;
    d.velY = newY - d.lastY;
    d.lastX = newX;
    d.lastY = newY;
    p.x = newX;
    p.y = newY;
    p.vx = 0; p.vy = 0;
    if (Math.abs(t.clientX - d.startX) + Math.abs(t.clientY - d.startY) > 8) d.moved = true;
  };
  const onTouchEnd = (id) => {
    const d = draggingRef.current;
    if (d && !d.moved && d.id === id) {
      onSelectKanban(id);
    } else if (d && d.moved && d.id === id) {
      const p = particlesRef.current[id];
      if (p) {
        p.vx = d.velX * 1.2;
        p.vy = d.velY * 1.2;
      }
    }
    draggingRef.current = null;
  };
  
  return (
    <div ref={containerRef} style={{flex:1,position:'relative',overflow:'hidden',minHeight:'calc(100vh - 150px)',cursor:'default'}}
      onMouseMove={onMouseMove}
      onMouseUp={() => draggingRef.current = null}
      onMouseLeave={() => draggingRef.current = null}
      onTouchMove={onTouchMove}
    >
      <div style={{position:'absolute',left:0,right:0,top:'70%',height:1,background:'linear-gradient(90deg, transparent, rgba(107,114,128,0.2), transparent)',pointerEvents:'none'}}></div>
      <div style={{position:'absolute',left:14,top:'calc(70% + 8px)',fontSize:9,color:'rgba(107,114,128,0.5)',letterSpacing:2,textTransform:'uppercase',fontWeight:600,pointerEvents:'none'}}>⚫ Perdidos</div>
      
      {kanbans.map(k => {
        const p = particlesRef.current[k.id];
        if (!p) return null;
        const s = STATUS[k.status] || STATUS.aberto;
        const size = p.r * 2;
        const fontSize = Math.max(9, Math.min(14, size * 0.14));
        const shortName = k.cliente_nome.length > 20 && size < 80 ? k.cliente_nome.slice(0, 18) + '…' : k.cliente_nome;
        return (
          <div
            key={k.id}
            className="bubble"
            onMouseDown={e => onMouseDown(e, k.id)}
            onMouseUp={() => onMouseUp(k.id)}
            onTouchStart={e => onTouchStart(e, k.id)}
            onTouchEnd={() => onTouchEnd(k.id)}
            style={{
              left: p.x - p.r, top: p.y - p.r, width: size, height: size,
              background: `radial-gradient(circle at 35% 30%, ${s.cor}ee, ${s.corEscura}dd)`,
              border: `1.5px solid ${s.cor}`,
              boxShadow: `0 4px 20px ${s.cor}55, inset 0 2px 8px rgba(255,255,255,0.2), inset 0 -4px 10px rgba(0,0,0,0.15)`,
              color:'#fff', fontSize: fontSize,
              opacity: k.status === 'perdido' ? 0.7 : 1
            }}
            title={k.cliente_nome}
          >
            <span className="bubble-label" style={{fontSize:fontSize,fontWeight:700}}>{shortName}</span>
          </div>
        );
      })}
    </div>
  );
}

function KanbanModal({ kanban, onClose, onUpdateStatus, onUpdateTags, onAddComment, tags, user }) {
  const [commentText, setCommentText] = useState('');
  const [historico, setHistorico] = useState([]);
  const [loadingHist, setLoadingHist] = useState(false);
  
  const tagsAtuais = useMemo(() => (kanban.tags || '').split(';').filter(Boolean), [kanban.tags]);
  
  const loadHistorico = useCallback(async () => {
    setLoadingHist(true);
    const res = await callAPI('getHistory', { kanban_id: kanban.id });
    if (res.ok) setHistorico(res.historico);
    setLoadingHist(false);
  }, [kanban.id]);
  
  useEffect(() => { loadHistorico(); }, [loadHistorico]);
  
  const toggleTag = (tagNome) => {
    const novas = tagsAtuais.includes(tagNome) ? tagsAtuais.filter(t => t !== tagNome) : [...tagsAtuais, tagNome];
    onUpdateTags(kanban.id, novas);
  };
  
  const handleAddComment = async () => {
    if (!commentText.trim()) return;
    const ok = await onAddComment(kanban.id, commentText.trim());
    if (ok) { setCommentText(''); loadHistorico(); }
  };
  
  const s = STATUS[kanban.status] || STATUS.aberto;
  const fmt = (n) => 'R$ ' + Number(n||0).toLocaleString('pt-BR', {minimumFractionDigits: 2});
  const fmtData = (d) => {
    if (!d) return '—';
    try { const dt = new Date(d); return dt.toLocaleDateString('pt-BR') + ' ' + dt.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}); } catch(e) { return String(d); }
  };
  
  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',backdropFilter:'blur(6px)',WebkitBackdropFilter:'blur(6px)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:20,animation:'fadeIn .2s'}}>
      <div onClick={e => e.stopPropagation()} style={{width:'100%',maxWidth:640,maxHeight:'90vh',overflowY:'auto',background:'rgba(13,21,38,0.95)',backdropFilter:'blur(20px) saturate(180%)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:20,boxShadow:'0 20px 60px rgba(0,0,0,0.5)',animation:'scaleIn .25s cubic-bezier(.4,0,.2,1)'}}>
        <div style={{background:`linear-gradient(135deg, ${s.cor}33, ${s.corEscura}22)`,borderBottom:`1px solid ${s.cor}44`,padding:'20px 24px',position:'relative'}}>
          <button onClick={onClose} style={{position:'absolute',top:14,right:14,width:32,height:32,borderRadius:8,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',color:'#94a3b8',fontSize:16,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
            <span style={{fontSize:10,fontWeight:700,letterSpacing:1,textTransform:'uppercase',padding:'3px 8px',borderRadius:20,background:`${s.cor}33`,color:s.cor,border:`1px solid ${s.cor}66`}}>{s.emoji} {s.label}</span>
          </div>
          <div style={{fontSize:20,fontWeight:800,letterSpacing:-0.5,marginBottom:4}}>{kanban.cliente_nome}</div>
          <div style={{fontSize:11,color:'#94a3b8',letterSpacing:0.5}}>📍 {kanban.cliente_cidade || '—'} • ID {kanban.cliente_id}</div>
        </div>
        
        <div style={{padding:'18px 24px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
          <div style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.05)',borderRadius:10,padding:'10px 14px'}}>
            <div style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:1,fontWeight:600,marginBottom:4}}>Faturamento histórico</div>
            <div style={{fontSize:15,fontWeight:700,color:'#4ade80'}}>{fmt(kanban.faturamento_hist)}</div>
          </div>
          <div style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.05)',borderRadius:10,padding:'10px 14px'}}>
            <div style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:1,fontWeight:600,marginBottom:4}}>Potencial perdido</div>
            <div style={{fontSize:15,fontWeight:700,color:'#fca5a5'}}>{fmt(kanban.potencial_perdido)}</div>
          </div>
        </div>
        
        <div style={{padding:'18px 24px',borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
          <div style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:1,fontWeight:600,marginBottom:10}}>Mudar situação</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {Object.entries(STATUS).map(([key, st]) => {
              const isActive = kanban.status === key;
              return (
                <button key={key} onClick={() => onUpdateStatus(kanban.id, key)} disabled={isActive} style={{padding:'8px 14px',borderRadius:20,background: isActive ? `${st.cor}30` : 'rgba(255,255,255,0.04)',border:`1px solid ${isActive ? st.cor+'80' : 'rgba(255,255,255,0.08)'}`,color: isActive ? st.cor : '#94a3b8',fontSize:12,fontWeight:600,display:'flex',alignItems:'center',gap:6}}>
                  <span>{st.emoji}</span><span>{st.label}</span>
                  {isActive && <span style={{fontSize:10,opacity:0.8}}>✓ atual</span>}
                </button>
              );
            })}
          </div>
        </div>
        
        <div style={{padding:'18px 24px',borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
          <div style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:1,fontWeight:600,marginBottom:10}}>
            Tags {tagsAtuais.length > 0 && <span style={{color:'#a78bfa'}}>({tagsAtuais.length} selecionadas)</span>}
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {tags.map(t => {
              const selected = tagsAtuais.includes(t.nome);
              return (
                <button key={t.id} onClick={() => toggleTag(t.nome)} style={{padding:'5px 11px',borderRadius:16,fontSize:11,fontWeight:600,background: selected ? t.cor : 'rgba(255,255,255,0.03)',color: selected ? '#fff' : '#94a3b8',border:`1px solid ${selected ? t.cor : 'rgba(255,255,255,0.08)'}`,boxShadow: selected ? `0 2px 8px ${t.cor}50` : 'none'}}>
                  {selected ? '✓ ' : ''}{t.nome}
                </button>
              );
            })}
          </div>
        </div>
        
        <div style={{padding:'18px 24px',borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
          <div style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:1,fontWeight:600,marginBottom:10}}>Adicionar comentário</div>
          <textarea value={commentText} onChange={e => setCommentText(e.target.value)} placeholder="Ex: Liguei, cliente pediu pra retornar semana que vem..." rows={3} style={{width:'100%',padding:'11px 14px',background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:10,color:'#e2e8f0',fontSize:13,resize:'vertical',fontFamily:'inherit'}} />
          <button onClick={handleAddComment} disabled={!commentText.trim()} style={{marginTop:8,padding:'9px 18px',background: commentText.trim() ? 'linear-gradient(135deg,#6366f1,#a855f7)' : 'rgba(255,255,255,0.05)',border:'none',borderRadius:8,color:'#fff',fontSize:12,fontWeight:600,display:'inline-flex',alignItems:'center',gap:8}}>💾 Salvar comentário</button>
        </div>
        
        <div style={{padding:'18px 24px'}}>
          <div style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:1,fontWeight:600,marginBottom:10}}>Histórico de ações ({historico.length})</div>
          {loadingHist ? (
            <div style={{padding:14,textAlign:'center',color:'#64748b',fontSize:12}}>Carregando...</div>
          ) : historico.length === 0 ? (
            <div style={{padding:14,textAlign:'center',color:'#64748b',fontSize:12}}>Sem histórico ainda.</div>
          ) : (
            <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:260,overflowY:'auto'}}>
              {historico.map(h => {
                const icones = {criou:'➕',mudou_status:'🔄',mudou_tags:'🏷',comentou:'💬',finalizou:'✅',auto_finalizou:'✨'};
                return (
                  <div key={h.id} style={{padding:'10px 12px',background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.05)',borderRadius:8,fontSize:12}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4,gap:8}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,color:'#c4b5fd',fontWeight:600}}>
                        <span>{icones[h.acao] || '•'}</span>
                        <span>{h.por}</span>
                        {h.de && h.para && <span style={{color:'#64748b',fontWeight:400}}>{h.de} → {h.para}</span>}
                      </div>
                      <div style={{fontSize:10,color:'#64748b'}}>{fmtData(h.quando)}</div>
                    </div>
                    {h.detalhes && <div style={{color:'#c8d6e5',lineHeight:1.5,whiteSpace:'pre-wrap'}}>{h.detalhes}</div>}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(App));
</script>
